<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance — AutoLog</title>
<link rel="stylesheet" href="/app/app-theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<aside class="sb" id="sb">
  <div class="sb-logo"><img src="/assets/logo.png" alt=""><span class="sb-logo-text">AutoLog</span></div>
  <nav class="sb-nav">
    <a href="/app/dashboard" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span><span class="sb-label">Dashboard</span></a>
    <a href="/app/fuel" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M3 22V8a2 2 0 012-2h8a2 2 0 012 2v14M3 22h14M7 22V12h4v10"/><path d="M19 8l2 2-2 2M19 10h-2V6a2 2 0 00-2-2"/></svg></span><span class="sb-label">Fuel Log</span></a>
    <a href="/app/service" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg></span><span class="sb-label">Service History</span></a>
    <a href="/app/maintenance" class="sb-link active"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span><span class="sb-label">Maintenance</span></a>
    <a href="/app/documents" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span><span class="sb-label">Documents</span></a>
    <a href="/app/trips" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg></span><span class="sb-label">Trips</span></a>
    <div class="sb-divider"></div>
    <a href="/app/settings" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span><span class="sb-label">Settings</span></a>
  </nav>
  <div class="sb-bottom"><button class="sb-link sb-signout" onclick="doSignOut()"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span><span class="sb-label">Sign Out</span></button></div>
</aside>
<div class="sb-overlay" id="sb-ov"></div>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><button class="mob-menu" id="mob-menu-btn"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><span class="page-title">Maintenance</span></div>
    <div class="topbar-right">
      <div class="vsw" id="vsw"><button class="vsw-btn" id="vsw-btn" onclick="toggleVsw()"><div class="vsw-dot"></div><span class="vsw-name" id="vsw-name">…</span><span class="vsw-chevron"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></span></button></div>
      <div class="user-avatar" id="user-avatar">?</div>
    </div>
  </div>
  <div class="content" id="content"><div class="loading"><div class="spinner"></div><span>Loading…</span></div></div>
</div>
<script>
const SURL='https://dkpvxlxarsmiljnvnbck.supabase.co',SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrcHZ4bHhhcnNtaWxqbnZuYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzM4MzIsImV4cCI6MjA5MDAwOTgzMn0.WJTRE_xmudj--jWSoA3e4ggYVORrFpoarBUkeaQN1Bw'
const sb=supabase.createClient(SURL,SKEY)
const $=id=>document.getElementById(id)
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
function fmtMi(n){return n!=null?Number(n).toLocaleString('en-GB')+' mi':'—'}
function vName(v){return v.nickname||[v.year,v.make,v.model].filter(Boolean).join(' ')||v.registration||'Vehicle'}
function doSignOut(){sb.auth.signOut().then(()=>location.href='/app/login')}
const sbEl=$('sb'),sbOv=$('sb-ov')
$('mob-menu-btn').onclick=()=>{sbEl.classList.toggle('open');sbOv.classList.toggle('on')}
sbOv.onclick=()=>{sbEl.classList.remove('open');sbOv.classList.remove('on')}
let allVehicles=[],vehicle=null
function toggleVsw(){
  const d=$('vsw-drop');if(d){d.remove();$('vsw-btn').classList.remove('open');return}
  if(allVehicles.length<=1)return
  $('vsw-btn').classList.add('open')
  const drop=document.createElement('div');drop.id='vsw-drop';drop.className='vsw-drop'
  drop.innerHTML=allVehicles.map(v=>`<div class="vsw-item${v.id===vehicle?.id?' cur':''}" onclick="switchV('${v.id}')"><div style="width:7px;height:7px;border-radius:50%;background:${v.id===vehicle?.id?'#1E7A8C':'#94a3b8'};flex-shrink:0"></div><div><div>${vName(v)}</div>${v.registration?`<div class="vsw-item-reg">${v.registration.toUpperCase()}</div>`:''}</div></div>`).join('')
  $('vsw').appendChild(drop)
  setTimeout(()=>document.addEventListener('click',()=>{const d=$('vsw-drop');if(d){d.remove();$('vsw-btn').classList.remove('open')}},{once:true}),10)
}
function switchV(id){localStorage.setItem('al_vid',id);location.reload()}
;(async()=>{
  const{data:{session}}=await sb.auth.getSession()
  if(!session){location.replace('/app/login');return}
  const[{data:veh},{data:prof}]=await Promise.all([sb.from('vehicles').select('*').eq('owner_id',session.user.id).eq('is_active',true).order('created_at',{ascending:true}),sb.from('profiles').select('display_name').eq('id',session.user.id).single()])
  allVehicles=veh||[]
  $('user-avatar').textContent=(prof?.display_name||session.user.email||'?')[0].toUpperCase()
  let selId=localStorage.getItem('al_vid')
  if(!selId||!allVehicles.find(v=>v.id===selId)){selId=allVehicles[0]?.id||null;if(selId)localStorage.setItem('al_vid',selId)}
  vehicle=allVehicles.find(v=>v.id===selId)||null
  $('vsw-name').textContent=vehicle?vName(vehicle):'No vehicle'
  if(allVehicles.length<=1)$('vsw-btn').style.cursor='default'
  if(!vehicle){$('content').innerHTML=`<div class="empty"><div class="empty-icon">📅</div><h3>No vehicle selected</h3></div>`;return}
  const{data:items}=await sb.from('maintenance_items').select('*').eq('vehicle_id',vehicle.id).order('status').order('name')
  const all=items||[]
  window.allMaintItems=all
  const groups={overdue:all.filter(i=>i.status==='overdue'),due_soon:all.filter(i=>i.status==='due_soon'),ok:all.filter(i=>i.status==='ok'),unknown:all.filter(i=>!i.status||i.status==='unknown')}
  const cfg={overdue:{label:'Overdue',color:'#dc2626',bg:'rgba(220,38,38,.1)'},due_soon:{label:'Due Soon',color:'#b45309',bg:'rgba(245,158,11,.1)'},ok:{label:'Up to Date',color:'#15803d',bg:'rgba(34,197,94,.1)'},unknown:{label:'Not Set',color:'#64748b',bg:'#f1f5f9'}}
  function renderGroup(key,items){
    if(!items.length)return''
    const c=cfg[key]
    return`<div style="margin-bottom:24px">
      <div class="section-head">
        <div class="section-dot" style="background:${c.color}"></div>
        <span class="section-title">${c.label}</span>
        <span class="section-count" style="background:${c.bg};color:${c.color}">${items.length}</span>
      </div>
      ${items.map(item=>`<div class="mitem" style="border-left:3px solid ${c.color};cursor:pointer" onclick="showMaintDetail('${item.id}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
          <div style="flex:1">
            <div style="font-size:.9rem;font-weight:700;color:#0f172a;margin-bottom:5px">${item.name}</div>
            <div style="display:flex;flex-wrap:wrap;gap:10px 16px">
              ${item.next_due_date?`<span style="font-size:.75rem;color:#64748b;display:flex;align-items:center;gap:4px"><span>📅</span>${fmtDate(item.next_due_date)}</span>`:''}
              ${item.next_due_mileage?`<span style="font-size:.75rem;color:#64748b;display:flex;align-items:center;gap:4px"><span>📍</span>${fmtMi(item.next_due_mileage)}</span>`:''}
              ${(item.oem_interval_months||item.oem_interval_miles)?`<span style="font-size:.75rem;color:#94a3b8">Every ${[item.oem_interval_miles?fmtMi(item.oem_interval_miles):null,item.oem_interval_months?item.oem_interval_months+'mo':null].filter(Boolean).join(' / ')}</span>`:''}
            </div>
            ${item.last_done_date?`<div style="font-size:.75rem;color:#94a3b8;margin-top:5px">Last done: ${fmtDate(item.last_done_date)}${item.last_done_mileage?' @ '+fmtMi(item.last_done_mileage):''}</div>`:''}
          </div>
          ${item.specialist_cost_min&&item.specialist_cost_min>0?`<div style="text-align:right;flex-shrink:0;margin-top:2px"><div style="font-size:.8125rem;font-weight:700;color:#1E7A8C">£${Math.round(item.specialist_cost_min)}–£${Math.round(item.specialist_cost_max)}</div><div style="font-size:.6875rem;color:#94a3b8;margin-top:1px">specialist est.</div></div>`:``}
        </div>
      </div>`).join('')}
    </div>`
  }
  $('content').innerHTML=`
    <div class="pg-head"><div class="pg-head-text"><h1>Maintenance Schedule</h1><p>${vName(vehicle)} · ${all.length} items tracked</p></div></div>
    ${all.length===0?`<div class="empty"><div class="empty-icon">📅</div><h3>No schedule loaded</h3><p>Open the AutoLog iPhone app to generate your vehicle's maintenance schedule from OEM data.</p></div>`:`
    <div style="background:#E8F4F6;border-radius:10px;padding:11px 14px;font-size:.8125rem;color:#1E7A8C;font-weight:500;margin-bottom:20px;display:flex;align-items:center;gap:8px"><span>ℹ️</span> Schedules are generated in the iOS app. Click any item to update its status.</div>
    ${renderGroup('overdue',groups.overdue)}
    ${renderGroup('due_soon',groups.due_soon)}
    ${renderGroup('ok',groups.ok)}
    ${renderGroup('unknown',groups.unknown)}`}
  `
})();

function showMaintDetail(id){
  const item=(window.allMaintItems||[]).find(i=>i.id===id)
  if(!item)return
  const today=new Date().toISOString().split('T')[0]
  const bg=document.createElement('div');bg.className='mbg'
  bg.innerHTML=`<div class="mo"><div class="mh"><h2>${item.name}</h2><button class="mc" type="button" onclick="this.closest('.mbg').remove()">✕</button></div><div class="mb">
    <div class="merr" id="md-err"></div>
    <div class="fg"><label class="fl">Status</label>
      <select class="fi" id="md-status">
        <option value="ok"${item.status==='ok'?' selected':''}>Up to Date</option>
        <option value="due_soon"${item.status==='due_soon'?' selected':''}>Due Soon</option>
        <option value="overdue"${item.status==='overdue'?' selected':''}>Overdue</option>
        <option value="unknown"${!item.status||item.status==='unknown'?' selected':''}>Not Set</option>
      </select>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">Next Due Date</label><input class="fi" type="date" id="md-ndd" value="${item.next_due_date||''}"></div>
      <div class="fg"><label class="fl">Next Due Mileage</label><input class="fi" type="number" id="md-ndm" placeholder="e.g. 60000" value="${item.next_due_mileage||''}"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">Last Done Date</label><input class="fi" type="date" id="md-ldd" value="${item.last_done_date||''}"></div>
      <div class="fg"><label class="fl">Last Done Mileage</label><input class="fi" type="number" id="md-ldm" placeholder="e.g. 55000" value="${item.last_done_mileage||''}"></div>
    </div>
    ${item.oem_interval_months||item.oem_interval_miles?`<div style="background:var(--teal-light);border-radius:9px;padding:9px 13px;font-size:.8125rem;color:var(--teal);margin-bottom:14px">🔄 OEM interval: ${[item.oem_interval_miles?Number(item.oem_interval_miles).toLocaleString('en-GB')+' mi':null,item.oem_interval_months?item.oem_interval_months+' months':null].filter(Boolean).join(' / ')}</div>`:''}
    <div class="mfooter" style="flex-direction:column;gap:8px">
      <button type="button" class="btn btn-primary" id="md-done-btn" onclick="markDoneToday('${item.id}')" style="width:100%;justify-content:center">✅ Mark as Done Today</button>
      <div style="display:flex;gap:8px;width:100%">
        <button type="button" class="btn btn-ghost btn-sm" onclick="this.closest('.mbg').remove()" style="flex:1">Cancel</button>
        <button type="button" class="btn btn-primary btn-sm" id="md-save" onclick="saveMaintItem('${item.id}')" style="flex:1">Save Changes</button>
      </div>
    </div>
  </div></div>`
  document.body.appendChild(bg)
  bg.addEventListener('click',e=>{if(e.target===bg)bg.remove()})
}

async function saveMaintItem(id){
  const btn=document.getElementById('md-save');btn.disabled=true;btn.textContent='Saving…'
  const{error}=await sb.from('maintenance_items').update({
    status:document.getElementById('md-status').value,
    next_due_date:document.getElementById('md-ndd').value||null,
    next_due_mileage:parseInt(document.getElementById('md-ndm').value)||null,
    last_done_date:document.getElementById('md-ldd').value||null,
    last_done_mileage:parseInt(document.getElementById('md-ldm').value)||null
  }).eq('id',id)
  if(error){
    const e=document.getElementById('md-err');e.textContent=error.message;e.classList.add('on')
    btn.disabled=false;btn.textContent='Save Changes';return
  }
  document.querySelector('.mbg').remove()
  location.reload()
}

async function markDoneToday(id){
  const btn=document.getElementById('md-done-btn');btn.disabled=true;btn.textContent='Saving…'
  const today=new Date().toISOString().split('T')[0]
  const curMileage=allVehicles.find(v=>v.id===vehicle?.id)?.current_mileage||null
  const{error}=await sb.from('maintenance_items').update({
    status:'ok',
    last_done_date:today,
    last_done_mileage:curMileage,
    next_due_date:null,
    next_due_mileage:null
  }).eq('id',id)
  if(error){
    const e=document.getElementById('md-err');e.textContent=error.message;e.classList.add('on')
    btn.disabled=false;btn.textContent='✅ Mark as Done Today';return
  }
  document.querySelector('.mbg').remove()
  location.reload()
}
</script>
</body>
</html>
