<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance — AutoLog</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{font-family:'Inter',-apple-system,sans-serif;background:#f8fafc;color:#475569;-webkit-font-smoothing:antialiased;display:flex;min-height:100vh}
h1,h2,h3{color:#0f172a;font-weight:700;line-height:1.2}a{text-decoration:none;color:inherit}
.sb{width:64px;min-height:100vh;background:#0f172a;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:200;transition:width .22s cubic-bezier(.4,0,.2,1);overflow:hidden}.sb:hover{width:220px}
.sb-logo{display:flex;align-items:center;gap:12px;padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.07);min-height:65px;overflow:hidden}.sb-logo img{width:32px;height:32px;border-radius:8px;flex-shrink:0}
.sb-logo-t{font-size:.9375rem;font-weight:700;color:#fff;white-space:nowrap;opacity:0;transform:translateX(-6px);transition:opacity .18s .04s,transform .18s .04s}.sb:hover .sb-logo-t{opacity:1;transform:translateX(0)}
.sb-nav{flex:1;padding:10px 0;display:flex;flex-direction:column;overflow:hidden}
.sb-a{display:flex;align-items:center;gap:13px;padding:11px 18px;color:rgba(255,255,255,.5);font-size:.875rem;font-weight:500;white-space:nowrap;transition:color .15s,background .15s;position:relative;text-decoration:none;border:none;background:none;font-family:inherit;cursor:pointer;width:100%}
.sb-a:hover{color:#fff;background:rgba(255,255,255,.06)}.sb-a.on{color:#fff;background:rgba(30,122,140,.28)}.sb-a.on::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;background:#1E7A8C;border-radius:0 3px 3px 0}
.sb-ic{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center}.sb-ic svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.sb-lb{opacity:0;transform:translateX(-6px);transition:opacity .18s .04s,transform .18s .04s;pointer-events:none}.sb:hover .sb-lb{opacity:1;transform:translateX(0)}
.sb-foot{padding:10px 0;border-top:1px solid rgba(255,255,255,.07)}.sb-out:hover{color:#FF3B30!important;background:rgba(255,59,48,.08)!important}
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199}.sb-ov.on{display:block}
.main{flex:1;margin-left:64px;min-height:100vh;display:flex;flex-direction:column}
.topbar{height:64px;background:#fff;border-bottom:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;gap:16px}
.topbar-title{font-size:1rem;font-weight:700;color:#0f172a}.topbar-r{display:flex;align-items:center;gap:12px}
.vpill{display:flex;align-items:center;gap:8px;background:#f8fafc;border:1px solid rgba(0,0,0,.08);border-radius:8px;padding:6px 12px;font-size:.875rem;font-weight:600;color:#0f172a}
.vdot{width:8px;height:8px;border-radius:50%;background:#1E7A8C;flex-shrink:0}
.content{flex:1;padding:28px;max-width:1200px;width:100%}.ph{margin-bottom:22px}.ph h1{font-size:1.5rem;letter-spacing:-.02em}.ph p{font-size:.875rem;color:#94a3b8;margin-top:4px}
.mitem{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:14px;color:#94a3b8;font-size:.875rem;width:100%}
.spin{width:32px;height:32px;border:3px solid rgba(30,122,140,.15);border-top-color:#1E7A8C;border-radius:50%;animation:sp .7s linear infinite}
.es{text-align:center;padding:48px 24px;color:#94a3b8}.es-ic{font-size:3rem;margin-bottom:14px;opacity:.4}.es h3{font-size:1rem;color:#475569;margin-bottom:8px}
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:#0f172a;color:#fff;padding:12px 20px;border-radius:10px;font-size:.875rem;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.2);max-width:320px;display:none}
.mob-btn{display:none;width:36px;height:36px;background:#f1f5f9;border:none;border-radius:9px;cursor:pointer;align-items:center;justify-content:center;color:#0f172a}.mob-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:768px){.sb{transform:translateX(-100%);width:220px!important;transition:transform .25s cubic-bezier(.4,0,.2,1)}.sb.open{transform:translateX(0)}.sb .sb-lb,.sb .sb-logo-t{opacity:1!important;transform:none!important}.sb-ov.on{display:block}.main{margin-left:0}.mob-btn{display:flex}.content{padding:20px 16px 32px}}
</style>
</head>
<body>
<aside class="sb" id="sb"><div class="sb-logo"><img src="/assets/logo.png" alt=""><span class="sb-logo-t">AutoLog</span></div><nav class="sb-nav" id="sb-nav"></nav><div class="sb-foot"><button class="sb-a sb-out" onclick="signOut()"><span class="sb-ic"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg></span><span class="sb-lb">Sign Out</span></button></div></aside>
<div class="sb-ov" id="sb-ov"></div>
<div class="main">
  <div class="topbar"><div style="display:flex;align-items:center;gap:12px"><button class="mob-btn" id="mob-btn"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><span class="topbar-title">Maintenance</span></div><div class="topbar-r" id="topbar-r"></div></div>
  <div class="content" id="content"><div class="ld"><div class="spin"></div><span>Loading…</span></div></div>
</div>
<div id="toast"></div>
<script>
const SURL='https://dkpvxlxarsmiljnvnbck.supabase.co',SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrcHZ4bHhhcnNtaWxqbnZuYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzM4MzIsImV4cCI6MjA5MDAwOTgzMn0.WJTRE_xmudj--jWSoA3e4ggYVORrFpoarBUkeaQN1Bw'
const sb=supabase.createClient(SURL,SKEY)
const NAV=[{id:'dashboard',label:'Dashboard',href:'/app/index.html',icon:'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>'},{id:'fuel',label:'Fuel Log',href:'/app/fuel.html',icon:'<svg viewBox="0 0 24 24"><path d="M3 22V8a2 2 0 012-2h8a2 2 0 012 2v14M3 22h14M7 22V12h4v10"/><path d="M19 8l2 2-2 2M19 10h-2V6a2 2 0 00-2-2"/></svg>'},{id:'service',label:'Service',href:'/app/service.html',icon:'<svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>'},{id:'maintenance',label:'Maintenance',href:'/app/maintenance.html',icon:'<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'},{id:'documents',label:'Documents',href:'/app/documents.html',icon:'<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>'},{id:'trips',label:'Trips',href:'/app/trips.html',icon:'<svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>'},{id:'settings',label:'Settings',href:'/app/settings.html',icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>'}]
document.getElementById('sb-nav').innerHTML=NAV.map(p=>`<a href="${p.href}" class="sb-a${p.id==='maintenance'?' on':''}"><span class="sb-ic">${p.icon}</span><span class="sb-lb">${p.label}</span></a>`).join('')
const sbEl=document.getElementById('sb'),sbOv=document.getElementById('sb-ov')
document.getElementById('mob-btn').onclick=()=>{sbEl.classList.toggle('open');sbOv.classList.toggle('on')}
sbOv.onclick=()=>{sbEl.classList.remove('open');sbOv.classList.remove('on')}
function signOut(){sb.auth.signOut().then(()=>location.href='/app/login.html')}
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
function fmtMi(n){return n!=null?Number(n).toLocaleString('en-GB')+' mi':'—'}
function vName(v){return v.nickname||[v.year,v.make,v.model].filter(Boolean).join(' ')||v.registration||'Vehicle'}
;(async()=>{
  const{data:{session}}=await sb.auth.getSession()
  if(!session){location.href='/app/login.html';return}
  const{data:vehicles}=await sb.from('vehicles').select('*').eq('owner_id',session.user.id).eq('is_active',true).order('created_at',{ascending:true})
  const all=vehicles||[]
  let selId=localStorage.getItem('al_vid')
  if(!selId||!all.find(v=>v.id===selId)){selId=all[0]?.id||null;if(selId)localStorage.setItem('al_vid',selId)}
  const vehicle=all.find(x=>x.id===selId)
  if(vehicle) document.getElementById('topbar-r').innerHTML=`<div class="vpill"><div class="vdot"></div><span>${vName(vehicle)}</span></div>`
  if(!vehicle){document.getElementById('content').innerHTML=`<div class="es"><div class="es-ic">📅</div><h3>No vehicle selected</h3></div>`;return}
  const{data:items}=await sb.from('maintenance_items').select('*').eq('vehicle_id',vehicle.id).order('name')
  const all2=items||[]
  const overdue=all2.filter(i=>i.status==='overdue'),soon=all2.filter(i=>i.status==='due_soon'),ok=all2.filter(i=>i.status==='ok'),unk=all2.filter(i=>!i.status||i.status==='unknown')
  const sc={overdue:'#FF3B30',due_soon:'#FF9500',ok:'#34C759',unknown:'#94a3b8'}
  function renderGroup(title,items,colour){
    if(!items.length)return''
    return`<div style="margin-bottom:24px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <div style="width:8px;height:8px;border-radius:50%;background:${colour}"></div>
        <span style="font-size:.875rem;font-weight:700;color:#0f172a">${title}</span>
        <span style="font-size:.75rem;font-weight:600;color:${colour};background:${colour}18;padding:2px 8px;border-radius:100px">${items.length}</span>
      </div>
      ${items.map(item=>`<div class="mitem" style="border-left:3px solid ${colour}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
          <div>
            <div style="font-size:.9rem;font-weight:700;color:#0f172a;margin-bottom:5px">${item.name}</div>
            <div style="display:flex;flex-wrap:wrap;gap:12px">
              ${item.next_due_date?`<span style="font-size:.75rem;color:#64748b">📅 ${fmtDate(item.next_due_date)}</span>`:''}
              ${item.next_due_mileage?`<span style="font-size:.75rem;color:#64748b">📍 ${fmtMi(item.next_due_mileage)}</span>`:''}
              ${(item.oem_interval_months||item.oem_interval_miles)?`<span style="font-size:.75rem;color:#94a3b8">Every ${[item.oem_interval_miles?fmtMi(item.oem_interval_miles):null,item.oem_interval_months?item.oem_interval_months+'mo':null].filter(Boolean).join(' or ')}</span>`:''}
            </div>
            ${item.last_done_date?`<div style="font-size:.75rem;color:#94a3b8;margin-top:4px">Last done: ${fmtDate(item.last_done_date)}${item.last_done_mileage?' @ '+fmtMi(item.last_done_mileage):''}</div>`:''}
          </div>
          ${item.specialist_cost_min&&item.specialist_cost_min>0?`<div style="text-align:right;flex-shrink:0"><div style="font-size:.8125rem;font-weight:700;color:#1E7A8C">£${Math.round(item.specialist_cost_min)}–£${Math.round(item.specialist_cost_max)}</div><div style="font-size:.7rem;color:#94a3b8">specialist</div></div>`:''}
        </div>
      </div>`).join('')}
    </div>`
  }
  document.getElementById('content').innerHTML=`
    <div class="ph"><h1>Maintenance Schedule</h1><p>${vName(vehicle)} · ${all2.length} items</p></div>
    ${all2.length===0?`<div class="es"><div class="es-ic">📅</div><h3>No schedule yet</h3><p>Open the AutoLog iPhone app to generate your vehicle's maintenance schedule.</p></div>`:`
    <div style="background:#E8F4F6;border-radius:10px;padding:11px 14px;font-size:.8125rem;color:#1E7A8C;font-weight:500;margin-bottom:20px">ℹ️ Maintenance schedules are managed in the iPhone app. View-only here.</div>
    ${renderGroup('Overdue',overdue,sc.overdue)}
    ${renderGroup('Due Soon',soon,sc.due_soon)}
    ${renderGroup('Up to Date',ok,sc.ok)}
    ${renderGroup('Not Yet Set',unk,sc.unknown)}`}
  `
})()
</script>
</body>
</html>
