function _lockedBanner(reason){
  const msg=reason==='locked_shared'?'This vehicle is shared with you. While on the free plan with your own vehicle, shared vehicles are view-only.':'You\u2019ve been using AutoLog+ with more than one vehicle. Upgrade to unlock write access to all your vehicles again.'
  return `<div class="locked-banner"><div class="locked-banner-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div><h3>AutoLog+ required</h3><p>${msg}</p><button class="btn btn-primary btn-sm" onclick="_openUpgradeModal('locked_vehicle')">Upgrade in iOS app \u2192</button></div>`
}
function _usageLimitModal(){
  const over=_usage.used>=_usage.limit
  const bg=document.createElement('div');bg.className='mbg'

    <p style="font-size:.875rem;color:var(--text-secondary);line-height:1.65;margin-bottom:14px">${over?'You\u2019ve used all '+_usage.limit+' of your uploads for this year.':'You have '+_usage.remaining+' upload'+(_usage.remaining===1?'':'s')+' left this year.'} ${_usage.plan==='free'?'Upgrading to AutoLog+ gives you 120 uploads per vehicle per year.':'Your quota resets on 1 January.'}</p>
    <div style="background:var(--surface-2);border-radius:10px;padding:14px 16px;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px"><span style="font-size:.8125rem;color:var(--text-secondary);font-weight:600">This year</span><span style="font-size:.875rem;color:var(--text-primary);font-weight:700;font-family:var(--font-mono)">${_usage.used} / ${_usage.limit}</span></div>
      <div class="usage-bar"><div class="usage-bar-fill ${over?'danger':(_usage.used/_usage.limit>0.8?'warn':'')}" style="width:${Math.min(100,(_usage.used/_usage.limit)*100)}%"></div></div>
    </div>
    <div class="mfooter" style="justify-content:center;gap:10px">${_usage.plan==='free'?`<button class="btn btn-primary btn-sm" onclick="this.closest('.mbg').remove();_openUpgradeModal('fuel_usage_limit')">Upgrade in iOS app \u2192</button>`:''}<button class="btn btn-ghost btn-sm" onclick="this.closest('.mbg').remove()">Close</button></div>
  </div></div>`
  document.body.appendChild(bg)
  bg.addEventListener('click',e=>{if(e.target===bg)bg.remove()})
}
async function _fetchUsage(){
  if(!userId)return
  const year=new Date().getFullYear()
  const limit=_isPro()?120:80
  try{
    const{data}=await sb.from('api_usage').select('call_count').eq('user_id',userId).eq('service','ocr').eq('year',year).is('month',null)
    const total=(data||[]).reduce((s,r)=>s+(r.call_count||0),0)
    _usage={used:total,limit,remaining:Math.max(0,limit-total),plan:_isPro()?'pro':'free',allowed:total<limit}
  }catch(e){_usage={used:0,limit,remaining:limit,plan:_isPro()?'pro':'free',allowed:true}}
}
async function _recordUsage(){
  if(!userId)return
  const year=new Date().getFullYear()
  try{
    const{data:existing}=await sb.from('api_usage').select('id,call_count').eq('user_id',userId).eq('service','ocr').eq('year',year).is('month',null).maybeSingle()
    if(existing){
      await sb.from('api_usage').update({call_count:(existing.call_count||0)+1,updated_at:new Date().toISOString()}).eq('id',existing.id)
    }else{
      await sb.from('api_usage').insert({user_id:userId,service:'ocr',year,month:null,call_count:1})
    }
    // refresh local copy
    _usage.used++;_usage.remaining=Math.max(0,_usage.limit-_usage.used);_usage.allowed=_usage.used<_usage.limit
  }catch(e){}
}
function _computeLocks(){
  if(_isPro()){_lockedSet=new Set();return}
  const owned=allVehicles.filter(v=>v.owner_id===userId)
  if(owned.length<=1){_lockedSet=new Set();return}
  const sorted=[...owned].sort((a,b)=>{const au=new Date(a.updated_at||a.created_at||0).getTime(),bu=new Date(b.updated_at||b.created_at||0).getTime();return bu-au})
  _lockedSet=new Set(sorted.slice(1).map(v=>v.id))
}
function _currentLockReason(){
  if(_isPro()||!vehicle)return null
  if(_lockedSet.has(vehicle.id))return 'locked_owned'
  const ownedCount=allVehicles.filter(v=>v.owner_id===userId).length
  if(vehicle.owner_id!==userId&&ownedCount>=1)return 'locked_shared'
  return null
}


// Task 9A: MPG colour coding
function mpgColor(mpg){
  if(!mpg) return '#94a3b8'
  if(mpg>=50) return '#15803d'   // excellent
  if(mpg>=35) return '#1E7A8C'   // good
  if(mpg>=25) return '#b45309'   // average
  return '#dc2626'               // poor
}

// Task 9B: Fuel type icon
function fuelIcon(fuelType){
  if(!fuelType) return '⛽'
  const t=fuelType.toLowerCase()
  if(t.includes('electric')) return '⚡'
  if(t.includes('hybrid')) return '🔋'
  if(t.includes('diesel')) return '🛢️'
  return '⛽'
}

function toggleVsw(){
  const d=$('vsw-drop');if(d){d.remove();$('vsw-btn').classList.remove('open');return}
  if(allVehicles.length<=1)return
  $('vsw-btn').classList.add('open')
  const drop=document.createElement('div');drop.id='vsw-drop';drop.className='vsw-drop'
  drop.innerHTML=allVehicles.map(v=>{
    const isLocked=_lockedSet.has(v.id)
    const isShared=v.owner_id!==userId
    let tag=''
    if(isLocked)tag='<span class="vsw-tag locked">Locked</span>'
    else if(isShared)tag='<span class="vsw-tag shared">Shared</span>'
    return `<div class="vsw-item${v.id===vehicle?.id?' cur':''}${isLocked?' locked':''}" onclick="switchV('${v.id}')"><div style="width:7px;height:7px;border-radius:50%;background:${v.id===vehicle?.id?'#1E7A8C':isLocked?'#B8C9D6':'#94a3b8'};flex-shrink:0"></div><div style="flex:1;min-width:0"><div>${vName(v)}${tag}</div>${v.registration?`<div class="vsw-item-reg">${v.registration.toUpperCase()}</div>`:''}</div></div>`
  }).join('')
  $('vsw').appendChild(drop)
  setTimeout(()=>document.addEventListener('click',()=>{const d=$('vsw-drop');if(d){d.remove();$('vsw-btn').classList.remove('open')}},{once:true}),10)
}
function switchV(id){localStorage.setItem('al_vid',id);location.reload()}
;(async()=>{
  const{data:{session}}=await sb.auth.getSession()
  if(!session){location.replace('/app/login');return}
  userId=session.user.id
  $('user-avatar').textContent=(session.user.email||'?')[0].toUpperCase()

    if(!_usage.allowed){_usageLimitModal();return}

  }

let allFuel=[]
function showPageError(msg){
  $('content').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><h3>Something went wrong</h3><p style="font-size:.875rem;color:var(--text-muted);margin-bottom:16px">${msg}</p><button class="btn btn-primary" onclick="load()">Try again</button></div>`
}
async function load(){
  if(window.AutoLogConsent&&window.AutoLogConsent.hasAnalyticsConsent()&&userId){
    if(!sessionStorage.getItem('al_evt_fuel_log_viewed')){
      try{await sb.from('analytics_events').insert({user_id:userId,event_name:'fuel_log_viewed',properties:{source:'web'}});sessionStorage.setItem('al_evt_fuel_log_viewed','1')}catch(e){}
    }
  }
  if(!vehicle){$('content').innerHTML=`<div class="empty"><div class="empty-icon">⛽</div><h3>No vehicle selected</h3></div>`;return}
  $('content').innerHTML='<div class="loading"><div class="spinner"></div><span>Loading…</span></div>'
  const{data:rows,error:fetchErr}=await sb.from('fuel_entries').select('*').eq('vehicle_id',vehicle.id).order('mileage_at_fill',{ascending:false})
  if(fetchErr){showPageError(fetchErr.message);return}
  allFuel=rows||[]
  const spend=allFuel.reduce((s,e)=>s+Number(e.total_cost||0),0)
  const litres=allFuel.reduce((s,e)=>s+Number(e.litres||0),0)
  const mpgs=allFuel.filter(e=>e.mpg).map(e=>Number(e.mpg))
  const avg=mpgs.length?mpgs.reduce((a,b)=>a+b)/mpgs.length:null
  // Derived stats
  const bestMpg=mpgs.length?Math.max(...mpgs):null
  const worstMpg=mpgs.length?Math.min(...mpgs):null
  const recentMpgs=allFuel.filter(e=>e.mpg).slice(0,8).map(e=>Number(e.mpg)).reverse()
  // Usage strip colours
  const pct=_usage.limit>0?(_usage.used/_usage.limit)*100:0
  const usageCls=pct>=100?'danger':pct>=80?'warn':''
  function _spark(values){
    if(!values||values.length<2)return ''
    const W=80,H=18,P=1.5
    const mn=Math.min(...values),mx=Math.max(...values),r=mx-mn||1
    const pts=values.map((v,i)=>{const x=(i/(values.length-1))*W;const y=H-P-((v-mn)/r)*(H-P*2);return x.toFixed(1)+','+y.toFixed(1)}).join(' ')
    return `<svg class="stat-mini-sparkline" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><polyline points="${pts}"/></svg>`
  }
  const lockReason=_currentLockReason()
  $('content').innerHTML=`
    <div class="pg-head"><div class="pg-head-text"><h1>Fuel Log</h1><p>${vName(vehicle)}${vehicle.owner_id!==userId?' <span class="chip chip-shared">Shared</span>':''}</p></div></div>
    ${lockReason?_lockedBanner(lockReason):''}
    <div class="stats-strip">
      <div class="stat-mini">
        <div class="stat-mini-head"><span class="stat-mini-label">Total Spend</span></div>
        <div class="stat-mini-value">£${spend.toFixed(0)}</div>
        <div class="stat-mini-sub">${allFuel.length} fill-up${allFuel.length===1?'':'s'}</div>
      </div>
      ${avg?`<div class="stat-mini">
        <div class="stat-mini-head"><span class="stat-mini-label">Avg MPG</span></div>
        <div class="stat-mini-value">${avg.toFixed(1)}</div>
        <div class="stat-mini-sub">${bestMpg?'best '+bestMpg.toFixed(1)+' · worst '+worstMpg.toFixed(1):'fuel economy'}</div>
        ${_spark(recentMpgs)}
      </div>`:''}
      <div class="stat-mini">
        <div class="stat-mini-head"><span class="stat-mini-label">Total Litres</span></div>
        <div class="stat-mini-value">${litres.toFixed(0)}L</div>
        <div class="stat-mini-sub">${spend&&litres?(spend/litres).toFixed(2)+'p/L avg':'—'}</div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-head"><span class="stat-mini-label">Uploads Used</span></div>
        <div class="stat-mini-value">${_usage.used}<span style="font-size:.8125rem;color:var(--text-muted);font-weight:600;margin-left:4px">/ ${_usage.limit}</span></div>
        <div class="stat-mini-sub">${_usage.plan==='pro'?'Premium · 120/vehicle/yr':'Free · 80/yr total'}</div>
        <div class="usage-bar" style="margin-top:6px"><div class="usage-bar-fill ${usageCls}" style="width:${Math.min(100,pct)}%"></div></div>
      </div>
    </div>
    <div class="card">
      ${allFuel.length===0?`<div class="empty"><div class="empty-icon">⛽</div><h3>No fill-ups yet</h3><p>Start tracking your fuel costs and MPG.</p><button class="btn btn-primary" style="margin-top:14px" onclick="showAdd()">Log First Fill-up</button></div>`:`
      <div class="card-head"><span class="card-title">Fill-up History</span><span style="font-size:.75rem;color:var(--text-muted)">Click a row to view & edit</span></div>
      <div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>Date</th><th>Mileage</th><th>Litres</th><th>MPG</th><th>p/L</th><th>Station</th><th style="text-align:right">Cost</th><th></th></tr></thead>
        <tbody>${allFuel.map((e,i)=>`<tr style="cursor:pointer" onclick="showFuelDetail(${i})">
          <td>${fmtDate(e.date)}</td>
          <td style="font-weight:500">${fmtMi(e.mileage_at_fill)}</td>
          <td>${e.litres?Number(e.litres).toFixed(1)+'L':'—'}</td>
          <td style="color:${mpgColor(e.mpg?Number(e.mpg):null)};font-weight:${e.mpg?600:400}">${e.mpg?Number(e.mpg).toFixed(1):'—'}</td>
          <td style="color:#64748b">${e.cost_per_litre?(Number(e.cost_per_litre)*100).toFixed(1)+'p':'—'}</td>
          <td style="color:#94a3b8;font-size:.8125rem">${e.station_name||'—'}</td>
          <td style="text-align:right;font-weight:700">${e.total_cost?fuelIcon(vehicle?.fuel_type)+' £'+Number(e.total_cost).toFixed(2):'—'}</td>
          <td><button class="btn-icon" onclick="event.stopPropagation();del('${e.id}')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button></td>
        </tr>`).join('')}</tbody>
      </table></div>`}
    </div>`
}
function showFuelDetail(i){
  const e=allFuel[i];if(!e)return
  const bg=document.createElement('div');bg.className='mbg'
  bg.innerHTML=`<div class="mo"><div class="mh"><h2>Fill-up Detail</h2><button class="mc" onclick="this.closest('.mbg').remove()">✕</button></div><div class="mb">
    <div class="merr" id="fed-err"></div>
    <div class="form-row">
      <div class="fg"><label class="fl">Date</label><input class="fi" type="date" id="fed-d" value="${e.date||''}"></div>
      <div class="fg"><label class="fl">Mileage</label><input class="fi" type="number" id="fed-m" value="${e.mileage_at_fill||''}"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label class="fl">Litres</label><input class="fi" type="number" step="0.01" id="fed-l" value="${e.litres||''}"></div>
      <div class="fg"><label class="fl">Total Cost (£)</label><input class="fi" type="number" step="0.01" id="fed-c" value="${e.total_cost||''}"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label class="fl">Cost per Litre (£)</label><input class="fi" type="number" step="0.001" id="fed-cpl" value="${e.cost_per_litre||''}"></div>
      <div class="fg"><label class="fl">Station</label><input class="fi" type="text" id="fed-st" value="${e.station_name||''}"></div>
    </div>
    <div class="fg"><label class="fl">Notes</label><input class="fi" type="text" id="fed-n" value="${(e.notes||'').replace(/"/g,'&quot;')}"></div>
    ${e.mpg?`<div style="background:var(--teal-light);border-radius:9px;padding:10px 13px;font-size:.875rem;color:var(--teal);font-weight:600;margin-bottom:14px">📈 ${Number(e.mpg).toFixed(1)} MPG calculated</div>`:''}
    <div class="mfooter">
      <button class="btn btn-danger btn-sm" onclick="del('${e.id}');this.closest('.mbg').remove()">Delete</button>
      <button class="btn btn-ghost btn-sm" onclick="this.closest('.mbg').remove()">Cancel</button>
      <button class="btn btn-primary btn-sm" id="fed-sv">Save Changes</button>
    </div>
  </div></div>`
  document.body.appendChild(bg)
  bg.addEventListener('click',ev=>{if(ev.target===bg)bg.remove()})
  const fuelEscH=e=>{if(e.key==='Escape'){bg.remove();document.removeEventListener('keydown',fuelEscH)}}
  document.addEventListener('keydown',fuelEscH)
  bg.querySelector('#fed-sv').onclick=async()=>{
    const btn=bg.querySelector('#fed-sv');btn.disabled=true;btn.textContent='Saving…'
    const{error}=await sb.from('fuel_entries').update({
      date:bg.querySelector('#fed-d').value||null,
      mileage_at_fill:parseInt(bg.querySelector('#fed-m').value)||null,
      litres:parseFloat(bg.querySelector('#fed-l').value)||null,
      total_cost:parseFloat(bg.querySelector('#fed-c').value)||null,
      cost_per_litre:parseFloat(bg.querySelector('#fed-cpl').value)||null,
      station_name:bg.querySelector('#fed-st').value||null,
      notes:bg.querySelector('#fed-n').value||null
    }).eq('id',e.id)
    if(error){const er=bg.querySelector('#fed-err');er.textContent=error.message;er.classList.add('on');btn.disabled=false;btn.textContent='Save Changes';return}
    const editedCost=parseFloat(bg.querySelector('#fed-c').value)||null
    if(editedCost){
      await sb.from('cost_entries').delete().eq('source_id',e.id)
      await sb.from('cost_entries').insert({vehicle_id:vehicle.id,user_id:userId,date:bg.querySelector('#fed-d').value||e.date,amount:editedCost,category:'fuel',source_id:e.id,source_table:'fuel_entries'})
    }
    bg.remove();toast('Fill-up updated ✓');await load()
  }
}
function showAdd(){
  const lr=_currentLockReason();if(lr){_openUpgradeModal('fuel_locked_vehicle');return}
  if(!_usage.allowed){_usageLimitModal();return}
  const bg=document.createElement('div');bg.className='mbg'
  const today=new Date().toISOString().split('T')[0]
  bg.innerHTML=`<div class="mo"><div class="mh"><h2>Log Fill-up</h2><button class="mc" onclick="this.closest('.mbg').remove()">✕</button></div><div class="mb">
    <div class="merr" id="merr"></div>
    <div class="form-row">
      <div class="fg"><label class="fl">Date</label><input class="fi" type="date" id="f-d" value="${today}"></div>
      <div class="fg"><label class="fl">Mileage at Fill</label><input class="fi" type="number" id="f-m" value="${vehicle?.current_mileage||''}"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label class="fl">Litres</label><input class="fi" type="number" step="0.01" id="f-l" placeholder="e.g. 45.23"></div>
      <div class="fg"><label class="fl">Total Cost (£)</label><input class="fi" type="number" step="0.01" id="f-c" placeholder="e.g. 68.50"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label class="fl">Cost per Litre (£)</label><input class="fi" type="number" step="0.001" id="f-cpl" placeholder="auto-calculated"></div>
      <div class="fg"><label class="fl">Station</label><input class="fi" type="text" id="f-st" placeholder="e.g. BP, Tesco"></div>
    </div>
    <div class="fg"><label class="fl">Notes</label><input class="fi" type="text" id="f-n"></div>
    <div class="mfooter"><button class="btn btn-ghost btn-sm" onclick="this.closest('.mbg').remove()">Cancel</button><button class="btn btn-primary btn-sm" id="f-sv">Save Fill-up</button></div>
  </div></div>`
  document.body.appendChild(bg)
  bg.addEventListener('click',e=>{if(e.target===bg)bg.remove()})
  const li=bg.querySelector('#f-l'),co=bg.querySelector('#f-c'),cp=bg.querySelector('#f-cpl')
  const calc=()=>{const l=parseFloat(li.value),c=parseFloat(co.value);if(l>0&&c>0)cp.value=(c/l).toFixed(3)}
  li.oninput=calc;co.oninput=calc
  bg.querySelector('#f-sv').onclick=async()=>{
    const mi=parseInt(bg.querySelector('#f-m').value)
    if(!mi){const e=bg.querySelector('#merr');e.textContent='Please enter mileage.';e.classList.add('on');return}
    const btn=bg.querySelector('#f-sv');btn.disabled=true;btn.textContent='Saving…'
    const fuelInsert=await sb.from('fuel_entries').insert({vehicle_id:vehicle.id,user_id:userId,date:bg.querySelector('#f-d').value,mileage_at_fill:mi,litres:parseFloat(li.value)||null,total_cost:parseFloat(co.value)||null,cost_per_litre:parseFloat(cp.value)||null,station_name:bg.querySelector('#f-st').value||null,notes:bg.querySelector('#f-n').value||null,source:'manual'}).select().single()
    if(fuelInsert.error){const e=bg.querySelector('#merr');e.textContent=fuelInsert.error.message;e.classList.add('on');btn.disabled=false;btn.textContent='Save Fill-up';return}
    const fuelCost=parseFloat(co.value)||null
    if(fuelInsert.data&&fuelCost){await sb.from('cost_entries').insert({vehicle_id:vehicle.id,user_id:userId,date:bg.querySelector('#f-d').value,amount:fuelCost,category:'fuel',source_id:fuelInsert.data.id,source_table:'fuel_entries'})}
    if(window.AutoLogConsent&&window.AutoLogConsent.hasAnalyticsConsent()){
      try{const{data:p}=await sb.from('profiles').select('first_action_completed').eq('id',userId).single();if(p&&!p.first_action_completed){await sb.from('analytics_events').insert({user_id:userId,event_name:'first_action_taken',properties:{source:'web',action_type:'fuel'}});await sb.from('profiles').update({first_action_completed:true}).eq('id',userId)}}catch(e){}
    }
    await _recordUsage()
    bg.remove();toast('Fill-up saved ✓');await load()
  }
}
async function del(id){
  if(!confirm('Delete this entry?'))return
  await sb.from('fuel_entries').delete().eq('id',id)
  await sb.from('cost_entries').delete().eq('source_id',id)
  toast('Deleted ✓');await load()
}
</script>
</body>
</html>
