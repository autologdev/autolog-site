<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuel Log — AutoLog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<script type="module">
import { supabase, requireAuth, getProfile, getVehicleDisplayName, getSelectedVehicleId, setSelectedVehicleId, formatMileage, formatCurrency, formatDate, showToast, renderSidebar, injectAppStyles, initSidebar } from './app.js'

injectAppStyles()

let vehicle = null
let allVehicles = []
let userId = null

async function init() {
  const session = await requireAuth()
  if (!session) return
  userId = session.user.id

  const { data: vehicles } = await supabase
    .from('vehicles').select('*').eq('owner_id', userId).eq('is_active', true).order('created_at', { ascending: true })
  allVehicles = vehicles || []

  let selectedId = getSelectedVehicleId()
  if (!selectedId || !allVehicles.find(v => v.id === selectedId)) {
    selectedId = allVehicles[0]?.id || null
    if (selectedId) setSelectedVehicleId(selectedId)
  }
  vehicle = allVehicles.find(v => v.id === selectedId)

  document.body.innerHTML = `
    ${renderSidebar('fuel')}
    <div class="app-main">
      <div class="app-topbar">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="mobile-menu-btn" id="mobile-menu-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <span class="app-topbar-title">Fuel Log</span>
        </div>
        <div class="app-topbar-right">
          ${vehicle ? `<div class="vehicle-switcher" style="cursor:default;"><div class="vehicle-switcher-dot"></div><span>${getVehicleDisplayName(vehicle)}</span></div>` : ''}
          <button class="btn btn-primary btn-sm" id="add-fuel-btn">+ Add Fill-up</button>
        </div>
      </div>
      <div class="app-content" id="main-content">
        <div class="loading-state"><div class="spinner"></div><span>Loading fuel log…</span></div>
      </div>
    </div>
  `
  initSidebar()
  document.getElementById('add-fuel-btn').addEventListener('click', () => showAddModal())
  await loadEntries()
}

async function loadEntries() {
  if (!vehicle) {
    document.getElementById('main-content').innerHTML = `<div class="empty-state"><div class="empty-state-icon">⛽</div><h3>No vehicle selected</h3><p>Add a vehicle in the AutoLog iPhone app.</p></div>`
    return
  }

  const { data: entries } = await supabase
    .from('fuel_entries').select('*')
    .eq('vehicle_id', vehicle.id)
    .order('mileage_at_fill', { ascending: false })

  const all = entries || []
  const totalSpend = all.reduce((s, e) => s + Number(e.total_cost || 0), 0)
  const totalLitres = all.reduce((s, e) => s + Number(e.litres || 0), 0)
  const mpgVals = all.filter(e => e.mpg).map(e => Number(e.mpg))
  const avgMpg = mpgVals.length ? mpgVals.reduce((a, b) => a + b, 0) / mpgVals.length : null

  document.getElementById('main-content').innerHTML = `
    <div class="page-header">
      <h1>Fuel Log</h1>
      <p>${getVehicleDisplayName(vehicle)}</p>
    </div>

    <div class="stats-grid" style="margin-bottom:24px;">
      <div class="stat-card">
        <div class="stat-card-label">Total Spend</div>
        <div class="stat-card-value">£${totalSpend.toFixed(0)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Total Litres</div>
        <div class="stat-card-value">${totalLitres.toFixed(0)}L</div>
      </div>
      ${avgMpg ? `<div class="stat-card"><div class="stat-card-label">Avg MPG</div><div class="stat-card-value">${avgMpg.toFixed(1)}</div></div>` : ''}
      <div class="stat-card">
        <div class="stat-card-label">Fill-ups</div>
        <div class="stat-card-value">${all.length}</div>
      </div>
    </div>

    <div class="card">
      ${all.length === 0 ? `
        <div class="empty-state">
          <div class="empty-state-icon">⛽</div>
          <h3>No fuel entries yet</h3>
          <p>Log your first fill-up to start tracking costs and economy.</p>
          <button class="btn btn-primary" style="margin-top:16px;" onclick="document.getElementById('add-fuel-btn').click()">Log First Fill-up</button>
        </div>
      ` : `
        <table class="data-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Mileage</th>
              <th>Litres</th>
              <th>MPG</th>
              <th>Station</th>
              <th style="text-align:right;">Cost</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${all.map(e => `
              <tr>
                <td>${formatDate(e.date)}</td>
                <td>${formatMileage(e.mileage_at_fill)}</td>
                <td>${e.litres ? Number(e.litres).toFixed(2) + 'L' : '—'}</td>
                <td style="color:${e.mpg ? '#1E7A8C' : '#94a3b8'};font-weight:${e.mpg ? '600' : '400'};">${e.mpg ? Number(e.mpg).toFixed(1) : '—'}</td>
                <td style="color:#94a3b8;">${e.station_name || '—'}</td>
                <td style="text-align:right;font-weight:700;color:#0f172a;">${e.total_cost ? '£' + Number(e.total_cost).toFixed(2) : '—'}</td>
                <td>
                  <button class="btn-icon" onclick="deleteEntry('${e.id}')" title="Delete">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                  </button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `}
    </div>
  `
  window.deleteEntry = deleteEntry
}

function showAddModal() {
  const backdrop = document.createElement('div')
  backdrop.className = 'modal-backdrop'
  backdrop.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h2>Log Fill-up</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="alert" id="modal-error" style="display:none;background:rgba(255,59,48,0.08);color:#cc1a12;border:1px solid rgba(255,59,48,0.2);padding:11px 14px;border-radius:10px;font-size:0.875rem;margin-bottom:16px;"></div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Date</label>
            <input class="form-input" type="date" id="f-date" value="${new Date().toISOString().split('T')[0]}">
          </div>
          <div class="form-group">
            <label class="form-label">Mileage at Fill</label>
            <input class="form-input" type="number" id="f-mileage" placeholder="${vehicle?.current_mileage || ''}" value="${vehicle?.current_mileage || ''}">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Litres</label>
            <input class="form-input" type="number" step="0.01" id="f-litres" placeholder="e.g. 45.23">
          </div>
          <div class="form-group">
            <label class="form-label">Total Cost (£)</label>
            <input class="form-input" type="number" step="0.01" id="f-cost" placeholder="e.g. 68.50">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Cost per Litre (£)</label>
            <input class="form-input" type="number" step="0.001" id="f-cpl" placeholder="e.g. 1.489">
          </div>
          <div class="form-group">
            <label class="form-label">Station (optional)</label>
            <input class="form-input" type="text" id="f-station" placeholder="e.g. BP, Tesco">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notes (optional)</label>
          <input class="form-input" type="text" id="f-notes" placeholder="Any notes…">
        </div>
        <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:8px;">
          <button class="btn btn-outline" id="modal-cancel">Cancel</button>
          <button class="btn btn-primary" id="modal-save">Save Fill-up</button>
        </div>
      </div>
    </div>
  `
  document.body.appendChild(backdrop)

  // Auto-calc cost per litre
  const litresInput = backdrop.querySelector('#f-litres')
  const costInput = backdrop.querySelector('#f-cost')
  const cplInput = backdrop.querySelector('#f-cpl')
  const calcCpl = () => {
    const l = parseFloat(litresInput.value), c = parseFloat(costInput.value)
    if (l > 0 && c > 0) cplInput.value = (c / l).toFixed(3)
  }
  litresInput.addEventListener('input', calcCpl)
  costInput.addEventListener('input', calcCpl)

  backdrop.querySelector('#modal-close').addEventListener('click', () => backdrop.remove())
  backdrop.querySelector('#modal-cancel').addEventListener('click', () => backdrop.remove())
  backdrop.addEventListener('click', e => { if (e.target === backdrop) backdrop.remove() })

  backdrop.querySelector('#modal-save').addEventListener('click', async () => {
    const mileage = parseInt(backdrop.querySelector('#f-mileage').value)
    if (!mileage) {
      const err = backdrop.querySelector('#modal-error')
      err.textContent = 'Please enter the mileage at fill.'
      err.style.display = 'block'
      return
    }
    const btn = backdrop.querySelector('#modal-save')
    btn.disabled = true
    btn.textContent = 'Saving…'

    const { error } = await supabase.from('fuel_entries').insert({
      vehicle_id: vehicle.id,
      user_id: userId,
      date: backdrop.querySelector('#f-date').value,
      mileage_at_fill: mileage,
      litres: parseFloat(backdrop.querySelector('#f-litres').value) || null,
      total_cost: parseFloat(backdrop.querySelector('#f-cost').value) || null,
      cost_per_litre: parseFloat(backdrop.querySelector('#f-cpl').value) || null,
      station_name: backdrop.querySelector('#f-station').value || null,
      notes: backdrop.querySelector('#f-notes').value || null,
      source: 'manual',
    })

    if (error) {
      const err = backdrop.querySelector('#modal-error')
      err.textContent = error.message
      err.style.display = 'block'
      btn.disabled = false
      btn.textContent = 'Save Fill-up'
      return
    }
    backdrop.remove()
    showToast('Fill-up logged ✓')
    await loadEntries()
  })
}

async function deleteEntry(id) {
  if (!confirm('Delete this fuel entry?')) return
  await supabase.from('fuel_entries').delete().eq('id', id)
  await supabase.from('cost_entries').delete().eq('source_id', id).eq('source_table', 'fuel_entries')
  showToast('Entry deleted', 'error')
  await loadEntries()
}

init()
</script>
</body>
</html>
