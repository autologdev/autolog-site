<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Log — AutoLog</title>
<link rel="stylesheet" href="/app/app-theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<aside class="sb" id="sb">
  <div class="sb-logo"><img src="/assets/logo.png" alt="AutoLog"><span class="sb-logo-text">AutoLog</span></div>
  <nav class="sb-nav">
    <a href="/app/dashboard" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span><span class="sb-label">Dashboard</span></a>
    <a href="/app/fuel" class="sb-link active"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M3 22V8a2 2 0 012-2h8a2 2 0 012 2v14M3 22h14M7 22V12h4v10"/><path d="M19 8l2 2-2 2M19 10h-2V6a2 2 0 00-2-2"/></svg></span><span class="sb-label">Fuel Log</span></a>
    <a href="/app/service" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg></span><span class="sb-label">Service History</span></a>
    <a href="/app/maintenance" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span><span class="sb-label">Maintenance</span></a>
    <a href="/app/documents" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span><span class="sb-label">Documents</span></a>
    <a href="/app/trips" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg></span><span class="sb-label">Trips</span></a>
    <div class="sb-divider"></div>
    <a href="/app/settings" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span><span class="sb-label">Settings</span></a>
  </nav>
  <div class="sb-bottom"><button class="sb-link sb-signout" onclick="doSignOut()"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span><span class="sb-label">Sign Out</span></button></div>
</aside>
<div class="sb-overlay" id="sb-ov"></div>
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="mob-menu" id="mob-menu-btn"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <span class="page-title">Fuel Log</span>
    </div>
    <div class="topbar-right">
      <div class="vsw" id="vsw"><button class="vsw-btn" id="vsw-btn" onclick="toggleVsw()"><div class="vsw-dot"></div><span class="vsw-name" id="vsw-name">…</span><span class="vsw-chevron"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></span></button></div>
      <button class="btn btn-primary btn-sm" id="add-btn">+ Add Fill-up</button>
      <div class="user-pill"><div class="user-avatar" id="user-avatar">?</div></div>
    </div>
  </div>
  <div class="content" id="content"><div class="loading"><div class="spinner"></div><span>Loading…</span></div></div>
</div>
<div id="toast"></div>
<script>
const SURL='https://dkpvxlxarsmiljnvnbck.supabase.co',SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrcHZ4bHhhcnNtaWxqbnZuYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzM4MzIsImV4cCI6MjA5MDAwOTgzMn0.WJTRE_xmudj--jWSoA3e4ggYVORrFpoarBUkeaQN1Bw'
const sb=supabase.createClient(SURL,SKEY)
const $=id=>document.getElementById(id)
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
function fmtMi(n){return n!=null?Number(n).toLocaleString('en-GB')+' mi':'—'}
function vName(v){return v.nickname||[v.year,v.make,v.model].filter(Boolean).join(' ')||v.registration||'Vehicle'}
function toast(msg,ok=true){const el=$('toast');el.textContent=msg;el.style.borderLeft='3px solid '+(ok?'#22c55e':'#ef4444');el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',3500)}
function doSignOut(){sb.auth.signOut().then(()=>location.href='/app/login')}
const sbEl=$('sb'),sbOv=$('sb-ov')
$('mob-menu-btn').onclick=()=>{sbEl.classList.toggle('open');sbOv.classList.toggle('on')}
sbOv.onclick=()=>{sbEl.classList.remove('open');sbOv.classList.remove('on')}
let allVehicles=[],vehicle=null,userId=null
function toggleVsw(){
  const d=$('vsw-drop');if(d){d.remove();$('vsw-btn').classList.remove('open');return}
  if(allVehicles.length<=1)return
  $('vsw-btn').classList.add('open')
  const drop=document.createElement('div');drop.id='vsw-drop';drop.className='vsw-drop'
  drop.innerHTML=allVehicles.map(v=>`<div class="vsw-item${v.id===vehicle?.id?' cur':''}" onclick="switchV('${v.id}')"><div style="width:7px;height:7px;border-radius:50%;background:${v.id===vehicle?.id?'#1E7A8C':'#94a3b8'};flex-shrink:0"></div><div><div>${vName(v)}</div>${v.registration?`<div class="vsw-item-reg">${v.registration.toUpperCase()}</div>`:''}</div></div>`).join('')
  $('vsw').appendChild(drop)
  setTimeout(()=>document.addEventListener('click',()=>{const d=$('vsw-drop');if(d){d.remove();$('vsw-btn').classList.remove('open')}},{once:true}),10)
}
function switchV(id){localStorage.setItem('al_vid',id);location.reload()}
;(async()=>{
  const{data:{session}}=await sb.auth.getSession()
  if(!session){location.replace('/app/login');return}
  userId=session.user.id
  $('user-avatar').textContent=(session.user.email||'?')[0].toUpperCase()
  const[{data:veh},{data:prof}]=await Promise.all([
    sb.from('vehicles').select('*').eq('owner_id',userId).eq('is_active',true).order('created_at',{ascending:true}),
    sb.from('profiles').select('display_name').eq('id',userId).single()
  ])
  allVehicles=veh||[]
  if(prof?.display_name) $('user-avatar').textContent=prof.display_name[0].toUpperCase()
  let selId=localStorage.getItem('al_vid')
  if(!selId||!allVehicles.find(v=>v.id===selId)){selId=allVehicles[0]?.id||null;if(selId)localStorage.setItem('al_vid',selId)}
  vehicle=allVehicles.find(v=>v.id===selId)||null
  $('vsw-name').textContent=vehicle?vName(vehicle):'No vehicle'
  if(allVehicles.length<=1)$('vsw-btn').style.cursor='default'
  $('add-btn').onclick=showAdd
  await load()
})()
let allFuel=[]
function showPageError(msg){
  $('content').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><h3>Something went wrong</h3><p style="font-size:.875rem;color:var(--text-muted);margin-bottom:16px">${msg}</p><button class="btn btn-primary" onclick="load()">Try again</button></div>`
}
async function load(){
  if(!vehicle){$('content').innerHTML=`<div class="empty"><div class="empty-icon">⛽</div><h3>No vehicle selected</h3></div>`;return}
  $('content').innerHTML='<div class="loading"><div class="spinner"></div><span>Loading…</span></div>'
  const{data:rows,error:fetchErr}=await sb.from('fuel_entries').select('*').eq('vehicle_id',vehicle.id).order('mileage_at_fill',{ascending:false})
  if(fetchErr){showPageError(fetchErr.message);return}
  allFuel=rows||[]
  const spend=allFuel.reduce((s,e)=>s+Number(e.total_cost||0),0)
  const litres=allFuel.reduce((s,e)=>s+Number(e.litres||0),0)
  const mpgs=allFuel.filter(e=>e.mpg).map(e=>Number(e.mpg))
  const avg=mpgs.length?mpgs.reduce((a,b)=>a+b)/mpgs.length:null
  $('content').innerHTML=`
    <div class="pg-head"><div><h1>Fuel Log</h1><p>${vName(vehicle)}</p></div></div>
    <div class="stats">
      <div class="stat"><div class="stat-l">Total Spend</div><div class="stat-v">£${spend.toFixed(0)}</div></div>
      <div class="stat"><div class="stat-l">Total Litres</div><div class="stat-v">${litres.toFixed(0)}L</div></div>
      ${avg?`<div class="stat"><div class="stat-l">Avg MPG</div><div class="stat-v">${avg.toFixed(1)}</div></div>`:''}
      <div class="stat"><div class="stat-l">Fill-ups</div><div class="stat-v">${allFuel.length}</div></div>
    </div>
    <div class="card">
      ${allFuel.length===0?`<div class="empty"><div class="empty-icon">⛽</div><h3>No fill-ups yet</h3><p>Start tracking your fuel costs and MPG.</p><button class="btn btn-primary" style="margin-top:14px" onclick="showAdd()">Log First Fill-up</button></div>`:`
      <div class="card-head"><span class="card-title">Fill-up History</span><span style="font-size:.75rem;color:var(--text-muted)">Click a row to view & edit</span></div>
      <div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>Date</th><th>Mileage</th><th>Litres</th><th>MPG</th><th>p/L</th><th>Station</th><th style="text-align:right">Cost</th><th></th></tr></thead>
        <tbody>${allFuel.map((e,i)=>`<tr style="cursor:pointer" onclick="showFuelDetail(${i})">
          <td>${fmtDate(e.date)}</td>
          <td style="font-weight:500">${fmtMi(e.mileage_at_fill)}</td>
          <td>${e.litres?Number(e.litres).toFixed(1)+'L':'—'}</td>
          <td style="color:${e.mpg?'#1A7A8C':'#94a3b8'};font-weight:${e.mpg?600:400}">${e.mpg?Number(e.mpg).toFixed(1):'—'}</td>
          <td style="color:#64748b">${e.cost_per_litre?'£'+Number(e.cost_per_litre).toFixed(3):'—'}</td>
          <td style="color:#94a3b8;font-size:.8125rem">${e.station_name||'—'}</td>
          <td style="text-align:right;font-weight:700">${e.total_cost?'£'+Number(e.total_cost).toFixed(2):'—'}</td>
          <td><button class="btn-icon" onclick="event.stopPropagation();del('${e.id}')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button></td>
        </tr>`).join('')}</tbody>
      </table></div>`}
    </div>`
}
function showFuelDetail(i){
  const e=allFuel[i];if(!e)return
  const bg=document.createElement('div');bg.className='mbg'
  bg.innerHTML=`<div class="mo"><div class="mh"><h2>Fill-up Detail</h2><button class="mc" onclick="this.closest('.mbg').remove()">✕</button></div><div class="mb">
    <div class="merr" id="fed-err"></div>
    <div class="form-row">
      <div class="fg"><label class="fl">Date</label><input class="fi" type="date" id="fed-d" value="${e.date||''}"></div>
      <div class="fg"><label class="fl">Mileage</label><input class="fi" type="number" id="fed-m" value="${e.mileage_at_fill||''}"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label class="fl">Litres</label><input class="fi" type="number" step="0.01" id="fed-l" value="${e.litres||''}"></div>
      <div class="fg"><label class="fl">Total Cost (£)</label><input class="fi" type="number" step="0.01" id="fed-c" value="${e.total_cost||''}"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label class="fl">Cost per Litre (£)</label><input class="fi" type="number" step="0.001" id="fed-cpl" value="${e.cost_per_litre||''}"></div>
      <div class="fg"><label class="fl">Station</label><input class="fi" type="text" id="fed-st" value="${e.station_name||''}"></div>
    </div>
    <div class="fg"><label class="fl">Notes</label><input class="fi" type="text" id="fed-n" value="${(e.notes||'').replace(/"/g,'&quot;')}"></div>
    ${e.mpg?`<div style="background:var(--teal-light);border-radius:9px;padding:10px 13px;font-size:.875rem;color:var(--teal);font-weight:600;margin-bottom:14px">📈 ${Number(e.mpg).toFixed(1)} MPG calculated</div>`:''}
    <div class="mfooter">
      <button class="btn btn-danger btn-sm" onclick="del('${e.id}');this.closest('.mbg').remove()">Delete</button>
      <button class="btn btn-ghost btn-sm" onclick="this.closest('.mbg').remove()">Cancel</button>
      <button class="btn btn-primary btn-sm" id="fed-sv">Save Changes</button>
    </div>
  </div></div>`
  document.body.appendChild(bg)
  bg.addEventListener('click',ev=>{if(ev.target===bg)bg.remove()})
  bg.querySelector('#fed-sv').onclick=async()=>{
    const btn=bg.querySelector('#fed-sv');btn.disabled=true;btn.textContent='Saving…'
    const{error}=await sb.from('fuel_entries').update({
      date:bg.querySelector('#fed-d').value||null,
      mileage_at_fill:parseInt(bg.querySelector('#fed-m').value)||null,
      litres:parseFloat(bg.querySelector('#fed-l').value)||null,
      total_cost:parseFloat(bg.querySelector('#fed-c').value)||null,
      cost_per_litre:parseFloat(bg.querySelector('#fed-cpl').value)||null,
      station_name:bg.querySelector('#fed-st').value||null,
      notes:bg.querySelector('#fed-n').value||null
    }).eq('id',e.id)
    if(error){const er=bg.querySelector('#fed-err');er.textContent=error.message;er.classList.add('on');btn.disabled=false;btn.textContent='Save Changes';return}
    const editedCost=parseFloat(bg.querySelector('#fed-c').value)||null
    if(editedCost){
      await sb.from('cost_entries').delete().eq('source_id',e.id)
      await sb.from('cost_entries').insert({vehicle_id:vehicle.id,user_id:userId,date:bg.querySelector('#fed-d').value||e.date,amount:editedCost,category:'fuel',source_id:e.id,source_table:'fuel_entries'})
    }
    bg.remove();toast('Fill-up updated ✓');await load()
  }
}
function showAdd(){
  const bg=document.createElement('div');bg.className='mbg'
  const today=new Date().toISOString().split('T')[0]
  bg.innerHTML=`<div class="mo"><div class="mh"><h2>Log Fill-up</h2><button class="mc" onclick="this.closest('.mbg').remove()">✕</button></div><div class="mb">
    <div class="merr" id="merr"></div>
    <div class="form-row">
      <div class="fg"><label class="fl">Date</label><input class="fi" type="date" id="f-d" value="${today}"></div>
      <div class="fg"><label class="fl">Mileage at Fill</label><input class="fi" type="number" id="f-m" value="${vehicle?.current_mileage||''}"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label class="fl">Litres</label><input class="fi" type="number" step="0.01" id="f-l" placeholder="e.g. 45.23"></div>
      <div class="fg"><label class="fl">Total Cost (£)</label><input class="fi" type="number" step="0.01" id="f-c" placeholder="e.g. 68.50"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label class="fl">Cost per Litre (£)</label><input class="fi" type="number" step="0.001" id="f-cpl" placeholder="auto-calculated"></div>
      <div class="fg"><label class="fl">Station</label><input class="fi" type="text" id="f-st" placeholder="e.g. BP, Tesco"></div>
    </div>
    <div class="fg"><label class="fl">Notes</label><input class="fi" type="text" id="f-n"></div>
    <div class="mfooter"><button class="btn btn-ghost btn-sm" onclick="this.closest('.mbg').remove()">Cancel</button><button class="btn btn-primary btn-sm" id="f-sv">Save Fill-up</button></div>
  </div></div>`
  document.body.appendChild(bg)
  bg.addEventListener('click',e=>{if(e.target===bg)bg.remove()})
  const li=bg.querySelector('#f-l'),co=bg.querySelector('#f-c'),cp=bg.querySelector('#f-cpl')
  const calc=()=>{const l=parseFloat(li.value),c=parseFloat(co.value);if(l>0&&c>0)cp.value=(c/l).toFixed(3)}
  li.oninput=calc;co.oninput=calc
  bg.querySelector('#f-sv').onclick=async()=>{
    const mi=parseInt(bg.querySelector('#f-m').value)
    if(!mi){const e=bg.querySelector('#merr');e.textContent='Please enter mileage.';e.classList.add('on');return}
    const btn=bg.querySelector('#f-sv');btn.disabled=true;btn.textContent='Saving…'
    const fuelInsert=await sb.from('fuel_entries').insert({vehicle_id:vehicle.id,user_id:userId,date:bg.querySelector('#f-d').value,mileage_at_fill:mi,litres:parseFloat(li.value)||null,total_cost:parseFloat(co.value)||null,cost_per_litre:parseFloat(cp.value)||null,station_name:bg.querySelector('#f-st').value||null,notes:bg.querySelector('#f-n').value||null,source:'manual'}).select().single()
    if(fuelInsert.error){const e=bg.querySelector('#merr');e.textContent=fuelInsert.error.message;e.classList.add('on');btn.disabled=false;btn.textContent='Save Fill-up';return}
    const fuelCost=parseFloat(co.value)||null
    if(fuelInsert.data&&fuelCost){await sb.from('cost_entries').insert({vehicle_id:vehicle.id,user_id:userId,date:bg.querySelector('#f-d').value,amount:fuelCost,category:'fuel',source_id:fuelInsert.data.id,source_table:'fuel_entries'})}
    bg.remove();toast('Fill-up saved ✓');await load()
  }
}
async function del(id){
  if(!confirm('Delete this entry?'))return
  await sb.from('fuel_entries').delete().eq('id',id)
  await sb.from('cost_entries').delete().eq('source_id',id)
  toast('Deleted ✓');await load()
}
</script>
</body>
</html>
