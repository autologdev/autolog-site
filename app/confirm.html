<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm your account — AutoLog</title>
<link rel="stylesheet" href="/app/app-theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.confirm-wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#f1f5f9;
  padding:24px;
}
.confirm-card{
  background:#fff;
  border-radius:20px;
  padding:48px 40px;
  max-width:440px;
  width:100%;
  text-align:center;
  box-shadow:0 8px 40px rgba(0,0,0,0.08);
}
.confirm-icon{
  width:72px;height:72px;
  border-radius:50%;
  background:#E8F4F6;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;
  font-size:2rem;
}
.confirm-card h1{
  font-size:1.375rem;
  font-weight:800;
  color:#0f172a;
  margin-bottom:10px;
}
.confirm-card p{
  font-size:.9375rem;
  color:#64748b;
  line-height:1.7;
  margin-bottom:28px;
}
.confirm-err{
  background:rgba(239,68,68,.08);
  color:#dc2626;
  border:1px solid rgba(239,68,68,.2);
  border-radius:10px;
  padding:12px 16px;
  font-size:.875rem;
  margin-bottom:20px;
  display:none;
}
.confirm-err.on{display:block;}
</style>
</head>
<body>
<div class="confirm-wrap">
  <div class="confirm-card">
    <div class="confirm-icon">✉️</div>
    <h1>Confirm your email</h1>
    <p>Click the button below to activate your AutoLog account and start tracking your vehicle.</p>
    <div class="confirm-err" id="conf-err"></div>
    <button class="btn btn-primary" id="conf-btn" onclick="confirmAccount()" style="width:100%;justify-content:center;font-size:1rem;padding:16px;">
      Activate my account →
    </button>
    <p style="font-size:.8125rem;color:#94a3b8;margin-top:16px;margin-bottom:0;">
      Wrong link? <a href="/app/login" style="color:#1E7A8C;">Sign in</a>
    </p>
  </div>
</div>
<script>
const SURL='https://dkpvxlxarsmiljnvnbck.supabase.co'
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrcHZ4bHhhcnNtaWxqbnZuYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzM4MzIsImV4cCI6MjA5MDAwOTgzMn0.WJTRE_xmudj--jWSoA3e4ggYVORrFpoarBUkeaQN1Bw'
const sb = supabase.createClient(SURL, SKEY)

async function confirmAccount() {
  const btn = document.getElementById('conf-btn')
  const err = document.getElementById('conf-err')
  btn.disabled = true
  btn.textContent = 'Activating…'
  err.classList.remove('on')

  // Get token_hash and type from URL params
  const params = new URLSearchParams(location.search)
  const tokenHash = params.get('token_hash')
  const type = params.get('type')
  const reg = params.get('reg')

  if (!tokenHash || !type) {
    err.textContent = 'Invalid confirmation link. Please request a new one.'
    err.classList.add('on')
    btn.disabled = false
    btn.textContent = 'Activate my account →'
    return
  }

  // Exchange the token — only happens on user click, not scanner pre-fetch
  const { error } = await sb.auth.verifyOtp({ token_hash: tokenHash, type: type })

  if (error) {
    if (error.message.includes('expired') || error.message.includes('not found')) {
      err.innerHTML = 'This link has expired or already been used. <a href="/app/login" style="color:#1E7A8C;">Sign in</a> if your account is already active, or sign up again.'
    } else {
      err.textContent = error.message
    }
    err.classList.add('on')
    btn.disabled = false
    btn.textContent = 'Activate my account →'
    return
  }

  // Success — redirect to dashboard, carrying reg param if present
  btn.textContent = '✅ Account activated!'
  setTimeout(() => {
    location.replace(reg ? '/app/dashboard?reg=' + encodeURIComponent(reg) : '/app/dashboard')
  }, 800)
}
</script>
</body>
</html>
