function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}

const _isPro=()=>_plan==='paid'||_plan==='business'

function _lockedBanner(reason){
  const msg=reason==='locked_shared'?'This vehicle is shared with you. While on the free plan with your own vehicle, shared vehicles are view-only.':'You\u2019ve been using AutoLog+ with more than one vehicle. Upgrade to unlock write access to all your vehicles again.'
  return `<div class="locked-banner"><div class="locked-banner-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div><h3>AutoLog+ required</h3><p>${msg}</p><button class="btn btn-primary btn-sm" onclick="_openUpgradeModal('locked_vehicle')">Upgrade in iOS app \u2192</button></div>`
}
function _usageLimitModal(){
  const over=_usage.used>=_usage.limit
  const bg=document.createElement('div');bg.className='mbg'
  bg.innerHTML=`<div class="mo"><div class="mh"><h2>${over?'Upload limit reached':'Approaching upload limit'}</h2><button class="mc" onclick="this.closest('.mbg').remove()">\u2715</button></div><div class="mb">
    <p style="font-size:.875rem;color:var(--text-secondary);line-height:1.65;margin-bottom:14px">${over?'You\u2019ve used all '+_usage.limit+' of your uploads for this year.':'You have '+_usage.remaining+' upload'+(_usage.remaining===1?'':'s')+' left this year.'} ${_usage.plan==='free'?'Upgrading to AutoLog+ gives you 120 uploads per vehicle per year.':'Your quota resets on 1 January.'}</p>
    <div style="background:var(--surface-2);border-radius:10px;padding:14px 16px;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px"><span style="font-size:.8125rem;color:var(--text-secondary);font-weight:600">This year</span><span style="font-size:.875rem;color:var(--text-primary);font-weight:700;font-family:var(--font-mono)">${_usage.used} / ${_usage.limit}</span></div>
      <div class="usage-bar"><div class="usage-bar-fill ${over?'danger':(_usage.used/_usage.limit>0.8?'warn':'')}" style="width:${Math.min(100,(_usage.used/_usage.limit)*100)}%"></div></div>
    </div>
    <div class="mfooter" style="justify-content:center;gap:10px">${_usage.plan==='free'?`<button class="btn btn-primary btn-sm" onclick="this.closest('.mbg').remove();_openUpgradeModal('service_usage_limit')">Upgrade in iOS app \u2192</button>`:''}<button class="btn btn-ghost btn-sm" onclick="this.closest('.mbg').remove()">Close</button></div>
  </div></div>`
  document.body.appendChild(bg)
  bg.addEventListener('click',e=>{if(e.target===bg)bg.remove()})
}
async function _fetchUsage(){
  if(!userId)return
  const year=new Date().getFullYear()
  const limit=_isPro()?120:80
  try{
    const{data}=await sb.from('api_usage').select('call_count').eq('user_id',userId).eq('service','ocr').eq('year',year).is('month',null)
    const total=(data||[]).reduce((s,r)=>s+(r.call_count||0),0)
    _usage={used:total,limit,remaining:Math.max(0,limit-total),plan:_isPro()?'pro':'free',allowed:total<limit}
  }catch(e){_usage={used:0,limit,remaining:limit,plan:_isPro()?'pro':'free',allowed:true}}
}
async function _recordUsage(){
  if(!userId)return
  const year=new Date().getFullYear()
  try{
    const{data:existing}=await sb.from('api_usage').select('id,call_count').eq('user_id',userId).eq('service','ocr').eq('year',year).is('month',null).maybeSingle()
    if(existing){await sb.from('api_usage').update({call_count:(existing.call_count||0)+1,updated_at:new Date().toISOString()}).eq('id',existing.id)}
    else{await sb.from('api_usage').insert({user_id:userId,service:'ocr',year,month:null,call_count:1})}
    _usage.used++;_usage.remaining=Math.max(0,_usage.limit-_usage.used);_usage.allowed=_usage.used<_usage.limit
  }catch(e){}
}
function _computeLocks(){
  if(_isPro()){_lockedSet=new Set();return}
  const owned=allVehicles.filter(v=>v.owner_id===userId)
  if(owned.length<=1){_lockedSet=new Set();return}
  const sorted=[...owned].sort((a,b)=>{const au=new Date(a.updated_at||a.created_at||0).getTime(),bu=new Date(b.updated_at||b.created_at||0).getTime();return bu-au})
  _lockedSet=new Set(sorted.slice(1).map(v=>v.id))
}
function _currentLockReason(){
  if(_isPro()||!vehicle)return null
  if(_lockedSet.has(vehicle.id))return 'locked_owned'
  const ownedCount=allVehicles.filter(v=>v.owner_id===userId).length
  if(vehicle.owner_id!==userId&&ownedCount>=1)return 'locked_shared'
  return null
}


// Task 8A: Garage type colour helper
function garageTypeColor(type){
  const map={dealer:'#7c3aed',chain:'#0284c7',specialist:'#1E7A8C',diy:'#15803d',mobile:'#b45309',other:'#64748b'}
  return map[type]||'#64748b'
}

function toggleVsw(){
  const d=$('vsw-drop');if(d){d.remove();$('vsw-btn').classList.remove('open');return}
  if(allVehicles.length<=1)return
  $('vsw-btn').classList.add('open')
  const drop=document.createElement('div');drop.id='vsw-drop';drop.className='vsw-drop'
  drop.innerHTML=allVehicles.map(v=>{
    const isLocked=_lockedSet.has(v.id)
    const isShared=v.owner_id!==userId
    let tag=''
    if(isLocked)tag='<span class="vsw-tag locked">Locked</span>'
    else if(isShared)tag='<span class="vsw-tag shared">Shared</span>'
    return `<div class="vsw-item${v.id===vehicle?.id?' cur':''}${isLocked?' locked':''}" onclick="switchV('${v.id}')"><div style="width:7px;height:7px;border-radius:50%;background:${v.id===vehicle?.id?'#1E7A8C':isLocked?'#B8C9D6':'#94a3b8'};flex-shrink:0"></div><div style="flex:1;min-width:0"><div>${vName(v)}${tag}</div>${v.registration?`<div class="vsw-item-reg">${v.registration.toUpperCase()}</div>`:''}</div></div>`
  }).join('')
  $('vsw').appendChild(drop)
  setTimeout(()=>document.addEventListener('click',()=>{const d=$('vsw-drop');if(d){d.remove();$('vsw-btn').classList.remove('open')}},{once:true}),10)
}
function switchV(id){localStorage.setItem('al_vid',id);location.reload()}
;(async()=>{
  const{data:{session}}=await sb.auth.getSession()
  if(!session){location.replace('/app/login');return}
  userId=session.user.id
  const[{data:veh},{data:prof}]=await Promise.all([sb.from('vehicles').select('*').eq('owner_id',userId).eq('is_active',true).order('created_at',{ascending:true}),sb.from('profiles').select('display_name,plan').eq('id',userId).single()])
  _plan=prof?.plan||'free'
  allVehicles=veh||[]
  _computeLocks()
  await _fetchUsage()
  $('user-avatar').textContent=(prof?.display_name||session.user.email||'?')[0].toUpperCase()
  let selId=localStorage.getItem('al_vid')
  if(!selId||!allVehicles.find(v=>v.id===selId)){selId=allVehicles[0]?.id||null;if(selId)localStorage.setItem('al_vid',selId)}
  vehicle=allVehicles.find(v=>v.id===selId)||null
  $('vsw-name').textContent=vehicle?vName(vehicle):'No vehicle'
  if(allVehicles.length<=1)$('vsw-btn').style.cursor='default'
  $('add-btn').onclick=()=>{
    const lr=_currentLockReason()
    if(lr){_openUpgradeModal('service_locked_vehicle');return}
    if(!_usage.allowed){_usageLimitModal();return}
    showAdd()
  }
  await load()
})()
let allSvcs=[]
function showPageError(msg){
  $('content').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><h3>Something went wrong</h3><p style="font-size:.875rem;color:var(--text-muted);margin-bottom:16px">${msg}</p><button class="btn btn-primary" onclick="load()">Try again</button></div>`
}
async function load(){
  if(window.AutoLogConsent&&window.AutoLogConsent.hasAnalyticsConsent()&&userId){
    if(!sessionStorage.getItem('al_evt_service_log_viewed')){
      try{await sb.from('analytics_events').insert({user_id:userId,event_name:'service_log_viewed',properties:{source:'web'}});sessionStorage.setItem('al_evt_service_log_viewed','1')}catch(e){}
    }
  }
  if(!vehicle){$('content').innerHTML=`<div class="empty"><div class="empty-icon">🔧</div><h3>No vehicle selected</h3></div>`;return}
  $('content').innerHTML='<div class="loading"><div class="spinner"></div><span>Loading…</span></div>'
  const[{data:svcs,error:svcErr},{data:mots,error:motErr}]=await Promise.all([
    sb.from('service_entries').select('*').eq('vehicle_id',vehicle.id).neq('source','dvsa').order('date',{ascending:false}),
    sb.from('service_entries').select('*').eq('vehicle_id',vehicle.id).eq('source','dvsa').order('date',{ascending:false})
  ])
  if(svcErr||motErr){showPageError((svcErr||motErr).message);return}
  allSvcs=svcs||[];const motAll=mots||[]
  const total=allSvcs.reduce((s,e)=>s+Number(e.total_cost||0),0)
  // Derived YTD
  const yearStart=new Date().getFullYear()+'-01-01'
  const ytdSvcs=allSvcs.filter(e=>(e.date||'')>=yearStart)
  const ytdSpend=ytdSvcs.reduce((s,e)=>s+Number(e.total_cost||0),0)
  const avgCost=allSvcs.length?(total/allSvcs.length):null
  const lastSvc=allSvcs[0]
  const pct=_usage.limit>0?(_usage.used/_usage.limit)*100:0
  const usageCls=pct>=100?'danger':pct>=80?'warn':''
  const lockReason=_currentLockReason()
  $('content').innerHTML=`
    <div class="pg-head"><div class="pg-head-text"><h1>Service History</h1><p>${vName(vehicle)}${vehicle.owner_id!==userId?' <span class="chip chip-shared">Shared</span>':''}</p></div></div>
    ${lockReason?_lockedBanner(lockReason):''}
    <div class="stats-strip">
      <div class="stat-mini">
        <div class="stat-mini-head"><span class="stat-mini-label">Total Spent</span></div>
        <div class="stat-mini-value">£${total.toFixed(0)}</div>
        <div class="stat-mini-sub">${allSvcs.length} record${allSvcs.length===1?'':'s'}</div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-head"><span class="stat-mini-label">This Year</span></div>
        <div class="stat-mini-value">£${ytdSpend.toFixed(0)}</div>
        <div class="stat-mini-sub">${ytdSvcs.length} service${ytdSvcs.length===1?'':'s'}</div>
      </div>
      ${avgCost?`<div class="stat-mini">
        <div class="stat-mini-head"><span class="stat-mini-label">Avg Cost</span></div>
        <div class="stat-mini-value">£${avgCost.toFixed(0)}</div>
        <div class="stat-mini-sub">per service</div>
      </div>`:''}
      <div class="stat-mini">
        <div class="stat-mini-head"><span class="stat-mini-label">Uploads Used</span></div>
        <div class="stat-mini-value">${_usage.used}<span style="font-size:.8125rem;color:var(--text-muted);font-weight:600;margin-left:4px">/ ${_usage.limit}</span></div>
        <div class="stat-mini-sub">${_usage.plan==='pro'?'Premium · 120/vehicle/yr':'Free · 80/yr total'}</div>
        <div class="usage-bar" style="margin-top:6px"><div class="usage-bar-fill ${usageCls}" style="width:${Math.min(100,pct)}%"></div></div>
      </div>
      ${motAll.length?`<div class="stat-mini">
        <div class="stat-mini-head"><span class="stat-mini-label">MOT History</span></div>
        <div class="stat-mini-value">${motAll.length}</div>
        <div class="stat-mini-sub">from DVSA</div>
      </div>`:''}
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">Service Records</span><span style="font-size:.75rem;color:var(--text-muted)">Click a row to view & edit</span></div>
      ${allSvcs.length===0?`<div class="empty"><div class="empty-icon">🔧</div><h3>No service records yet</h3><p>Log your first service to start building history.</p><button class="btn btn-primary btn-sm" style="margin-top:14px" onclick="showAdd()">Log Service</button></div>`:`
      <div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>Date</th><th>Mileage</th><th>Service</th><th style="text-align:right">Cost</th><th></th></tr></thead>
        <tbody>${allSvcs.map((e,i)=>`<tr style="cursor:pointer;border-left:3px solid ${garageTypeColor(e.garage_type)}" onclick="showDetail(${i})">
          <td style="white-space:nowrap">${fmtDate(e.date)}</td>
          <td>${fmtMi(e.mileage_at_service)}</td>
          <td>
            <div style="font-weight:600;color:var(--text-primary)">${e.garage_name||(e.garage_type||'').replace(/_/g,' ')||'—'}</div>
            ${e.description?`<div style="font-size:.75rem;color:var(--text-muted);margin-top:1px">${e.description}</div>`:''}
          </td>
          <td style="text-align:right;font-weight:700">${e.total_cost?'£'+Number(e.total_cost).toFixed(2):'—'}</td>
          <td><button class="btn-icon" onclick="event.stopPropagation();del('${e.id}')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button></td>
        </tr>`).join('')}</tbody>
      </table></div>`}
    </div>
    ${motAll.length>0?`<div class="card">
      <div class="card-head"><span class="card-title">MOT History</span><span style="font-size:.75rem;color:#94a3b8">via DVSA</span></div>
      <div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>Date</th><th>Mileage</th><th>Result</th><th>Notes</th></tr></thead>
        <tbody>${motAll.map(e=>{const pass=!e.description||!e.description.toLowerCase().includes('fail');return`<tr>
          <td>${fmtDate(e.date)}</td><td>${fmtMi(e.mileage_at_service)}</td>
          <td><span class="badge ${pass?'badge-green':'badge-red'}">${pass?'Pass':'Fail'}</span></td>
          <td style="font-size:.8125rem;color:#64748b">${e.notes||'—'}</td>
        </tr>`}).join('')}</tbody>
      </table></div>
    </div>`:''}
  `
}
function showDetail(i){
  const e=allSvcs[i]
  if(!e)return
  const bg=document.createElement('div');bg.className='mbg'
  bg.innerHTML=`<div class="mo"><div class="mh"><h2>Service Record</h2><button class="mc" onclick="this.closest('.mbg').remove()">✕</button></div><div class="mb">
    <div class="merr" id="ed-err"></div>
    <div class="fr"><div class="fg"><label class="fl">Date</label><input class="fi" type="date" id="ed-d" value="${e.date||''}"></div><div class="fg"><label class="fl">Mileage</label><input class="fi" type="number" id="ed-m" value="${e.mileage_at_service||''}"></div></div>
    <div class="fr"><div class="fg"><label class="fl">Garage Name</label><input class="fi" type="text" id="ed-gn" value="${e.garage_name||''}"></div><div class="fg"><label class="fl">Type</label><select class="fi" id="ed-gt"><option value="specialist"${e.garage_type==='specialist'?' selected':''}>Specialist</option><option value="dealer"${e.garage_type==='dealer'?' selected':''}>Main Dealer</option><option value="chain"${e.garage_type==='chain'?' selected':''}>Chain</option><option value="diy"${e.garage_type==='diy'?' selected':''}>DIY</option><option value="mobile"${e.garage_type==='mobile'?' selected':''}>Mobile</option><option value="other"${e.garage_type==='other'?' selected':''}>Other</option></select></div></div>
    <div class="fg"><label class="fl">Work Done</label><input class="fi" type="text" id="ed-desc" value="${(e.description||e.notes||'').replace(/"/g,'&quot;')}"></div>
    <div class="fr"><div class="fg"><label class="fl">Total Cost (£)</label><input class="fi" type="number" step="0.01" id="ed-cost" value="${e.total_cost||''}"></div><div class="fg"><label class="fl">Invoice No.</label><input class="fi" type="text" id="ed-inv" value="${e.invoice_number||''}"></div></div>
    <div class="fg"><label class="fl">Notes</label><textarea class="fi" id="ed-n" rows="2" style="resize:vertical">${e.notes||''}</textarea></div>
    <div class="mfooter">
      <button class="btn btn-danger btn-sm" onclick="del('${e.id}');this.closest('.mbg').remove()">Delete</button>
      <button class="btn btn-ghost btn-sm" onclick="this.closest('.mbg').remove()">Cancel</button>
      <button class="btn btn-primary btn-sm" id="ed-sv">Save Changes</button>
    </div>
  </div></div>`
  document.body.appendChild(bg)
  bg.addEventListener('click',ev=>{if(ev.target===bg)bg.remove()})
  const escH=e=>{if(e.key==='Escape'){bg.remove();document.removeEventListener('keydown',escH)}}
  document.addEventListener('keydown',escH)
  bg.querySelector('#ed-sv').onclick=async()=>{
    const btn=bg.querySelector('#ed-sv');btn.disabled=true;btn.textContent='Saving…'
    const{error}=await sb.from('service_entries').update({
      date:bg.querySelector('#ed-d').value||null,
      mileage_at_service:parseInt(bg.querySelector('#ed-m').value)||null,
      garage_name:bg.querySelector('#ed-gn').value||null,
      garage_type:bg.querySelector('#ed-gt').value,
      description:bg.querySelector('#ed-desc').value||null,
      total_cost:parseFloat(bg.querySelector('#ed-cost').value)||null,
      invoice_number:bg.querySelector('#ed-inv').value||null,
      notes:bg.querySelector('#ed-n').value||null
    }).eq('id',e.id)
    if(error){const er=bg.querySelector('#ed-err');er.textContent=error.message;er.classList.add('on');btn.disabled=false;btn.textContent='Save Changes';return}
    const editedSvcCost=parseFloat(bg.querySelector('#ed-cost').value)||null
    if(editedSvcCost){
      await sb.from('cost_entries').delete().eq('source_id',e.id)
      await sb.from('cost_entries').insert({vehicle_id:vehicle.id,user_id:userId,date:bg.querySelector('#ed-d').value||e.date,amount:editedSvcCost,category:'service',source_id:e.id,source_table:'service_entries'})
    }
    bg.remove();toast('Service updated ✓');await load()
  }
}
function showAdd(){
  const lr=_currentLockReason();if(lr){_openUpgradeModal('service_locked_vehicle');return}
  if(!_usage.allowed){_usageLimitModal();return}
  const bg=document.createElement('div');bg.className='mbg'
  bg.innerHTML=`<div class="mo"><div class="mh"><h2>Log Service</h2><button class="mc" onclick="this.closest('.mbg').remove()">✕</button></div><div class="mb">
    <div class="merr" id="merr"></div>
    <div class="fr"><div class="fg"><label class="fl">Date</label><input class="fi" type="date" id="s-d" value="${new Date().toISOString().split('T')[0]}"></div><div class="fg"><label class="fl">Mileage</label><input class="fi" type="number" id="s-m" value="${vehicle?.current_mileage||''}"></div></div>
    <div class="fr"><div class="fg"><label class="fl">Garage Name</label><input class="fi" type="text" id="s-gn" placeholder="e.g. Kwik Fit"></div><div class="fg"><label class="fl">Garage Type</label><select class="fi" id="s-gt"><option value="specialist">Specialist</option><option value="dealer">Main Dealer</option><option value="chain">Chain</option><option value="diy">DIY</option><option value="mobile">Mobile</option><option value="other">Other</option></select></div></div>
    <div class="fg"><label class="fl">Work Done</label><input class="fi" type="text" id="s-desc" placeholder="e.g. Full service, oil & filter change"></div>
    <div class="fr"><div class="fg"><label class="fl">Total Cost (£)</label><input class="fi" type="number" step="0.01" id="s-cost" placeholder="e.g. 250.00"></div><div class="fg"><label class="fl">Invoice No.</label><input class="fi" type="text" id="s-inv"></div></div>
    <div class="fg"><label class="fl">Notes</label><input class="fi" type="text" id="s-n"></div>
    <div class="mfooter"><button class="btn btn-ghost btn-sm" onclick="this.closest('.mbg').remove()">Cancel</button><button class="btn btn-primary btn-sm" id="s-sv">Save Service</button></div>
  </div></div>`
  document.body.appendChild(bg)
  bg.addEventListener('click',e=>{if(e.target===bg)bg.remove()})
  bg.querySelector('#s-sv').onclick=async()=>{
    const btn=bg.querySelector('#s-sv');btn.disabled=true;btn.textContent='Saving…'
    const svcInsert=await sb.from('service_entries').insert({vehicle_id:vehicle.id,user_id:userId,date:bg.querySelector('#s-d').value,mileage_at_service:parseInt(bg.querySelector('#s-m').value)||null,garage_name:bg.querySelector('#s-gn').value||null,garage_type:bg.querySelector('#s-gt').value,description:bg.querySelector('#s-desc').value||null,total_cost:parseFloat(bg.querySelector('#s-cost').value)||null,invoice_number:bg.querySelector('#s-inv').value||null,notes:bg.querySelector('#s-n').value||null,source:'manual'}).select().single()
    if(svcInsert.error){const e=bg.querySelector('#merr');e.textContent=svcInsert.error.message;e.classList.add('on');btn.disabled=false;btn.textContent='Save Service';return}
    const svcCost=parseFloat(bg.querySelector('#s-cost').value)||null
    if(svcInsert.data&&svcCost){await sb.from('cost_entries').insert({vehicle_id:vehicle.id,user_id:userId,date:bg.querySelector('#s-d').value,amount:svcCost,category:'service',source_id:svcInsert.data.id,source_table:'service_entries'})}
    if(window.AutoLogConsent&&window.AutoLogConsent.hasAnalyticsConsent()){
      try{const{data:p}=await sb.from('profiles').select('first_action_completed').eq('id',userId).single();if(p&&!p.first_action_completed){await sb.from('analytics_events').insert({user_id:userId,event_name:'first_action_taken',properties:{source:'web',action_type:'service'}});await sb.from('profiles').update({first_action_completed:true}).eq('id',userId)}}catch(e){}
    }
    await _recordUsage()
    bg.remove();toast('Service saved ✓');await load()
  }
}
async function del(id){if(!confirm('Delete this service record?'))return;await sb.from('service_entries').delete().eq('id',id);toast('Deleted ✓');await load()}
</script>
</body>
