const SURL='https://dkpvxlxarsmiljnvnbck.supabase.co',SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrcHZ4bHhhcnNtaWxqbnZuYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzM4MzIsImV4cCI6MjA5MDAwOTgzMn0.WJTRE_xmudj--jWSoA3e4ggYVORrFpoarBUkeaQN1Bw'

function fmtDate(d){if(!d)return'\u2014';return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
function fmtTime(d){if(!d)return'\u2014';return new Date(d).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}
function vName(v){return v.nickname||[v.year,v.make,v.model].filter(Boolean).join(' ')||v.registration||'Vehicle'}
function doSignOut(){sb.auth.signOut().then(()=>location.href='/app/login')}
function toast(msg,ok=true){let el=$('toast');if(!el){el=document.createElement('div');el.id='toast';document.body.appendChild(el)}el.textContent=msg;el.style.borderLeft='3px solid '+(ok?'#22c55e':'#ef4444');el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',3500)}

let allVehicles=[],vehicle=null,userId=null,allTrips=[]
let _plan='free',_lockedSet=new Set()
const _isPro=()=>_plan==='paid'||_plan==='business'

// --- Gating helpers ---
function _openUpgradeModal(source){
  const bg=document.createElement('div');bg.className='mbg'
  bg.innerHTML=`<div class="mo"><div class="mh"><h2>AutoLog+ is managed in the iOS app</h2><button class="mc" onclick="this.closest('.mbg').remove()">\u2715</button></div><div class="mb">
    <div style="text-align:center;padding:6px 0 18px">
      <div style="width:56px;height:56px;background:var(--teal-light);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;color:var(--teal)"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
      <p style="font-size:.9375rem;color:var(--text-secondary);line-height:1.65;max-width:360px;margin:0 auto 6px">AutoLog+ is sold through the App Store and managed by Apple. To subscribe, open AutoLog on your iPhone and tap <strong>Settings \u2192 Upgrade to AutoLog+</strong>.</p>
      <p style="font-size:.8125rem;color:var(--text-muted);max-width:360px;margin:0 auto 20px">Once subscribed, everything unlocks here too \u2014 instantly.</p>
    </div>
    <div class="mfooter" style="justify-content:center;gap:10px">
      <a href="https://apps.apple.com/gb/app/autolog/id6746798513" target="_blank" rel="noopener" class="btn btn-primary btn-sm">Open App Store</a>
      <button class="btn btn-ghost btn-sm" onclick="this.closest('.mbg').remove()">Close</button>
    </div>
  </div></div>`
  document.body.appendChild(bg)
  bg.addEventListener('click',e=>{if(e.target===bg)bg.remove()})
  if(window.AutoLogConsent&&window.AutoLogConsent.hasAnalyticsConsent()&&userId){
    try{sb.from('analytics_events').insert({user_id:userId,event_name:'paywall_viewed',properties:{source:'web',trigger:source||'trips'}})}catch(e){}
  }
}
function _lockedBanner(reason){
  const msg=reason==='locked_shared'?'This vehicle is shared with you. While on the free plan with your own vehicle, shared vehicles are view-only.':'You\u2019ve been using AutoLog+ with more than one vehicle. Upgrade to unlock write access to all your vehicles again.'
  return `<div class="locked-banner"><div class="locked-banner-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div><h3>AutoLog+ required</h3><p>${msg}</p><button class="btn btn-primary btn-sm" onclick="_openUpgradeModal('locked_vehicle')">Upgrade in iOS app \u2192</button></div>`
}
function _computeLocks(){
  if(_isPro()){_lockedSet=new Set();return}
  const owned=allVehicles.filter(v=>v.owner_id===userId)
  if(owned.length<=1){_lockedSet=new Set();return}
  const sorted=[...owned].sort((a,b)=>{const au=new Date(a.updated_at||a.created_at||0).getTime(),bu=new Date(b.updated_at||b.created_at||0).getTime();return bu-au})
  _lockedSet=new Set(sorted.slice(1).map(v=>v.id))
}
function _currentLockReason(){
  if(_isPro()||!vehicle)return null
  if(_lockedSet.has(vehicle.id))return 'locked_owned'
  const ownedCount=allVehicles.filter(v=>v.owner_id===userId).length
  if(vehicle.owner_id!==userId&&ownedCount>=1)return 'locked_shared'
  return null
}

const PURPOSES=[
  {key:'personal',label:'Personal',color:'#94a3b8'},
  {key:'business',label:'Business',color:'#1E7A8C'},
  {key:'commute', label:'Commute', color:'#f59e0b'},
  {key:'other',   label:'Other',   color:'#94a3b8'}
]
const pc={personal:'#94a3b8',business:'#1E7A8C',commute:'#f59e0b',other:'#94a3b8'}
const pl={personal:'Personal',business:'Business',commute:'Commute',other:'Other'}

function tripTimeIcon(dateStr){
  if(!dateStr) return '\ud83d\ude97'
  const h=new Date(dateStr).getHours()
  if(h>=5&&h<12) return '\ud83c\udf05'
  if(h>=12&&h<18) return '\u2600\ufe0f'
  if(h>=18&&h<21) return '\ud83c\udf06'
  return '\ud83c\udf19'
}
function dur(s,e){if(!s||!e)return null;const m=Math.round((new Date(e)-new Date(s))/60000);return m<60?m+'m':Math.floor(m/60)+'h '+(m%60?m%60+'m':'')}

function toggleVsw(){
  const d=$('vsw-drop');if(d){d.remove();$('vsw-btn').classList.remove('open');return}
  if(allVehicles.length<=1)return
  $('vsw-btn').classList.add('open')
  const drop=document.createElement('div');drop.id='vsw-drop';drop.className='vsw-drop'
  drop.innerHTML=allVehicles.map(v=>{
    const isLocked=_lockedSet.has(v.id)
    const isShared=v.owner_id!==userId
    let tag=''
    if(isLocked)tag='<span class="vsw-tag locked">Locked</span>'
    else if(isShared)tag='<span class="vsw-tag shared">Shared</span>'
    return `<div class="vsw-item${v.id===vehicle?.id?' cur':''}${isLocked?' locked':''}" onclick="switchV('${v.id}')"><div style="width:7px;height:7px;border-radius:50%;background:${v.id===vehicle?.id?'#1E7A8C':isLocked?'#B8C9D6':'#94a3b8'};flex-shrink:0"></div><div style="flex:1;min-width:0"><div>${vName(v)}${tag}</div>${v.registration?`<div class="vsw-item-reg">${v.registration.toUpperCase()}</div>`:''}</div></div>`
  }).join('')
  $('vsw').appendChild(drop)
  setTimeout(()=>document.addEventListener('click',()=>{const d=$('vsw-drop');if(d){d.remove();$('vsw-btn').classList.remove('open')}},{once:true}),10)
}
function switchV(id){localStorage.setItem('al_vid',id);location.reload()}

// --- Trip detail modal ---
function showTripDetail(tripId){
  const t=allTrips.find(x=>x.id===tripId)
  if(!t)return
  const locked=!!_currentLockReason()
  const currentPurpose=t.purpose||'personal'
  const hmrcHint=Number(t.distance||0)*0.45
  const bg=document.createElement('div');bg.className='mbg'
  const purposeBtns=PURPOSES.map(p=>{
    const active=p.key===currentPurpose
    return `<button type="button" data-purpose="${p.key}" class="trip-purpose-btn${active?' active':''}" style="flex:1;padding:10px 8px;border:1.5px solid ${active?p.color:'var(--border)'};background:${active?p.color+'15':'var(--surface)'};color:${active?p.color:'var(--text-secondary)'};border-radius:10px;font-size:.8125rem;font-weight:${active?700:600};font-family:inherit;cursor:${locked?'not-allowed':'pointer'};transition:all .15s" ${locked?'disabled':''}>${p.label}</button>`
  }).join('')
  const startLoc=t.start_location||'<span style="color:var(--text-muted);font-weight:400">Location not recorded</span>'
  const endLoc=t.end_location||'<span style="color:var(--text-muted);font-weight:400">Location not recorded</span>'
  bg.innerHTML=`<div class="mo" style="max-width:520px">
    <div class="mh"><h2>Trip details</h2><button class="mc" onclick="this.closest('.mbg').remove()">\u2715</button></div>
    <div class="mb">
      <div class="merr" id="td-err"></div>
      ${locked?`<div style="background:var(--amber-bg);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:.8125rem;color:var(--amber);font-weight:600;display:flex;align-items:center;gap:8px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>This trip is view-only \u2014 upgrade to AutoLog+ to edit.</div>`:''}

      <div class="fg">
        <label class="fl">Purpose</label>
        <div style="display:flex;gap:6px">${purposeBtns}</div>
      </div>

      <div class="fg">
        <label class="fl">Route</label>
        <div style="background:var(--surface-2);border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:10px">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:8px;height:8px;border-radius:50%;background:var(--teal);flex-shrink:0;box-shadow:0 0 0 3px rgba(26,122,140,.15)"></div>
            <div style="flex:1;min-width:0">
              <div style="font-size:.6875rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em">From</div>
              <div style="font-size:.875rem;color:var(--text-primary);font-weight:600;margin-top:1px">${startLoc}</div>
              <div style="font-size:.75rem;color:var(--text-muted)">${t.start_time?fmtDate(t.start_time)+' \u00b7 '+fmtTime(t.start_time):fmtDate(t.date)}${t.start_mileage?' \u00b7 '+Number(t.start_mileage).toLocaleString('en-GB')+' mi':''}</div>
            </div>
          </div>
          <div style="border-left:1.5px dashed var(--border);margin-left:3px;height:8px"></div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:8px;height:8px;border-radius:50%;background:var(--text-primary);flex-shrink:0"></div>
            <div style="flex:1;min-width:0">
              <div style="font-size:.6875rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em">To</div>
              <div style="font-size:.875rem;color:var(--text-primary);font-weight:600;margin-top:1px">${endLoc}</div>
              <div style="font-size:.75rem;color:var(--text-muted)">${t.end_time?fmtDate(t.end_time)+' \u00b7 '+fmtTime(t.end_time):'\u2014'}${t.end_mileage?' \u00b7 '+Number(t.end_mileage).toLocaleString('en-GB')+' mi':''}</div>
            </div>
          </div>
        </div>
      </div>

      <div class="fr">
        <div class="fg">
          <label class="fl">Distance</label>
          <div style="font-size:1.125rem;font-weight:800;font-family:var(--font-mono);color:var(--text-primary);letter-spacing:-.01em">${t.distance?Number(t.distance).toFixed(1)+' mi':'\u2014'}</div>
        </div>
        <div class="fg">
          <label class="fl">Duration</label>
          <div style="font-size:1.125rem;font-weight:800;font-family:var(--font-mono);color:var(--text-primary);letter-spacing:-.01em">${dur(t.start_time,t.end_time)||'\u2014'}</div>
        </div>
      </div>

      ${hmrcHint>0?`<div id="td-hmrc" style="display:${currentPurpose==='business'?'flex':'none'};background:rgba(34,197,94,.08);border-radius:10px;padding:10px 14px;margin-bottom:16px;align-items:center;gap:8px;font-size:.8125rem;color:var(--green);font-weight:600"><span>\u00a3</span>HMRC claimable: \u00a3${hmrcHint.toFixed(2)} @ 45p/mi</div>`:''}

      <div class="fg">
        <label class="fl">Notes</label>
        <textarea class="fi" id="td-notes" rows="2" style="resize:vertical;min-height:48px" ${locked?'disabled':''}>${(t.notes||'').replace(/</g,'&lt;')}</textarea>
      </div>

      <div class="mfooter">
        ${locked?'':`<button class="btn btn-danger btn-sm" id="td-del">Delete</button>`}
        <button class="btn btn-ghost btn-sm" onclick="this.closest('.mbg').remove()">Cancel</button>
        ${locked?'':`<button class="btn btn-primary btn-sm" id="td-save">Save</button>`}
      </div>
    </div>
  </div>`
  document.body.appendChild(bg)
  bg.addEventListener('click',e=>{if(e.target===bg)bg.remove()})

  if(locked)return

  let selectedPurpose=currentPurpose
  bg.querySelectorAll('.trip-purpose-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      selectedPurpose=btn.dataset.purpose
      bg.querySelectorAll('.trip-purpose-btn').forEach(b=>{
        const pKey=b.dataset.purpose
        const meta=PURPOSES.find(p=>p.key===pKey)
        const active=pKey===selectedPurpose
        b.style.borderColor=active?meta.color:'var(--border)'
        b.style.background=active?meta.color+'15':'var(--surface)'
        b.style.color=active?meta.color:'var(--text-secondary)'
        b.style.fontWeight=active?700:600
        b.classList.toggle('active',active)
      })
      const hmrcEl=bg.querySelector('#td-hmrc')
      if(hmrcEl)hmrcEl.style.display=selectedPurpose==='business'?'flex':'none'
    })
  })

  bg.querySelector('#td-save').onclick=async()=>{
    const btn=bg.querySelector('#td-save');btn.disabled=true;btn.textContent='Saving\u2026'
    const notes=bg.querySelector('#td-notes').value.trim()||null
    // Final guard against business purpose on free plan
    if(selectedPurpose==='business'&&!_isPro()){
      _openUpgradeModal('hmrc_trip_detail')
      return
    }
    const{error}=await sb.from('trips').update({purpose:selectedPurpose,notes}).eq('id',t.id)
    if(error){const e=bg.querySelector('#td-err');e.textContent=error.message;e.classList.add('on');btn.disabled=false;btn.textContent='Save';return}
    bg.remove();toast('Trip updated \u2713');await loadTrips()
  }
  bg.querySelector('#td-del').onclick=async()=>{
    if(!confirm('Delete this trip?'))return
    const{error}=await sb.from('trips').delete().eq('id',t.id)
    if(error){toast(error.message,false);return}
    bg.remove();toast('Trip deleted \u2713');await loadTrips()
  }
}
window.showTripDetail=showTripDetail

async function loadTrips(){
  if(!vehicle){$('content').innerHTML=`<div class="empty"><div class="empty-icon">\ud83d\uddfa\ufe0f</div><h3>No vehicle selected</h3></div>`;return}
  const now=new Date()
  const sYear=new Date(now.getFullYear(),0,1).toISOString().split('T')[0]
  const sMon=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0]
  const{data:trips}=await sb.from('trips').select('*').eq('vehicle_id',vehicle.id).order('start_time',{ascending:false,nullsFirst:false}).order('date',{ascending:false})
  allTrips=trips||[]
  const thisYear=allTrips.filter(t=>(t.date||t.start_time||'').slice(0,10)>=sYear)
  const thisMon=allTrips.filter(t=>(t.date||t.start_time||'').slice(0,10)>=sMon)
  const miYear=thisYear.reduce((s,t)=>s+Number(t.distance||0),0)
  const miMon=thisMon.reduce((s,t)=>s+Number(t.distance||0),0)
  const bizMi=thisYear.filter(t=>t.purpose==='business').reduce((s,t)=>s+Number(t.distance||0),0)
  const commuteMi=thisYear.filter(t=>t.purpose==='commute').reduce((s,t)=>s+Number(t.distance||0),0)
  const personalMi=thisYear.filter(t=>!t.purpose||t.purpose==='personal'||t.purpose==='other').reduce((s,t)=>s+Number(t.distance||0),0)
  const hmrc=bizMi*0.45

  const grouped={}
  allTrips.forEach(t=>{
    const key=new Date(t.date||t.start_time||Date.now()).toLocaleDateString('en-GB',{month:'long',year:'numeric'})
    if(!grouped[key])grouped[key]=[]
    grouped[key].push(t)
  })

  const totalYr=miYear||1
  const bizPct=(bizMi/totalYr)*100
  const comPct=(commuteMi/totalYr)*100
  const perPct=(personalMi/totalYr)*100

  const lockReason=_currentLockReason()

  $('content').innerHTML=`
    <div class="pg-head"><div class="pg-head-text"><h1>Trips</h1><p>${vName(vehicle)}${vehicle.owner_id!==userId?' <span class="chip chip-shared">Shared</span>':''}</p></div></div>
    ${lockReason?_lockedBanner(lockReason):''}
    <div class="stats-strip">
      <div class="stat-mini">
        <div class="stat-mini-head"><span class="stat-mini-label">This Month</span></div>
        <div class="stat-mini-value">${miMon.toFixed(0)}</div>
        <div class="stat-mini-sub">miles \u00b7 ${thisMon.length} trip${thisMon.length===1?'':'s'}</div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-head"><span class="stat-mini-label">This Year</span></div>
        <div class="stat-mini-value">${miYear.toFixed(0)}</div>
        <div class="stat-mini-sub">miles \u00b7 ${thisYear.length} trip${thisYear.length===1?'':'s'}</div>
        ${miYear>0?`<div style="display:flex;height:4px;border-radius:2px;overflow:hidden;margin-top:6px"><div style="background:#1E7A8C;width:${bizPct}%" title="Business"></div><div style="background:#f59e0b;width:${comPct}%" title="Commute"></div><div style="background:#94a3b8;width:${perPct}%" title="Personal"></div></div>`:''}
      </div>
      ${bizMi>0?`<div class="stat-mini">
        <div class="stat-mini-head"><span class="stat-mini-label">Business Miles</span></div>
        <div class="stat-mini-value">${bizMi.toFixed(0)}</div>
        <div class="stat-mini-sub">${(bizMi/totalYr*100).toFixed(0)}% of YTD</div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-head"><span class="stat-mini-label">HMRC Claimable</span></div>
        <div class="stat-mini-value" style="color:var(--green)">\u00a3${hmrc.toFixed(0)}</div>
        <div class="stat-mini-sub">@ 45p/mi</div>
      </div>`:''}
      <div class="stat-mini">
        <div class="stat-mini-head"><span class="stat-mini-label">Total Trips</span></div>
        <div class="stat-mini-value">${allTrips.length}</div>
        <div class="stat-mini-sub">all time</div>
      </div>
    </div>

    <div class="alert-banner info" style="margin-bottom:14px">
      <div class="alert-banner-icon">\ud83d\ude97</div>
      <div class="alert-banner-body" style="flex:1">
        <div class="title">Trips are recorded from the iOS app</div>
        <div class="desc">Tap a trip to edit its purpose, view locations or add notes.</div>
      </div>
    </div>

    ${allTrips.length===0?`
    <div class="empty-rich">
      <div class="empty-rich-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg></div>
      <h2>No trips yet</h2>
      <p>Trips are tracked automatically via Bluetooth or GPS in the AutoLog iOS app. Your recorded trips will appear here once you drive with the app installed.</p>
      <a href="https://apps.apple.com/gb/app/autolog/id6746798513" target="_blank" rel="noopener" class="btn btn-primary btn-sm">Open App Store</a>
    </div>`
    :Object.entries(grouped).map(([month,rows])=>{
      const mMi=rows.reduce((s,t)=>s+Number(t.distance||0),0)
      return `<div style="margin-bottom:22px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-size:.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em">${month}</span>
          <span style="font-size:.75rem;color:var(--text-faint);font-family:var(--font-mono)">${mMi.toFixed(0)} mi \u00b7 ${rows.length} trip${rows.length===1?'':'s'}</span>
        </div>
        ${rows.map(t=>{
          const p=t.purpose||'personal'
          const c=pc[p]||'#94a3b8'
          const d=dur(t.start_time,t.end_time)
          const timeIcon=tripTimeIcon(t.start_time||t.date)
          const routeText=t.start_location&&t.end_location?`${t.start_location} \u2192 ${t.end_location}`:t.start_location||t.end_location||fmtDate(t.date||t.start_time)
          return `<div class="trip-card" onclick="showTripDetail('${t.id}')">
            <div class="trip-card-icon" style="background:${c}18">${timeIcon}</div>
            <div class="trip-card-body">
              <div class="trip-card-route">${routeText}</div>
              <div class="trip-card-meta">
                <span style="color:${c};font-weight:700">${pl[p]||'Trip'}</span>
                \u00b7 ${fmtDate(t.date||t.start_time)}${d?' \u00b7 '+d:''}${t.start_time?' \u00b7 '+fmtTime(t.start_time):''}
              </div>
            </div>
            <div class="trip-card-val">
              ${t.distance?`<div class="distance">${Number(t.distance).toFixed(1)} mi</div>`:'<span style="color:var(--text-muted)">\u2014</span>'}
              ${p==='business'&&t.distance?`<div class="hmrc">\u00a3${(Number(t.distance)*.45).toFixed(2)} HMRC</div>`:''}
            </div>
          </div>`
        }).join('')}
      </div>`
    }).join('')}
  `
}

;(async()=>{
  const{data:{session}}=await sb.auth.getSession()
  if(!session){location.replace('/app/login');return}
  userId=session.user.id
  const[{data:veh},{data:prof}]=await Promise.all([
    sb.from('vehicles').select('*').eq('owner_id',userId).eq('is_active',true).order('created_at',{ascending:true}),
    sb.from('profiles').select('display_name,plan').eq('id',userId).single()
  ])
  allVehicles=veh||[]
  _plan=prof?.plan||'free'
  _computeLocks()
  $('user-avatar').textContent=(prof?.display_name||session.user.email||'?')[0].toUpperCase()
  let selId=localStorage.getItem('al_vid')
  if(!selId||!allVehicles.find(v=>v.id===selId)){selId=allVehicles[0]?.id||null;if(selId)localStorage.setItem('al_vid',selId)}
  vehicle=allVehicles.find(v=>v.id===selId)||null
  $('vsw-name').textContent=vehicle?vName(vehicle):'No vehicle'
  if(allVehicles.length<=1)$('vsw-btn').style.cursor='default'
  if(window.AutoLogConsent&&window.AutoLogConsent.hasAnalyticsConsent()&&userId){
    if(!sessionStorage.getItem('al_evt_trips_viewed')){
      try{await sb.from('analytics_events').insert({user_id:userId,event_name:'trips_viewed',properties:{source:'web'}});sessionStorage.setItem('al_evt_trips_viewed','1')}catch(e){}
    }
  }
  await loadTrips()
})()
</script>
</body>
</html>
