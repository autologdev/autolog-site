<!DOCTYPE html>

<head>

<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/app/app-theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<aside class="sb" id="sb">
  <div class="sb-logo"><img src="/assets/logo.png" alt=""><span class="sb-logo-text">AutoLog</span></div>
  <nav class="sb-nav">

    <a href="/app/fuel" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M3 22V8a2 2 0 012-2h8a2 2 0 012 2v14M3 22h14M7 22V12h4v10"/><path d="M19 8l2 2-2 2M19 10h-2V6a2 2 0 00-2-2"/></svg></span><span class="sb-label">Fuel Log</span></a>
    <a href="/app/service" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg></span><span class="sb-label">Service History</span></a>
    <a href="/app/maintenance" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span><span class="sb-label">Maintenance</span></a>
    <a href="/app/documents" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span><span class="sb-label">Documents</span></a>
    <a href="/app/trips" class="sb-link active"><span class="sb-icon"><svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg></span><span class="sb-label">Trips</span></a>
    <div class="sb-divider"></div>
    <a href="/app/settings" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span><span class="sb-label">Settings</span></a>
  </nav>
  <div class="sb-bottom"><button class="sb-link sb-signout" onclick="doSignOut()"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span><span class="sb-label">Sign Out</span></button></div>
</aside>
<div class="sb-overlay" id="sb-ov"></div>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><button class="mob-menu" id="mob-menu-btn"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><span class="page-title">Trips</span></div>
    <div class="topbar-right">
      <div class="vsw" id="vsw"><button class="vsw-btn" id="vsw-btn" onclick="toggleVsw()"><div class="vsw-dot"></div><span class="vsw-name" id="vsw-name">…</span><span class="vsw-chevron"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></span></button></div>
      <a href="/app/dashboard" class="dash-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
      <div class="user-avatar" id="user-avatar">?</div>
    </div>
  </div>
  <div class="content" id="content"><div class="loading"><div class="spinner"></div><span>Loading…</span></div></div>
</div>
<script>
const SURL='https://dkpvxlxarsmiljnvnbck.supabase.co',SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrcHZ4bHhhcnNtaWxqbnZuYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzM4MzIsImV4cCI6MjA5MDAwOTgzMn0.WJTRE_xmudj--jWSoA3e4ggYVORrFpoarBUkeaQN1Bw'
const sb=supabase.createClient(SURL,SKEY)
const $=id=>document.getElementById(id)
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
function vName(v){return v.nickname||[v.year,v.make,v.model].filter(Boolean).join(' ')||v.registration||'Vehicle'}
function doSignOut(){sb.auth.signOut().then(()=>location.href='/app/login')}
const sbEl=$('sb'),sbOv=$('sb-ov')
$('mob-menu-btn').onclick=()=>{sbEl.classList.toggle('open');sbOv.classList.toggle('on')}
sbOv.onclick=()=>{sbEl.classList.remove('open');sbOv.classList.remove('on')}
let allVehicles=[],vehicle=null
function toggleVsw(){const d=$('vsw-drop');if(d){d.remove();$('vsw-btn').classList.remove('open');return}if(allVehicles.length<=1)return;$('vsw-btn').classList.add('open');const drop=document.createElement('div');drop.id='vsw-drop';drop.className='vsw-drop';drop.innerHTML=allVehicles.map(v=>`<div class="vsw-item${v.id===vehicle?.id?' cur':''}" onclick="switchV('${v.id}')"><div style="width:7px;height:7px;border-radius:50%;background:${v.id===vehicle?.id?'#1E7A8C':'#94a3b8'};flex-shrink:0"></div><div><div>${vName(v)}</div>${v.registration?`<div class="vsw-item-reg">${v.registration.toUpperCase()}</div>`:''}</div></div>`).join('');$('vsw').appendChild(drop);setTimeout(()=>document.addEventListener('click',()=>{const d=$('vsw-drop');if(d){d.remove();$('vsw-btn').classList.remove('open')}},{once:true}),10)}
function switchV(id){localStorage.setItem('al_vid',id);location.reload()}
;(async()=>{
  const{data:{session}}=await sb.auth.getSession()
  if(!session){location.replace('/app/login');return}
  const[{data:veh},{data:prof}]=await Promise.all([sb.from('vehicles').select('*').eq('owner_id',session.user.id).eq('is_active',true).order('created_at',{ascending:true}),sb.from('profiles').select('display_name').eq('id',session.user.id).single()])
  allVehicles=veh||[]
  $('user-avatar').textContent=(prof?.display_name||session.user.email||'?')[0].toUpperCase()
  let selId=localStorage.getItem('al_vid')
  if(!selId||!allVehicles.find(v=>v.id===selId)){selId=allVehicles[0]?.id||null;if(selId)localStorage.setItem('al_vid',selId)}
  vehicle=allVehicles.find(v=>v.id===selId)||null
  $('vsw-name').textContent=vehicle?vName(vehicle):'No vehicle'
  if(allVehicles.length<=1)$('vsw-btn').style.cursor='default'
  if(!vehicle){$('content').innerHTML=`<div class="empty"><div class="empty-icon">🗺️</div><h3>No vehicle selected</h3></div>`;return}
  const now=new Date()
  const sYear=new Date(now.getFullYear(),0,1).toISOString().split('T')[0]
  const sMon=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0]
  const{data:trips}=await sb.from('trips').select('*').eq('vehicle_id',vehicle.id).order('start_time',{ascending:false})
  const all=trips||[]
  const thisYear=all.filter(t=>(t.date||'')>=sYear)
  const thisMon=all.filter(t=>(t.date||'')>=sMon)
  const miYear=thisYear.reduce((s,t)=>s+Number(t.distance||0),0)
  const miMon=thisMon.reduce((s,t)=>s+Number(t.distance||0),0)
  const bizMi=thisYear.filter(t=>t.purpose==='business').reduce((s,t)=>s+Number(t.distance||0),0)
  const hmrc=bizMi*0.45
  const grouped={}
  all.forEach(t=>{const m=new Date(t.date||t.start_time).toLocaleDateString('en-GB',{month:'long',year:'numeric'});if(!grouped[m])grouped[m]=[];grouped[m].push(t)})
  const pc={personal:'#94a3b8',business:'#1E7A8C',commute:'#f59e0b',other:'#94a3b8'}
  const pl={personal:'Personal',business:'Business',commute:'Commute',other:'Other'}
  function dur(s,e){if(!s||!e)return null;const m=Math.round((new Date(e)-new Date(s))/60000);return m<60?m+'m':Math.floor(m/60)+'h '+(m%60?m%60+'m':'')}
  $('content').innerHTML=`
    <div class="pg-head"><div class="pg-head-text"><h1>Trips</h1><p>${vName(vehicle)}</p></div></div>
    <div class="stats">
      <div class="stat"><div class="stat-l">This Month</div><div class="stat-v">${miMon.toFixed(0)}</div><div class="stat-s">miles</div></div>
      <div class="stat"><div class="stat-l">This Year</div><div class="stat-v">${miYear.toFixed(0)}</div><div class="stat-s">miles</div></div>
      ${bizMi>0?`<div class="stat"><div class="stat-l">Business Miles</div><div class="stat-v">${bizMi.toFixed(0)}</div><div class="stat-s">this year</div></div><div class="stat"><div class="stat-l">HMRC Claimable</div><div class="stat-v" style="color:#15803d">£${hmrc.toFixed(0)}</div><div class="stat-s">@ 45p/mi</div></div>`:''}
      <div class="stat"><div class="stat-l">Total Trips</div><div class="stat-v">${all.length}</div></div>
    </div>
    <div style="background:#E8F4F6;border-radius:10px;padding:10px 14px;font-size:.8125rem;color:#1E7A8C;font-weight:500;margin-bottom:20px;display:flex;align-items:center;gap:8px"><span>🚗</span>Trips are recorded automatically via the AutoLog iPhone app.</div>
    ${all.length===0?`<div class="empty"><div class="empty-icon">🗺️</div><h3>No trips yet</h3><p>Trips are tracked automatically via Bluetooth or GPS in the iOS app.</p></div>`
    :Object.entries(grouped).map(([month,rows])=>{
      const mMi=rows.reduce((s,t)=>s+Number(t.distance||0),0)
      return`<div style="margin-bottom:24px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-size:.8125rem;font-weight:700;color:#64748b">${month}</span>
          <span style="font-size:.8125rem;color:#94a3b8">${mMi.toFixed(0)} mi</span>
        </div>
        ${rows.map(t=>{
          const p=t.purpose||'personal',c=pc[p]||'#94a3b8',d=dur(t.start_time,t.end_time)
          return`<div class="trip-card">
            <div style="width:36px;height:36px;border-radius:10px;background:${c}18;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.5" stroke-linecap="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
            </div>
            <div style="flex:1;min-width:0">
              <div style="font-size:.875rem;font-weight:700;color:#0f172a">${pl[p]||'Trip'}</div>
              <div style="font-size:.75rem;color:#94a3b8;margin-top:2px">${fmtDate(t.date||t.start_time)}${d?' · '+d:''}</div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              ${t.distance?`<div style="font-size:.9375rem;font-weight:800;color:#0f172a">${Number(t.distance).toFixed(1)} mi</div>`:'—'}
              ${t.purpose==='business'&&t.distance?`<div style="font-size:.6875rem;color:#15803d;margin-top:1px">£${(Number(t.distance)*.45).toFixed(2)} claimable</div>`:''}
            </div>
          </div>`}).join('')}
      </div>`}).join('')}
  `
})()
</script>
</body>
</html>
