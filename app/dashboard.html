<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — AutoLog</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#f1f5f9;color:#475569;-webkit-font-smoothing:antialiased;display:flex;min-height:100vh}
h1,h2,h3,h4{color:#0f172a;font-weight:700;line-height:1.25}
a{text-decoration:none;color:inherit}
button{font-family:inherit}
select{font-family:inherit}

/* ── Sidebar ── */
.sb{width:68px;min-height:100vh;background:#0f172a;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:300;transition:width .24s cubic-bezier(.4,0,.2,1);overflow:hidden;box-shadow:2px 0 12px rgba(0,0,0,.15)}
.sb:hover,.sb.open{width:228px}
.sb-logo{display:flex;align-items:center;gap:11px;padding:0 16px;height:64px;border-bottom:1px solid rgba(255,255,255,.07);overflow:hidden;flex-shrink:0}
.sb-logo img{width:34px;height:34px;border-radius:9px;flex-shrink:0;display:block}
.sb-logo-text{font-size:.9375rem;font-weight:700;color:#fff;white-space:nowrap;opacity:0;transform:translateX(-8px);transition:opacity .2s .06s,transform .2s .06s}
.sb:hover .sb-logo-text,.sb.open .sb-logo-text{opacity:1;transform:translateX(0)}
.sb-nav{flex:1;padding:8px 0;display:flex;flex-direction:column;overflow:hidden}
.sb-link{display:flex;align-items:center;gap:14px;padding:10px 18px 10px 22px;color:rgba(255,255,255,.45);font-size:.875rem;font-weight:500;white-space:nowrap;transition:color .15s,background .15s;position:relative;text-decoration:none;cursor:pointer;width:100%;border:none;background:none}
.sb-link:hover{color:rgba(255,255,255,.9);background:rgba(255,255,255,.06)}
.sb-link.active{color:#fff;background:rgba(30,122,140,.3)}
.sb-link.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;background:#1E7A8C;border-radius:0 3px 3px 0}
.sb-icon{width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sb-icon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sb-label{opacity:0;transform:translateX(-8px);transition:opacity .2s .06s,transform .2s .06s;pointer-events:none;white-space:nowrap}
.sb:hover .sb-label,.sb.open .sb-label{opacity:1;transform:translateX(0)}
.sb-divider{margin:4px 0;border-top:1px solid rgba(255,255,255,.06)}
.sb-bottom{padding:8px 0;border-top:1px solid rgba(255,255,255,.07)}
.sb-signout:hover{color:#f87171!important;background:rgba(248,113,113,.08)!important}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:299;backdrop-filter:blur(2px)}
.sb-overlay.on{display:block}

/* ── Main ── */
.main{flex:1;margin-left:68px;min-height:100vh;display:flex;flex-direction:column;transition:margin-left .24s cubic-bezier(.4,0,.2,1)}

/* ── Topbar ── */
.topbar{height:64px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:200;gap:12px}
.topbar-left{display:flex;align-items:center;gap:12px}
.mob-menu{display:none;width:36px;height:36px;background:#f8fafc;border:none;border-radius:9px;cursor:pointer;align-items:center;justify-content:center;color:#475569;flex-shrink:0}
.mob-menu:hover{background:#e2e8f0}
.mob-menu svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5}
.page-title{font-size:.9375rem;font-weight:700;color:#0f172a}
.topbar-right{display:flex;align-items:center;gap:10px}

/* ── Vehicle Switcher ── */
.vsw{position:relative}
.vsw-btn{display:flex;align-items:center;gap:8px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:6px 10px 6px 8px;cursor:pointer;font-size:.8125rem;font-weight:600;color:#0f172a;transition:all .15s;max-width:200px}
.vsw-btn:hover{background:#E8F4F6;border-color:#1E7A8C}
.vsw-dot{width:8px;height:8px;border-radius:50%;background:#1E7A8C;flex-shrink:0}
.vsw-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.vsw-chevron{width:14px;height:14px;flex-shrink:0;color:#94a3b8;transition:transform .15s}
.vsw-chevron svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.vsw-btn.open .vsw-chevron{transform:rotate(180deg)}
.vsw-drop{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.12);min-width:200px;z-index:400;overflow:hidden;animation:dropIn .15s ease}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.vsw-drop-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;font-size:.875rem;font-weight:500;color:#334155;transition:background .1s}
.vsw-drop-item:hover{background:#f8fafc}
.vsw-drop-item.current{background:#E8F4F6;color:#1E7A8C;font-weight:600}
.vsw-drop-item-reg{font-size:.7rem;color:#94a3b8;font-family:monospace;letter-spacing:.04em;margin-top:1px}
.vsw-drop-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── User pill ── */
.user-pill{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:10px;font-size:.8125rem;font-weight:500;color:#475569}
.user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#1E7A8C,#4DB8CC);display:flex;align-items:center;justify-content:center;font-size:.6875rem;font-weight:700;color:#fff;flex-shrink:0}

/* ── Content ── */
.content{flex:1;padding:28px 28px 48px;width:100%;max-width:1240px}
.pg-head{margin-bottom:24px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.pg-head-text h1{font-size:1.375rem;font-weight:800;letter-spacing:-.02em;color:#0f172a}
.pg-head-text p{font-size:.875rem;color:#94a3b8;margin-top:3px}

/* ── Stat cards ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px}
.stat{background:#fff;border-radius:14px;padding:16px 18px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.04);border:1px solid #f1f5f9}
.stat-label{font-size:.6875rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.stat-value{font-size:1.5rem;font-weight:800;color:#0f172a;letter-spacing:-.02em;line-height:1}
.stat-sub{font-size:.75rem;color:#94a3b8;margin-top:4px}

/* ── Cards ── */
.card{background:#fff;border-radius:16px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.04);border:1px solid #f1f5f9;padding:20px 22px;margin-bottom:20px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:.9rem;font-weight:700;color:#0f172a}
.card-link{font-size:.8125rem;font-weight:600;color:#1E7A8C;cursor:pointer;transition:color .15s}
.card-link:hover{color:#155F6E}

/* ── Alert banner ── */
.alert-banner{border-radius:12px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:flex-start;gap:12px}
.alert-banner.warn{background:rgba(255,149,0,.08);border:1px solid rgba(255,149,0,.2)}
.alert-banner.danger{background:rgba(255,59,48,.08);border:1px solid rgba(255,59,48,.2)}
.alert-banner.info{background:#E8F4F6;border:1px solid rgba(30,122,140,.2)}
.alert-banner-icon{font-size:1.125rem;flex-shrink:0;margin-top:1px}
.alert-banner-body .title{font-size:.875rem;font-weight:700;color:#0f172a;margin-bottom:3px}
.alert-banner-body .desc{font-size:.8125rem;color:#475569;line-height:1.5}

/* ── Grid layouts ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}

/* ── Quick links ── */
.qlink{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#f8fafc;border-radius:11px;font-size:.875rem;font-weight:600;color:#334155;border:1px solid transparent;transition:all .15s;cursor:pointer}
.qlink:hover{background:#E8F4F6;border-color:rgba(30,122,140,.2);color:#0f172a}
.qlink-icon{font-size:1.25rem;width:28px;text-align:center;flex-shrink:0}

/* ── Row items ── */
.row-item{display:flex;align-items:flex-start;justify-content:space-between;padding:11px 0;border-bottom:1px solid #f1f5f9;gap:12px}
.row-item:last-child{border-bottom:none;padding-bottom:0}
.row-item-label{font-size:.875rem;font-weight:600;color:#0f172a}
.row-item-sub{font-size:.75rem;color:#94a3b8;margin-top:2px}
.row-item-val{font-size:.875rem;font-weight:700;color:#0f172a;white-space:nowrap}

/* ── Vehicle details grid ── */
.vd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px 20px}
.vd-item-label{font-size:.6875rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.vd-item-val{font-size:.875rem;font-weight:600;color:#0f172a}

/* ── Badges ── */
.badge{display:inline-block;padding:3px 9px;border-radius:100px;font-size:.6875rem;font-weight:700;letter-spacing:.02em}
.badge-green{background:rgba(34,197,94,.12);color:#15803d}
.badge-amber{background:rgba(245,158,11,.12);color:#b45309}
.badge-red{background:rgba(239,68,68,.12);color:#dc2626}
.badge-blue{background:#E8F4F6;color:#1E7A8C}
.badge-grey{background:#f1f5f9;color:#64748b}

/* ── Table ── */
.tbl-wrap{overflow-x:auto;margin:0 -4px;padding:0 4px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:9px 12px;font-size:.6875rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #e2e8f0;white-space:nowrap}
.tbl td{padding:11px 12px;font-size:.875rem;color:#334155;border-bottom:1px solid #f8fafc;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:#fafafa}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 18px;border-radius:9px;font-size:.8125rem;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid transparent;transition:all .15s;white-space:nowrap;line-height:1}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#1E7A8C;color:#fff;border-color:#1E7A8C}
.btn-primary:hover:not(:disabled){background:#155F6E;border-color:#155F6E}
.btn-outline{background:transparent;color:#1E7A8C;border-color:#1E7A8C}
.btn-outline:hover:not(:disabled){background:#E8F4F6}
.btn-ghost{background:#f8fafc;color:#475569;border-color:#e2e8f0}
.btn-ghost:hover:not(:disabled){background:#e2e8f0;color:#0f172a}
.btn-danger{background:transparent;color:#dc2626;border-color:#dc2626}
.btn-danger:hover:not(:disabled){background:rgba(220,38,38,.06)}
.btn-sm{padding:7px 14px;font-size:.8125rem;border-radius:8px}
.btn-xs{padding:5px 10px;font-size:.75rem;border-radius:7px}
.btn-icon{width:34px;height:34px;padding:0;border-radius:8px;background:#f8fafc;color:#64748b;border:1px solid #e2e8f0;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.btn-icon:hover{background:#E8F4F6;color:#1E7A8C;border-color:#1E7A8C}
.btn-icon svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── Forms (modal) ── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:.8125rem;font-weight:600;color:#475569;margin-bottom:5px}
.form-input{width:100%;padding:9px 13px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:.875rem;font-family:inherit;color:#0f172a;background:#fff;outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none}
.form-input:focus{border-color:#1E7A8C;box-shadow:0 0 0 3px rgba(30,122,140,.1)}
.form-input:disabled{background:#f8fafc;color:#94a3b8;cursor:not-allowed}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadein .15s ease;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:20px;width:100%;max-width:520px;box-shadow:0 24px 80px rgba(0,0,0,.2);animation:slideup .2s ease;max-height:90vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:22px 24px 0}
.modal-head h2{font-size:1.0625rem;font-weight:700}
.modal-close{width:30px;height:30px;border:none;background:#f1f5f9;border-radius:7px;cursor:pointer;color:#64748b;display:flex;align-items:center;justify-content:center;font-size:.875rem;transition:all .15s}
.modal-close:hover{background:#E8F4F6;color:#1E7A8C}
.modal-body{padding:18px 24px 24px}
.modal-error{background:rgba(220,38,38,.08);color:#dc2626;border:1px solid rgba(220,38,38,.2);padding:10px 13px;border-radius:9px;font-size:.8125rem;margin-bottom:14px;display:none}
.modal-error.on{display:block}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}

/* ── Loading / Empty ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 24px;gap:14px;color:#94a3b8;font-size:.875rem;width:100%}
.spinner{width:32px;height:32px;border:3px solid rgba(30,122,140,.15);border-top-color:#1E7A8C;border-radius:50%;animation:spin .7s linear infinite}
.empty{text-align:center;padding:48px 24px;color:#94a3b8}
.empty-icon{font-size:2.5rem;margin-bottom:12px;opacity:.35}
.empty h3{font-size:.9375rem;color:#475569;font-weight:600;margin-bottom:6px}
.empty p{font-size:.8125rem;line-height:1.6}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;right:24px;z-index:999;background:#0f172a;color:#fff;padding:12px 18px;border-radius:11px;font-size:.875rem;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.25);max-width:300px;line-height:1.4;display:none;animation:slideup .2s ease}

/* ── Keyframes ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes slideup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── Mobile ── */
@media(max-width:768px){
  .sb{transform:translateX(-100%);width:240px!important;transition:transform .25s cubic-bezier(.4,0,.2,1)}
  .sb.open{transform:translateX(0)}
  .sb .sb-label,.sb .sb-logo-text{opacity:1!important;transform:none!important}
  .sb-overlay.on{display:block}
  .main{margin-left:0}
  .mob-menu{display:flex}
  .content{padding:20px 16px 40px}
  .grid2,.grid3{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .page-title{display:none}
}
@media(max-width:480px){
  .stats{grid-template-columns:1fr 1fr}
  .topbar{padding:0 16px}
}
</style>
</head>

</aside>

<script>
const SURL='https://dkpvxlxarsmiljnvnbck.supabase.co'
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrcHZ4bHhhcnNtaWxqbnZuYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzM4MzIsImV4cCI6MjA5MDAwOTgzMn0.WJTRE_xmudj--jWSoA3e4ggYVORrFpoarBUkeaQN1Bw'
const sb=supabase.createClient(SURL,SKEY)

// ── Utilities ──────────────────────────────────────────────
const $ = id => document.getElementById(id)
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
function fmtMi(n){return n!=null?Number(n).toLocaleString('en-GB')+' mi':'—'}
function fmtGBP(n){return n!=null?'£'+Number(n).toFixed(2):'—'}
function vName(v){return v.nickname||[v.year,v.make,v.model].filter(Boolean).join(' ')||v.registration||'Vehicle'}
function motStatus(v){
  if(!v.mot_expiry)return{label:'Unknown',cls:'badge-grey',color:'#94a3b8'}
  const d=Math.ceil((new Date(v.mot_expiry)-new Date())/86400000)
  if(d<0)return{label:'Expired',cls:'badge-red',color:'#dc2626'}
  if(d<=30)return{label:d+'d left',cls:'badge-amber',color:'#b45309'}
  return{label:fmtDate(v.mot_expiry),cls:'badge-green',color:'#15803d'}
}
function taxStatus(v){
  if(!v.tax_expiry)return{label:'Unknown',cls:'badge-grey',color:'#94a3b8'}
  const d=Math.ceil((new Date(v.tax_expiry)-new Date())/86400000)
  if(d<0)return{label:'Expired',cls:'badge-red',color:'#dc2626'}
  if(d<=30)return{label:d+'d left',cls:'badge-amber',color:'#b45309'}
  return{label:fmtDate(v.tax_expiry),cls:'badge-green',color:'#15803d'}
}
function toast(msg,ok=true){const el=$('toast');el.textContent=msg;el.style.borderLeft='3px solid '+(ok?'#22c55e':'#ef4444');el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',3500)}
function doSignOut(){sb.auth.signOut().then(()=>location.href='/app/login.html')}

// ── Sidebar mobile ─────────────────────────────────────────
const sbEl=$('sb'),sbOv=$('sb-ov')
$('mob-menu-btn').onclick=()=>{sbEl.classList.toggle('open');sbOv.classList.toggle('on')}
sbOv.onclick=()=>{sbEl.classList.remove('open');sbOv.classList.remove('on')}

// ── Vehicle switcher ───────────────────────────────────────
let allVehicles=[],currentVehicle=null
function toggleVsw(){
  const existing=$('vsw-drop')
  if(existing){existing.remove();$('vsw-btn').classList.remove('open');return}
  if(allVehicles.length<=1)return
  $('vsw-btn').classList.add('open')
  const drop=document.createElement('div')
  drop.id='vsw-drop';drop.className='vsw-drop'
  drop.innerHTML=allVehicles.map(v=>{
    const isCurrent=v.id===currentVehicle?.id
    const dotColor=isCurrent?'#1E7A8C':'#94a3b8'
    return`<div class="vsw-drop-item${isCurrent?' current':''}" onclick="switchVehicle('${v.id}')">
      <div class="vsw-drop-dot" style="background:${dotColor}"></div>
      <div><div>${vName(v)}</div>${v.registration?`<div class="vsw-drop-item-reg">${v.registration.toUpperCase()}</div>`:''}</div>
    </div>`
  }).join('')
  $('vsw').appendChild(drop)
  setTimeout(()=>document.addEventListener('click',closeVswOnBlur,{once:true}),10)
}
function closeVswOnBlur(){const d=$('vsw-drop');if(d){d.remove();$('vsw-btn').classList.remove('open')}}
function switchVehicle(id){
  localStorage.setItem('al_vid',id)
  location.reload()
}

// ── Main ───────────────────────────────────────────────────
;(async()=>{
  try{
  const{data:{session}}=await sb.auth.getSession()
  if(!session){location.replace('/app/login.html');return}
  const uid=session.user.id

  const[{data:veh},{data:profile}]=await Promise.all([
    sb.from('vehicles').select('*').eq('owner_id',uid).eq('is_active',true).order('created_at',{ascending:true}),
    sb.from('profiles').select('*').eq('id',uid).single()
  ])

  allVehicles=veh||[]

  // Avatar
  const initials=(profile?.display_name||session.user.email||'?')[0].toUpperCase()
  $('user-avatar').textContent=initials

  // Select vehicle
  let selId=localStorage.getItem('al_vid')
  if(!selId||!allVehicles.find(v=>v.id===selId)){selId=allVehicles[0]?.id||null;if(selId)localStorage.setItem('al_vid',selId)}
  currentVehicle=allVehicles.find(v=>v.id===selId)||null

  // Vehicle switcher label
  $('vsw-name').textContent=currentVehicle?vName(currentVehicle):'No vehicle'
  if(allVehicles.length<=1)$('vsw-btn').style.cursor='default'

  if(!currentVehicle){
    $('content').innerHTML=`<div class="empty"><div class="empty-icon">🚗</div><h3>No vehicles yet</h3><p>Add your first vehicle in the AutoLog iPhone app to get started.</p></div>`
    return
  }

  // Fetch data
  const now=new Date()
  const sYear=new Date(now.getFullYear(),0,1).toISOString().split('T')[0]
  const sMon=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0]
  const vid=currentVehicle.id

  const[costsRes,fuelRes,maintRes,svcsRes]=await Promise.all([
    sb.from('cost_entries').select('amount,date,category').eq('vehicle_id',vid).gte('date',sYear),
    sb.from('fuel_entries').select('mpg,total_cost,date').eq('vehicle_id',vid).order('date',{ascending:false}).limit(20),
    sb.from('maintenance_items').select('name,status,next_due_date,next_due_mileage').eq('vehicle_id',vid),
    sb.from('service_entries').select('date,mileage_at_service,garage_name,garage_type,total_cost,description').eq('vehicle_id',vid).neq('source','dvsa').order('date',{ascending:false}).limit(4)
  ])
  if(costsRes.error)console.warn('cost_entries error:',costsRes.error.message)
  if(fuelRes.error)console.warn('fuel_entries error:',fuelRes.error.message)
  if(maintRes.error)console.warn('maintenance_items error:',maintRes.error.message)
  if(svcsRes.error)console.warn('service_entries error:',svcsRes.error.message)
  const costs=costsRes.data,fuelRows=fuelRes.data,maintItems=maintRes.data,svcs=svcsRes.data

  const allCosts=costs||[]
  const totalYear=allCosts.reduce((s,c)=>s+Number(c.amount||0),0)
  const totalMon=allCosts.filter(c=>c.date>=sMon).reduce((s,c)=>s+Number(c.amount||0),0)
  const mpgs=(fuelRows||[]).filter(f=>f.mpg).map(f=>Number(f.mpg))
  const avgMpg=mpgs.length?mpgs.reduce((a,b)=>a+b)/mpgs.length:null
  const overdue=(maintItems||[]).filter(i=>i.status==='overdue')
  const soon=(maintItems||[]).filter(i=>i.status==='due_soon')
  const mot=motStatus(currentVehicle)
  const tax=taxStatus(currentVehicle)
  const services=svcs||[]

  const v=currentVehicle
  const reg=v.registration?`<span style="font-family:monospace;font-size:.875rem;color:#94a3b8;letter-spacing:.05em;margin-left:10px">${v.registration.toUpperCase()}</span>`:''

  $('content').innerHTML=`
    <div class="pg-head">
      <div class="pg-head-text">
        <h1>${vName(v)}${reg}</h1>
        <p>${[v.year,v.colour,v.fuel_type].filter(Boolean).map(s=>s[0].toUpperCase()+s.slice(1)).join(' · ')||'Vehicle details'}</p>
      </div>
    </div>

    <!-- Status bar -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
      <div class="card" style="padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:0">
        <div style="width:40px;height:40px;border-radius:10px;background:${mot.color}12;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.25rem">✅</div>
        <div>
          <div style="font-size:.6875rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">MOT</div>
          <div style="font-size:.9375rem;font-weight:700;color:${mot.color}">${mot.label}</div>
        </div>
      </div>
      <div class="card" style="padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:0">
        <div style="width:40px;height:40px;border-radius:10px;background:${tax.color}12;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.25rem">🏷️</div>
        <div>
          <div style="font-size:.6875rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">Road Tax</div>
          <div style="font-size:.9375rem;font-weight:700;color:${tax.color}">${tax.label}</div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats" style="margin-bottom:20px">
      <div class="stat"><div class="stat-label">Mileage</div><div class="stat-value">${Number(v.current_mileage||0).toLocaleString('en-GB')}</div><div class="stat-sub">miles</div></div>
      ${avgMpg?`<div class="stat"><div class="stat-label">Avg MPG</div><div class="stat-value">${avgMpg.toFixed(1)}</div><div class="stat-sub">fuel economy</div></div>`:''}
      <div class="stat"><div class="stat-label">This Month</div><div class="stat-value">£${totalMon.toFixed(0)}</div><div class="stat-sub">total costs</div></div>
      <div class="stat"><div class="stat-label">This Year</div><div class="stat-value">£${totalYear.toFixed(0)}</div><div class="stat-sub">total costs</div></div>
    </div>

    <!-- Maintenance alert -->
    ${overdue.length+soon.length>0?`
    <div class="alert-banner ${overdue.length?'danger':'warn'}" style="margin-bottom:20px">
      <div class="alert-banner-icon">${overdue.length?'⚠️':'🔔'}</div>
      <div class="alert-banner-body" style="flex:1">
        <div class="title">${overdue.length?overdue.length+' item'+( overdue.length>1?'s':'')+' overdue':soon.length+' item'+(soon.length>1?'s':'')+' due soon'}</div>
        <div class="desc">${[...overdue,...soon].slice(0,3).map(i=>i.name).join(', ')}${overdue.length+soon.length>3?` and ${overdue.length+soon.length-3} more`:''}</div>
      </div>
      <a href="/app/maintenance.html" class="btn btn-ghost btn-sm" style="flex-shrink:0">View →</a>
    </div>`:''}

    <!-- Two column -->
    <div class="grid2">
      <!-- Recent services -->
      <div class="card">
        <div class="card-head"><span class="card-title">Recent Services</span><a href="/app/service.html" class="card-link">View all</a></div>
        ${services.length===0?'<div class="empty" style="padding:20px 0"><div class="empty-icon">🔧</div><p>No service records yet.</p></div>'
        :services.map(s=>`<div class="row-item">
          <div><div class="row-item-label">${s.garage_name||(s.garage_type||'Service').replace(/_/g,' ')}</div><div class="row-item-sub">${fmtDate(s.date)}${s.mileage_at_service?' · '+fmtMi(s.mileage_at_service):''}</div></div>
          ${s.total_cost?`<div class="row-item-val">${fmtGBP(s.total_cost)}</div>`:''}
        </div>`).join('')}
      </div>

      <!-- Quick links -->
      <div class="card">
        <div class="card-head"><span class="card-title">Quick Access</span></div>
        <div class="grid-auto" style="grid-template-columns:1fr 1fr">
          ${[['⛽','Fuel Log','/app/fuel.html'],['🔧','Service','/app/service.html'],['📅','Maintenance','/app/maintenance.html'],['📄','Documents','/app/documents.html'],['🗺️','Trips','/app/trips.html'],['⚙️','Settings','/app/settings.html']].map(([ic,lb,hr])=>`<a href="${hr}" class="qlink"><span class="qlink-icon">${ic}</span>${lb}</a>`).join('')}
        </div>
      </div>
    </div>

    <!-- Vehicle details -->
    <div class="card">
      <div class="card-head"><span class="card-title">Vehicle Details</span></div>
      <div class="vd-grid">
        ${[['Make',v.make],['Model',v.model],['Year',v.year],['Colour',v.colour],['Fuel Type',v.fuel_type?v.fuel_type[0].toUpperCase()+v.fuel_type.slice(1):null],['Engine',v.engine_size_cc?v.engine_size_cc+'cc':null],['Transmission',v.transmission?v.transmission[0].toUpperCase()+v.transmission.slice(1):null],['Power',v.power_bhp?v.power_bhp+'bhp':null],['VIN',v.vin]].filter(([,val])=>val).map(([lbl,val])=>`<div><div class="vd-item-label">${lbl}</div><div class="vd-item-val">${val}</div></div>`).join('')}
      </div>
    </div>
  `
  }catch(err){
    console.error('Dashboard render error:',err)
    $('content').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><h3>Something went wrong</h3><p style="font-size:.8125rem;color:#94a3b8">${err.message}</p></div>`
  }
})()
</script>
</body>
</html>
