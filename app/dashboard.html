function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
function fmtMi(n){return n!=null?Number(n).toLocaleString('en-GB')+' mi':'—'}
function fmtGBP(n){return n!=null?'£'+Number(n).toFixed(2):'—'}
function vName(v){return v.nickname||[v.year,v.make,v.model].filter(Boolean).join(' ')||v.registration||'Vehicle'}
function cap(s){return s&&s.length>0?s[0].toUpperCase()+s.slice(1):s}
function motStatus(v){
  if(!v.mot_expiry)return{label:'Unknown',cls:'badge-grey',color:'#94a3b8'}
  const d=Math.ceil((new Date(v.mot_expiry)-new Date())/86400000)
  if(d<0)return{label:'Expired',cls:'badge-red',color:'#dc2626'}
  if(d<=30)return{label:d+'d left',cls:'badge-amber',color:'#b45309'}
  return{label:fmtDate(v.mot_expiry),cls:'badge-green',color:'#15803d'}
}
function taxStatus(v){
  if(!v.tax_expiry)return{label:'Unknown',cls:'badge-grey',color:'#94a3b8'}
  const d=Math.ceil((new Date(v.tax_expiry)-new Date())/86400000)
  if(d<0)return{label:'Expired',cls:'badge-red',color:'#dc2626'}
  if(d<=30)return{label:d+'d left',cls:'badge-amber',color:'#b45309'}
  return{label:fmtDate(v.tax_expiry),cls:'badge-green',color:'#15803d'}
}
function toast(msg,ok=true){const el=$('toast');el.textContent=msg;el.style.borderLeft='3px solid '+(ok?'#22c55e':'#ef4444');el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',3500)}

let allVehicles=[],currentVehicle=null,userId=null

function toggleVsw(){
  const existing=$('vsw-drop')
  if(existing){existing.remove();$('vsw-btn').classList.remove('open');return}
  if(allVehicles.length<=1)return
  $('vsw-btn').classList.add('open')
  const drop=document.createElement('div')
  drop.id='vsw-drop';drop.className='vsw-drop'
  drop.innerHTML=allVehicles.map(v=>{
    const isCurrent=v.id===currentVehicle?.id
    return`<div class="vsw-item${isCurrent?' cur':''}" onclick="switchVehicle('${v.id}')">
      <div style="width:7px;height:7px;border-radius:50%;background:${isCurrent?'#1A7A8C':'#94a3b8'};flex-shrink:0"></div>
      <div><div>${vName(v)}</div>${v.registration?`<div class="vsw-item-reg">${v.registration.toUpperCase()}</div>`:''}</div>
    </div>`
  }).join('')
  $('vsw').appendChild(drop)
  setTimeout(()=>document.addEventListener('click',()=>{const d=$('vsw-drop');if(d){d.remove();$('vsw-btn').classList.remove('open')}},{once:true}),10)
}
function switchVehicle(id){localStorage.setItem('al_vid',id);location.reload()}

let _dvlaData=null
async function lookupReg(){
  const reg=document.querySelector('#av-reg').value.trim().replace(/\s/g,'').toUpperCase()
  if(!reg){return}
  const btn=document.querySelector('#av-lookup');btn.disabled=true;btn.textContent='Looking up…'
  const result=document.querySelector('#av-lookup-result')
  const errEl=document.querySelector('#av-err')
  result.style.display='none';errEl.classList.remove('on')
  try{
    const res=await fetch(`https://mechanic.autologapp.co.uk/dvla-lookup?reg=${encodeURIComponent(reg)}`)
    const d=await res.json()
    if(d.error||!d.make){
      errEl.textContent=d.error==='Vehicle not found'?'Not found in DVLA database — some vehicles aren\'t covered. Enter your details below manually.':'DVLA lookup failed — please enter details manually.'
      errEl.classList.add('on')
    } else {
      _dvlaData=d
      document.querySelector('#av-make').value=d.make||''
      document.querySelector('#av-model').value=''
      document.querySelector('#av-year').value=d.year||''
      result.style.display='block'
      const parts=[d.year,d.make,d.colour,d.fuelType].filter(Boolean)
      result.innerHTML=`✓ Found: <strong>${parts.join(' · ')}</strong>${d.motExpiry?' &nbsp;·&nbsp; MOT: '+d.motExpiry:''}`
    }
  }catch(e){
    errEl.textContent='Could not reach DVLA. Check your connection and try again.'
    errEl.classList.add('on')
  }
  btn.disabled=false;btn.textContent='Look Up'
}

async function saveVehicle(){
  const reg=document.querySelector('#av-reg').value.trim().toUpperCase()
  const make=document.querySelector('#av-make').value.trim()
  const model=document.querySelector('#av-model').value.trim()
  const year=parseInt(document.querySelector('#av-year').value)||null
  const mileage=parseInt(document.querySelector('#av-mileage').value)||0
  const nick=document.querySelector('#av-nick').value.trim()
  if(!reg&&!make){
    const e=document.querySelector('#av-err');e.textContent='Please enter at least a registration or make.';e.classList.add('on');return
  }
  const btn=document.querySelector('#av-save');btn.disabled=true;btn.textContent='Saving…'
  // Build record - merge manual inputs with any DVLA data
  const record={
    owner_id:userId,
    registration:reg||null,
    make:make||null,
    model:model||null,
    year,
    current_mileage:mileage,
    nickname:nick||null,
    is_active:true
  }
  // Enrich with DVLA data if lookup was done for this same reg
  if(_dvlaData&&_dvlaData.registration===reg){
    if(_dvlaData.colour) record.colour=_dvlaData.colour
    if(_dvlaData.fuelType) record.fuel_type=_dvlaData.fuelType
    if(_dvlaData.engineSizeCc) record.engine_size_cc=_dvlaData.engineSizeCc
    if(_dvlaData.doors) record.doors=_dvlaData.doors
    if(_dvlaData.motExpiry) record.mot_expiry=_dvlaData.motExpiry
    if(_dvlaData.taxExpiry) record.tax_expiry=_dvlaData.taxExpiry
  }
  const{data,error}=await sb.from('vehicles').insert(record).select().single()
  if(error){
    const e=document.querySelector('#av-err');e.textContent=error.message;e.classList.add('on');btn.disabled=false;btn.textContent='Add Vehicle';return
  }
  document.querySelector('.mbg').remove()
  toast('Vehicle added ✓')
  localStorage.setItem('al_vid',data.id)
  location.reload()
}

// ── Main ───────────────────────────────────────────────────
;(async()=>{
  try{
    const{data:{session}}=await sb.auth.getSession()
    if(!session){location.replace('/app/login');return}
    userId=session.user.id

    const[{data:veh},{data:profile}]=await Promise.all([
      sb.from('vehicles').select('*').eq('owner_id',userId).eq('is_active',true).order('created_at',{ascending:true}),
      sb.from('profiles').select('*').eq('id',userId).single()
    ])

    allVehicles=veh||[]

    // Avatar
    const _name=(profile?.display_name)||session.user.email||''
    $('user-avatar').textContent=_name.length>0?_name[0].toUpperCase():'?'

    // Show add vehicle button
    $('add-vehicle-btn').style.display='inline-flex'

    // Select vehicle
    let selId=localStorage.getItem('al_vid')
    if(!selId||!allVehicles.find(v=>v.id===selId)){selId=allVehicles[0]?.id||null;if(selId)localStorage.setItem('al_vid',selId)}
    currentVehicle=allVehicles.find(v=>v.id===selId)||null

    $('vsw-name').textContent=currentVehicle?vName(currentVehicle):'No vehicle'
    if(allVehicles.length<=1)$('vsw-btn').style.cursor='default'

    if(!currentVehicle){
      $('content').innerHTML=`
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:72px 24px;text-align:center;gap:20px">
          <div style="width:72px;height:72px;background:var(--teal-light);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:2rem">🚗</div>
          <div>
            <h2 style="font-size:1.375rem;font-weight:800;letter-spacing:-.02em;color:var(--text-primary);margin-bottom:8px">No vehicles yet</h2>
            <p style="font-size:.9375rem;color:var(--text-muted);max-width:380px;line-height:1.6">Add your first vehicle to start tracking fuel, services, maintenance and more.</p>
          </div>
          <button class="btn btn-primary" onclick="showAddVehicle()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Your First Vehicle
          </button>
          <p style="font-size:.8125rem;color:var(--text-muted)">Or add via the AutoLog iPhone app</p>
        </div>`
      return
    }

    // Fetch all data
    const now=new Date()
    const sYear=new Date(now.getFullYear(),0,1).toISOString().split('T')[0]
    const sMon=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0]
    const vid=currentVehicle.id

    const[costsRes,fuelRes,maintRes,svcsRes]=await Promise.all([
      sb.from('cost_entries').select('amount,date,category').eq('vehicle_id',vid).gte('date',sYear),
      sb.from('fuel_entries').select('mpg,total_cost,date').eq('vehicle_id',vid).order('date',{ascending:false}).limit(20),
      sb.from('maintenance_items').select('name,status,next_due_date,next_due_mileage').eq('vehicle_id',vid),
      sb.from('service_entries').select('date,mileage_at_service,garage_name,garage_type,total_cost,description').eq('vehicle_id',vid).neq('source','dvsa').order('date',{ascending:false}).limit(4)
    ])
    if(costsRes.error)console.warn('costs:',costsRes.error.message)
    if(fuelRes.error)console.warn('fuel:',fuelRes.error.message)
    if(maintRes.error)console.warn('maint:',maintRes.error.message)
    if(svcsRes.error)console.warn('svcs:',svcsRes.error.message)

    const allCosts=costsRes.data||[]
    const totalYear=allCosts.reduce((s,c)=>s+Number(c.amount||0),0)
    const totalMon=allCosts.filter(c=>c.date>=sMon).reduce((s,c)=>s+Number(c.amount||0),0)
    const mpgs=(fuelRes.data||[]).filter(f=>f.mpg).map(f=>Number(f.mpg))
    const avgMpg=mpgs.length?mpgs.reduce((a,b)=>a+b)/mpgs.length:null
    const overdue=(maintRes.data||[]).filter(i=>i.status==='overdue')
    const soon=(maintRes.data||[]).filter(i=>i.status==='due_soon')
    const mot=motStatus(currentVehicle)
    const tax=taxStatus(currentVehicle)
    const services=svcsRes.data||[]
    const v=currentVehicle
    const reg=v.registration?`<span style="font-family:var(--font-mono);font-size:.875rem;color:var(--text-muted);letter-spacing:.05em;margin-left:10px">${v.registration.toUpperCase()}</span>`:''

    $('content').innerHTML=`
      <div class="pg-head">
        <div class="pg-head-text">
          <h1>${vName(v)}${reg}</h1>
          <p>${[v.year,v.colour,v.fuel_type].filter(Boolean).map(s=>s&&s.length?cap(String(s)):'').filter(Boolean).join(' · ')||'Vehicle details'}</p>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
        <div class="card" style="padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:0">
          <div style="width:40px;height:40px;border-radius:10px;background:${mot.color}18;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.25rem">✅</div>
          <div><div style="font-size:.6875rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">MOT</div><div style="font-size:.9375rem;font-weight:700;color:${mot.color}">${mot.label}</div></div>
        </div>
        <div class="card" style="padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:0">
          <div style="width:40px;height:40px;border-radius:10px;background:${tax.color}18;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.25rem">🏷️</div>
          <div><div style="font-size:.6875rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">Road Tax</div><div style="font-size:.9375rem;font-weight:700;color:${tax.color}">${tax.label}</div></div>
        </div>
      </div>

      <div class="stats" style="margin-bottom:20px">
        <div class="stat"><div class="stat-label">Mileage</div><div class="stat-value">${Number(v.current_mileage||0).toLocaleString('en-GB')}</div><div class="stat-sub">miles</div></div>
        ${avgMpg?`<div class="stat"><div class="stat-label">Avg MPG</div><div class="stat-value">${avgMpg.toFixed(1)}</div><div class="stat-sub">fuel economy</div></div>`:''}
        <div class="stat"><div class="stat-label">This Month</div><div class="stat-value">£${totalMon.toFixed(0)}</div><div class="stat-sub">total costs</div></div>
        <div class="stat"><div class="stat-label">This Year</div><div class="stat-value">£${totalYear.toFixed(0)}</div><div class="stat-sub">total costs</div></div>
      </div>

      ${overdue.length+soon.length>0?`
      <div class="alert-banner ${overdue.length?'danger':'warn'}" style="margin-bottom:20px">
        <div class="alert-banner-icon">${overdue.length?'⚠️':'🔔'}</div>
        <div class="alert-banner-body" style="flex:1">
          <div class="title">${overdue.length?overdue.length+' item'+(overdue.length>1?'s':'')+' overdue':soon.length+' item'+(soon.length>1?'s':'')+' due soon'}</div>
          <div class="desc">${[...overdue,...soon].slice(0,3).map(i=>i.name).join(', ')}${overdue.length+soon.length>3?` and ${overdue.length+soon.length-3} more`:''}</div>
        </div>
        <a href="/app/maintenance" class="btn btn-ghost btn-sm" style="flex-shrink:0">View →</a>
      </div>`:''}

      <div class="grid2">
        <div class="card">
          <div class="card-head"><span class="card-title">Recent Services</span><a href="/app/service" class="card-link">View all</a></div>
          ${services.length===0?'<div class="empty" style="padding:20px 0"><div class="empty-icon">🔧</div><p>No service records yet.</p></div>'
          :services.map(s=>`<div class="row-item">
            <div><div class="row-item-label">${s.garage_name||(s.garage_type||'Service').replace(/_/g,' ')}</div><div class="row-item-sub">${fmtDate(s.date)}${s.mileage_at_service?' · '+fmtMi(s.mileage_at_service):''}</div></div>
            ${s.total_cost?`<div class="row-item-val">${fmtGBP(s.total_cost)}</div>`:''}
          </div>`).join('')}
        </div>
        <div class="card">
          <div class="card-head"><span class="card-title">Quick Access</span></div>
          <div class="grid-auto" style="grid-template-columns:1fr 1fr">
            ${[['⛽','Fuel Log','/app/fuel'],['🔧','Service','/app/service'],['📅','Maintenance','/app/maintenance'],['📄','Documents','/app/documents'],['🗺️','Trips','/app/trips'],['⚙️','Settings','/app/settings']].map(([ic,lb,hr])=>`<a href="${hr}" class="qlink"><span class="qlink-icon">${ic}</span>${lb}</a>`).join('')}
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><span class="card-title">Vehicle Details</span></div>
        <div class="vd-grid">
          ${[['Make',v.make],['Model',v.model],['Year',v.year],['Colour',v.colour],['Fuel Type',v.fuel_type&&v.fuel_type.length?cap(v.fuel_type):null],['Engine',v.engine_size_cc?v.engine_size_cc+'cc':null],['Transmission',v.transmission&&v.transmission.length?cap(v.transmission):null],['Power',v.power_bhp?v.power_bhp+'bhp':null],['VIN',v.vin]].filter(([,val])=>val).map(([lbl,val])=>`<div><div class="vd-item-label">${lbl}</div><div class="vd-item-val">${val}</div></div>`).join('')}
        </div>
      </div>
    `
  }catch(err){
    console.error('Dashboard error:',err)
    $('content').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><h3>Something went wrong</h3><p style="font-size:.8125rem;color:var(--text-muted)">${err.message}</p></div>`
  }
})()
</script>
</body>
</html>
