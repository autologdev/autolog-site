function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
function fmtMi(n){return n!=null?Number(n).toLocaleString('en-GB')+' mi':'—'}
function fmtGBP(n){return n!=null?'£'+Number(n).toFixed(2):'—'}
function vName(v){return v.nickname||[v.year,v.make,v.model].filter(Boolean).join(' ')||v.registration||'Vehicle'}
function cap(s){return s&&s.length>0?s[0].toUpperCase()+s.slice(1):s}
function motStatus(v){
  if(!v.mot_expiry)return{label:'Unknown',cls:'badge-grey',color:'#94a3b8'}
  const d=Math.ceil((new Date(v.mot_expiry)-new Date())/86400000)
  if(d<0)return{label:'Expired',cls:'badge-red',color:'#dc2626'}
  if(d<=30)return{label:d+'d left',cls:'badge-amber',color:'#b45309'}
  return{label:fmtDate(v.mot_expiry),cls:'badge-green',color:'#15803d'}
}
function taxStatus(v){
  if(!v.tax_expiry)return{label:'Unknown',cls:'badge-grey',color:'#94a3b8'}
  const d=Math.ceil((new Date(v.tax_expiry)-new Date())/86400000)
  if(d<0)return{label:'Expired',cls:'badge-red',color:'#dc2626'}
  if(d<=30)return{label:d+'d left',cls:'badge-amber',color:'#b45309'}
  return{label:fmtDate(v.tax_expiry),cls:'badge-green',color:'#15803d'}
}

function toggleVsw(){
  const existing=$('vsw-drop')
  if(existing){existing.remove();$('vsw-btn').classList.remove('open');return}
  if(allVehicles.length<=1)return
  $('vsw-btn').classList.add('open')
  const drop=document.createElement('div')
  drop.id='vsw-drop';drop.className='vsw-drop'
  drop.innerHTML=allVehicles.map(v=>{
    const isCurrent=v.id===currentVehicle?.id
    const isLocked=(window.__al_lockedSet&&window.__al_lockedSet.has(v.id))
    const isShared=v.owner_id!==(window.__al_userId||userId)
    let tag=''
    if(isLocked)tag='<span class="vsw-tag locked">Locked</span>'
    else if(isShared)tag='<span class="vsw-tag shared">Shared</span>'
    return`<div class="vsw-item${isCurrent?' cur':''}${isLocked?' locked':''}" onclick="switchVehicle('${v.id}')">
      <div style="width:7px;height:7px;border-radius:50%;background:${isCurrent?'#1A7A8C':isLocked?'#B8C9D6':'#94a3b8'};flex-shrink:0"></div>
      <div style="flex:1;min-width:0"><div>${vName(v)}${tag}</div>${v.registration?`<div class="vsw-item-reg">${v.registration.toUpperCase()}</div>`:''}</div>
    </div>`
  }).join('')
  $('vsw').appendChild(drop)
  setTimeout(()=>document.addEventListener('click',()=>{const d=$('vsw-drop');if(d){d.remove();$('vsw-btn').classList.remove('open')}},{once:true}),10)
}

let _dvlaData=null
async function lookupReg(){
  const reg=document.querySelector('#av-reg').value.trim().replace(/\s/g,'').toUpperCase()
  if(!reg){return}
  const btn=document.querySelector('#av-lookup');btn.disabled=true;btn.textContent='Looking up…'
  const result=document.querySelector('#av-lookup-result')
  const errEl=document.querySelector('#av-err')
  result.style.display='none';errEl.classList.remove('on')
  try{
    const res=await fetch(`https://mechanic.autologapp.co.uk/dvla-lookup?reg=${encodeURIComponent(reg)}`)
    const d=await res.json()
    if(d.error||!d.make){
      errEl.textContent=d.error==='Vehicle not found'?'Not found in DVLA database — some vehicles aren\'t covered. Enter your details below manually.':'DVLA lookup failed — please enter details manually.'
      errEl.classList.add('on')
    } else {
      _dvlaData=d
      document.querySelector('#av-make').value=d.make||''
      document.querySelector('#av-model').value=''
      document.querySelector('#av-year').value=d.year||''
      result.style.display='block'
      const parts=[d.year,d.make,d.colour,d.fuelType].filter(Boolean)
      result.innerHTML=`✓ Found: <strong>${parts.join(' · ')}</strong>${d.motExpiry?' &nbsp;·&nbsp; MOT: '+d.motExpiry:''}`
    }
  }catch(e){
    errEl.textContent='Could not reach DVLA. Check your connection and try again.'
    errEl.classList.add('on')
  }
  btn.disabled=false;btn.textContent='Look Up'
}

async function saveVehicle(){
  const reg=document.querySelector('#av-reg').value.trim().toUpperCase()
  const make=document.querySelector('#av-make').value.trim()
  const model=document.querySelector('#av-model').value.trim()
  const year=parseInt(document.querySelector('#av-year').value)||null
  const mileage=parseInt(document.querySelector('#av-mileage').value)||0
  const nick=document.querySelector('#av-nick').value.trim()
  if(!reg&&!make){
    const e=document.querySelector('#av-err');e.textContent='Please enter at least a registration or make.';e.classList.add('on');return
  }
  const btn=document.querySelector('#av-save');btn.disabled=true;btn.textContent='Saving…'
  const record={
    owner_id:userId,
    registration:reg||null,
    make:make||null,
    model:model||null,
    year,
    current_mileage:mileage,
    nickname:nick||null,
    is_active:true
  }
  if(_dvlaData&&_dvlaData.registration===reg){
    if(_dvlaData.colour) record.colour=_dvlaData.colour
    if(_dvlaData.fuelType) record.fuel_type=_dvlaData.fuelType
    if(_dvlaData.engineSizeCc) record.engine_size_cc=_dvlaData.engineSizeCc
    if(_dvlaData.doors) record.doors=_dvlaData.doors
    if(_dvlaData.motExpiry) record.mot_expiry=_dvlaData.motExpiry
    if(_dvlaData.taxExpiry) record.tax_expiry=_dvlaData.taxExpiry
  }
  const{data,error}=await sb.from('vehicles').insert(record).select().single()
  if(error){
    const e=document.querySelector('#av-err');e.textContent=error.message;e.classList.add('on');btn.disabled=false;btn.textContent='Add Vehicle';return
  }
  document.querySelector('.mbg').remove()
  toast('Vehicle added ✓')
  // Analytics: vehicle_added — CONSENT GATED
  if(window.AutoLogConsent&&window.AutoLogConsent.hasAnalyticsConsent()){
    try{await sb.from('analytics_events').insert({user_id:userId,event_name:'vehicle_added',properties:{source:'web',make:make||null}})}catch(e){}
  }
  localStorage.setItem('al_vid',data.id)
  location.reload()
}

;(async()=>{

    const[costsRes,sixMoRes,fuelRes,fuelAllRes,maintRes,maintNextRes,svcsRes,profRes]=await Promise.all([
      sb.from('cost_entries').select('amount,date,category').eq('vehicle_id',vid).gte('date',sYear),
      sb.from('cost_entries').select('amount,date,category').eq('vehicle_id',vid).gte('date',sSixMo),
      sb.from('fuel_entries').select('mpg,total_cost,date').eq('vehicle_id',vid).order('date',{ascending:false}).limit(20),
      sb.from('fuel_entries').select('mpg,date').eq('vehicle_id',vid).gte('date',sLastMon).order('date',{ascending:true}),
      sb.from('maintenance_items').select('name,status,next_due_date,next_due_mileage').eq('vehicle_id',vid),
      sb.from('maintenance_items').select('name,status,next_due_date,next_due_mileage,dealer_cost_max,specialist_cost_max').eq('vehicle_id',vid).in('status',['overdue','due_soon','upcoming']).order('next_due_date',{ascending:true,nullsFirst:false}).limit(3),
      sb.from('service_entries').select('date,mileage_at_service,garage_name,garage_type,total_cost,description,invoice_number').eq('vehicle_id',vid).neq('source','dvsa').order('date',{ascending:false}).limit(4),
      sb.from('profiles').select('plan').eq('id',userId).single()
    ])
    const userPlan = profRes?.data?.plan || 'free'
    const _isPro = userPlan === 'paid' || userPlan === 'business'

    // --- Compute locked-vehicle set (iOS DowngradeManager parity) ---
    let lockedSet = new Set()
    if(!_isPro){
      const owned = allVehicles.filter(vv => vv.owner_id === userId)
      if(owned.length > 1){
        const sorted = [...owned].sort((a,b)=>{
          const au=new Date(a.updated_at||a.created_at||0).getTime()
          const bu=new Date(b.updated_at||b.created_at||0).getTime()
          return bu-au
        })
        lockedSet = new Set(sorted.slice(1).map(vv=>vv.id))
      }
    }
    const ownedCount = allVehicles.filter(vv=>vv.owner_id===userId).length
    const currentIsLocked = lockedSet.has(currentVehicle.id)
    const currentIsSharedReadOnly = !_isPro && currentVehicle.owner_id !== userId && ownedCount >= 1
    window.__al_lockedSet = lockedSet
    window.__al_userId = userId
    window.__al_plan = userPlan

    const allCosts=costsRes.data||[]
    const sixMoCosts=sixMoRes.data||[]
    const totalYear=allCosts.reduce((s,c)=>s+Number(c.amount||0),0)
    const totalMon=allCosts.filter(c=>c.date>=sMon).reduce((s,c)=>s+Number(c.amount||0),0)
    const totalLastMon=allCosts.filter(c=>c.date>=sLastMon&&c.date<eLastMon).reduce((s,c)=>s+Number(c.amount||0),0)
    const mthCostCount=allCosts.filter(c=>c.date>=sMon).length
    const mpgs=(fuelRes.data||[]).filter(f=>f.mpg).map(f=>Number(f.mpg))
    const avgMpg=mpgs.length?mpgs.reduce((a,b)=>a+b)/mpgs.length:null
    const recentMpgs=(fuelAllRes.data||[]).filter(f=>f.mpg).slice(-8).map(f=>Number(f.mpg))
    const overdue=(maintRes.data||[]).filter(i=>i.status==='overdue')
    const soon=(maintRes.data||[]).filter(i=>i.status==='due_soon')
    const nextUp=(maintNextRes.data||[])
    const mot=motStatus(currentVehicle)
    const tax=taxStatus(currentVehicle)
    const services=svcsRes.data||[]
    const v=currentVehicle

    // Insurance status derived from vehicle.insurance_expiry (if present)
    const insuranceStatus=(()=>{
      if(!v.insurance_expiry)return{label:'Not set',cls:'neutral'}
      const d=Math.ceil((new Date(v.insurance_expiry)-new Date())/86400000)
      if(d<0)return{label:'Expired',cls:'danger'}
      if(d<=30)return{label:d+' days left',cls:'warn'}
      return{label:'Valid · '+fmtDate(v.insurance_expiry),cls:'ok'}
    })()
    // Map iOS colour palette → new chip classes
    const motChip=mot.color==='#dc2626'?'danger':mot.color==='#b45309'?'warn':mot.color==='#15803d'?'ok':'neutral'
    const taxChip=tax.color==='#dc2626'?'danger':tax.color==='#b45309'?'warn':tax.color==='#15803d'?'ok':'neutral'

    // YTD miles + cost-per-mile
    const ytdMiles=(fuelAllRes.data||[]).reduce((s,f)=>s+0,0) // fuel doesn't have miles_since_last_fill here; fall back on mileage delta
    // Better: use difference between current and start-of-year mileage if available; for now show YTD cost only
    const costPerMile=v.current_mileage && v.current_mileage > 0 && ytdMiles ? (totalYear/ytdMiles) : null

    // Monthly delta badge logic
    const monthDeltaPct = totalLastMon > 0 ? ((totalMon - totalLastMon) / totalLastMon) * 100 : null
    const mpgDelta = (fuelAllRes.data||[]).length>=2 ?
      (recentMpgs.slice(-1)[0] - recentMpgs[0]).toFixed(1) : null

    // Sparkline helper (local, idempotent)
    function _spark(values){
      if(!values||values.length<2)return ''
      const W=80,H=18,P=1.5
      const mn=Math.min(...values),mx=Math.max(...values),r=mx-mn||1
      const pts=values.map((vv,i)=>{
        const x=(i/(values.length-1))*W
        const y=H-P-((vv-mn)/r)*(H-P*2)
        return x.toFixed(1)+','+y.toFixed(1)
      }).join(' ')
      return `<svg class="stat-mini-sparkline" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><polyline points="${pts}"/></svg>`
    }

    // 6-month stacked cost chart builder
    function _costChart(){
      const months=[]
      for(let i=5;i>=0;i--){
        const d=new Date(now.getFullYear(),now.getMonth()-i,1)
        months.push({key:d.toISOString().split('T')[0].slice(0,7),label:d.toLocaleDateString('en-GB',{month:'short'})})
      }
      const catMap={fuel:'fuel',service:'service',insurance:'insurance',tax:'tax'}
      const buckets=months.map(m=>({label:m.label,fuel:0,service:0,insurance:0,tax:0,other:0,total:0}))
      sixMoCosts.forEach(c=>{
        const mk=(c.date||'').slice(0,7)
        const idx=months.findIndex(m=>m.key===mk)
        if(idx<0)return
        const cat=catMap[(c.category||'').toLowerCase()]||'other'
        buckets[idx][cat]+=Number(c.amount||0)
        buckets[idx].total+=Number(c.amount||0)
      })
      const maxT=Math.max(1,...buckets.map(b=>b.total))
      const cols=buckets.map(b=>{
        const scale=v=>Math.max(0,Math.round((v/maxT)*60))
        return `<div class="cost-chart-col">
          <div class="cost-chart-stack">
            <span class="fuel" style="height:${scale(b.fuel)}px"></span>
            <span class="service" style="height:${scale(b.service)}px"></span>
            <span class="insurance" style="height:${scale(b.insurance)}px"></span>
            <span class="tax" style="height:${scale(b.tax)}px"></span>
            <span class="other" style="height:${scale(b.other)}px"></span>
          </div>
          <div class="cost-chart-label">${b.label}</div>
        </div>`
      }).join('')
      return `
        <div class="card">
          <div class="card-head">
            <span class="card-title">Cost breakdown · last 6 months</span>
            <div class="cost-chart-legend">
              <span><span class="cost-chart-legend-swatch" style="background:var(--teal)"></span>Fuel</span>
              <span><span class="cost-chart-legend-swatch" style="background:var(--teal-mid)"></span>Service</span>
              <span><span class="cost-chart-legend-swatch" style="background:#F5C842"></span>Insurance</span>
              <span><span class="cost-chart-legend-swatch" style="background:#a78bfa"></span>Tax</span>
              <span><span class="cost-chart-legend-swatch" style="background:var(--text-faint)"></span>Other</span>
            </div>
          </div>
          <div class="cost-chart">${cols}</div>
        </div>`
    }

    // Next Up builder (top 3 upcoming maintenance items)
    function _nextUp(){
      if(!nextUp.length)return `<div class="empty" style="padding:12px 0"><div style="font-size:.8125rem;color:var(--text-muted)">No maintenance items coming up. Add manufacturer schedules from the iOS app.</div></div>`
      return nextUp.map(i=>{
        const cls=i.status==='overdue'?'overdue':i.status==='due_soon'?'soon':'ok'
        let subText='—'
        if(i.next_due_date){
          const d=Math.ceil((new Date(i.next_due_date)-new Date())/86400000)
          subText=d<0?'Overdue by '+Math.abs(d)+' days':'Due in '+d+' days'
        }else if(i.next_due_mileage && v.current_mileage){
          const miles=Math.max(0,i.next_due_mileage-v.current_mileage)
          subText='Due in '+miles.toLocaleString('en-GB')+' mi'
        }
        const estCost=i.dealer_cost_max||i.specialist_cost_max
        if(estCost) subText += ' · typically £'+Math.round(estCost)
        return `<div class="next-up-item ${cls}">
          <div class="next-up-title">${i.name}</div>
          <div class="next-up-sub">${subText}</div>
        </div>`
      }).join('')
    }

    // Service row icon + category inference
    function _svcIcon(s){
      const desc=((s.description||'')+' '+(s.garage_name||'')).toLowerCase()
      if(desc.includes('mot'))return{icon:'✓',cls:'ok'}
      if(desc.includes('tyre')||desc.includes('tire'))return{icon:'◎',cls:''}
      if(desc.includes('brake'))return{icon:'◉',cls:''}
      if(desc.includes('oil')||desc.includes('service'))return{icon:'🛢',cls:''}
      return{icon:'🔧',cls:''}
    }

    // Vehicle identifier: hero icon
    const heroIcon=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0-4 0"/><path d="M17 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0-4 0"/><path d="M5 17H3V9a1 1 0 0 1 1-1h13l4 4v5h-2"/><path d="M9 17h6"/></svg>`
    const vehicleSubtitle=[v.year,v.colour,v.fuel_type&&cap(v.fuel_type),v.engine_size_cc?v.engine_size_cc+'cc':null,v.power_bhp?v.power_bhp+' bhp':null].filter(Boolean).join(' · ')||'Vehicle details'
    const sharedBadge=v.owner_id!==userId?'<span class="chip chip-shared" style="margin-left:8px">Shared</span>':''

    $('content').innerHTML=`
      ${currentIsLocked?lockedBannerHTMLInline('locked_owned'):''}
      ${currentIsSharedReadOnly?lockedBannerHTMLInline('locked_shared'):''}

      <div class="vehicle-hero">
        <div class="vh-head">
          <div class="vh-identity">
            <div class="vh-icon">${heroIcon}</div>
            <div style="min-width:0">
              <div class="vh-name">${vName(v)}${sharedBadge}</div>
              <div class="vh-sub">${vehicleSubtitle}</div>
            </div>
          </div>
          ${v.registration?`<div class="vh-plate">${v.registration.toUpperCase()}</div>`:''}
        </div>
        <div class="vh-status-strip">
          <div class="vh-status ${motChip}">
            <div class="vh-status-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>
            <div><div class="vh-status-label">MOT</div><div class="vh-status-val">${mot.label}</div></div>
          </div>
          <div class="vh-status ${taxChip}">
            <div class="vh-status-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>
            <div><div class="vh-status-label">Road Tax</div><div class="vh-status-val">${tax.label}</div></div>
          </div>
          <div class="vh-status ${insuranceStatus.cls}">
            <div class="vh-status-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
            <div><div class="vh-status-label">Insurance</div><div class="vh-status-val">${insuranceStatus.label}</div></div>
          </div>
        </div>
      </div>

      <div class="stats-strip">
        <div class="stat-mini">
          <div class="stat-mini-head"><span class="stat-mini-label">Mileage</span></div>
          <div class="stat-mini-value">${Number(v.current_mileage||0).toLocaleString('en-GB')}</div>
          <div class="stat-mini-sub">miles</div>
          ${recentMpgs.length>1?_spark(recentMpgs.map((_,i)=>Number(v.current_mileage||0)-(recentMpgs.length-1-i)*300)):''}
        </div>
        ${avgMpg?`<div class="stat-mini">
          <div class="stat-mini-head">
            <span class="stat-mini-label">Avg MPG</span>
            ${mpgDelta&&Number(mpgDelta)!==0?`<span class="stat-mini-delta ${Number(mpgDelta)>0?'up':'down'}">${Number(mpgDelta)>0?'+':''}${mpgDelta}</span>`:''}
          </div>
          <div class="stat-mini-value">${avgMpg.toFixed(1)}</div>
          <div class="stat-mini-sub">${recentMpgs.length} recent fills</div>
          ${_spark(recentMpgs)}
        </div>`:''}
        <div class="stat-mini">
          <div class="stat-mini-head">
            <span class="stat-mini-label">This Month</span>
            ${monthDeltaPct!==null?`<span class="stat-mini-delta ${monthDeltaPct>0?'up':'down'}">${monthDeltaPct>0?'+':''}${Math.round(monthDeltaPct)}%</span>`:''}
          </div>
          <div class="stat-mini-value">£${totalMon.toFixed(0)}</div>
          <div class="stat-mini-sub">${mthCostCount} item${mthCostCount===1?'':'s'}</div>
        </div>
        <div class="stat-mini">
          <div class="stat-mini-head"><span class="stat-mini-label">This Year</span></div>
          <div class="stat-mini-value">£${totalYear.toFixed(0)}</div>
          <div class="stat-mini-sub">total costs</div>
        </div>
      </div>

      ${overdue.length+soon.length>0?`
      <div class="alert-banner ${overdue.length?'danger':'warn'}" style="margin-bottom:14px">
        <div class="alert-banner-icon">${overdue.length?'⚠️':'🔔'}</div>
        <div class="alert-banner-body" style="flex:1">
          <div class="title">${overdue.length?overdue.length+' item'+(overdue.length>1?'s':'')+' overdue':soon.length+' item'+(soon.length>1?'s':'')+' due soon'}</div>
          <div class="desc">${[...overdue,...soon].slice(0,3).map(i=>i.name).join(', ')}${overdue.length+soon.length>3?' and '+(overdue.length+soon.length-3)+' more':''}</div>
        </div>
        <a href="/app/maintenance" class="btn btn-ghost btn-sm" style="flex-shrink:0">View →</a>
      </div>`:''}

      <div class="grid2">
        <div class="card">
          <div class="card-head"><span class="card-title">Recent services</span><a href="/app/service" class="card-link">View all →</a></div>
          ${services.length===0?'<div class="empty" style="padding:20px 0"><div class="empty-icon">🔧</div><p>No service records yet.</p></div>'
          :services.map(s=>{const i=_svcIcon(s);return `<div class="svc-row">
            <div class="svc-row-icon ${i.cls}">${i.icon}</div>
            <div class="svc-row-body">
              <div class="svc-row-title">${s.garage_name||(s.garage_type||'Service').replace(/_/g,' ')}</div>
              <div class="svc-row-meta">${fmtDate(s.date)}${s.mileage_at_service?' · '+fmtMi(s.mileage_at_service):''}${s.invoice_number?' · '+s.invoice_number:''}</div>
            </div>
            ${s.total_cost?`<div class="svc-row-val">${fmtGBP(s.total_cost)}</div>`:''}
          </div>`}).join('')}
        </div>
        <div class="card">
          <div class="card-head"><span class="card-title">Next up</span><a href="/app/maintenance" class="card-link">View all →</a></div>
          ${_nextUp()}
        </div>
      </div>

      ${sixMoCosts.length>0?_costChart():''}

      <div class="card">
        <div class="card-head"><span class="card-title">Vehicle details</span></div>
        <div class="vd-grid">
          ${[['Make',v.make],['Model',v.model],['Year',v.year],['Colour',v.colour],['Fuel Type',v.fuel_type&&v.fuel_type.length?cap(v.fuel_type):null],['Engine',v.engine_size_cc?v.engine_size_cc+'cc':null],['Transmission',v.transmission&&v.transmission.length?cap(v.transmission):null],['Power',v.power_bhp?v.power_bhp+'bhp':null],['VIN',v.vin]].filter(([,val])=>val).map(([lbl,val])=>`<div><div class="vd-item-label">${lbl}</div><div class="vd-item-val">${val}</div></div>`).join('')}
        </div>
      </div>
    `


    if(allVehicles.length > 1) {
      const svcPromises = allVehicles.map(v =>
        sb.from('service_entries').select('date').eq('vehicle_id',v.id).neq('source','dvsa').order('date',{ascending:false}).limit(1)
      )
      const svcResults = await Promise.all(svcPromises)
      const summaryEl = document.createElement('div')
      summaryEl.innerHTML = `
        <div style="margin-bottom:24px">
          <div style="font-size:.8125rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px">All Vehicles</div>
          <div class="vehicle-cards-grid">
            ${allVehicles.map((v,idx) => {
              const mot = motStatus(v)
              const tax = taxStatus(v)
              const lastSvc = svcResults[idx]?.data?.[0]?.date
              const isActive = v.id === currentVehicle?.id
              return `<div onclick="switchVehicle('${v.id}')" style="background:var(--surface);border-radius:var(--radius);padding:18px 20px;border:1.5px solid ${isActive?'var(--teal)':'var(--border-soft)'};box-shadow:var(--shadow-sm);cursor:pointer;transition:all .15s" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='var(--shadow-md)'" onmouseout="this.style.transform='';this.style.boxShadow='var(--shadow-sm)'">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px">
                  <div>
                    <div style="font-size:.9375rem;font-weight:700;color:var(--text-primary);letter-spacing:-.01em">${vName(v)}</div>
                    ${v.registration ? `<div style="font-family:var(--font-mono);font-size:.75rem;color:var(--text-muted);letter-spacing:.05em;margin-top:1px">${v.registration.toUpperCase()}</div>` : ''}
                  </div>
                  ${isActive ? `<span style="font-size:.625rem;font-weight:700;background:var(--teal);color:#fff;padding:3px 8px;border-radius:100px;letter-spacing:.04em">ACTIVE</span>` : ''}
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
                  <div>
                    <div style="font-size:.625rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">MOT</div>
                    <span class="badge ${mot.cls}" style="font-size:.6875rem">${mot.label}</span>
                  </div>
                  <div>
                    <div style="font-size:.625rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">Tax</div>
                    <span class="badge ${tax.cls}" style="font-size:.6875rem">${tax.label}</span>
                  </div>
                  <div>
                    <div style="font-size:.625rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">Last Service</div>
                    <span style="font-size:.75rem;font-weight:600;color:var(--text-secondary)">${lastSvc ? fmtDate(lastSvc) : '—'}</span>
                  </div>
                </div>
              </div>`
            }).join('')}
          </div>
        </div>`
      $('content').prepend(summaryEl)
    }

    // ── Post-signup first action prompt ──────────────────────────
    const firstActionKey='al_first_action_prompted_'+userId
    if(!localStorage.getItem(firstActionKey)&&allVehicles.length===1&&services.length===0){
      const b=document.createElement('div')
      b.className='alert-banner'
      b.style.cssText='background:linear-gradient(135deg,var(--teal-light),#f0fdf4);border:1px solid rgba(30,122,140,.2);margin-bottom:20px'
      b.innerHTML=`<div style="flex:1">
        <div style="font-size:.9375rem;font-weight:700;color:var(--text-primary);margin-bottom:6px">${vName(currentVehicle)} is now being tracked &#x2705;</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
          <a href="/app/fuel" class="btn btn-ghost btn-sm">⛽ Log a fill-up</a>
          <a href="/app/service" class="btn btn-ghost btn-sm">🔧 Add a service</a>
          <a href="/app/documents" class="btn btn-ghost btn-sm">📄 View documents</a>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="this.closest('.alert-banner').remove()" style="flex-shrink:0;align-self:flex-start">✕</button>`
      $('content').prepend(b)
      // Only set this key if consent is granted (non-essential localStorage)
      if(window.AutoLogConsent&&window.AutoLogConsent.hasAnalyticsConsent()){
        localStorage.setItem(firstActionKey,'1')
      }
    }

  }catch(err){
    console.error('Dashboard error:',err)
    $('content').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><h3>Something went wrong</h3><p style="font-size:.875rem;color:var(--text-muted);margin-bottom:16px">${err.message||'Could not load your dashboard. Please check your connection.'}</p><button class="btn btn-primary" onclick="location.reload()">Try again</button></div>`
  }
})()

</script>
</body>
</html>
