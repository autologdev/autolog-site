<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — AutoLog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<script type="module">
import { supabase, requireAuth, getProfile, getVehicleDisplayName, getMotStatus, getTaxStatus, formatMileage, formatCurrency, formatDate, getSelectedVehicleId, setSelectedVehicleId, statusPill, showToast, renderSidebar, injectAppStyles, initSidebar } from './app.js'

injectAppStyles()

async function init() {
  const session = await requireAuth()
  if (!session) return

  const profile = await getProfile()
  const userId = session.user.id

  // Fetch vehicles
  const { data: vehicles } = await supabase
    .from('vehicles')
    .select('*')
    .eq('owner_id', userId)
    .eq('is_active', true)
    .order('created_at', { ascending: true })

  const allVehicles = vehicles || []

  // Determine selected vehicle
  let selectedId = getSelectedVehicleId()
  if (!selectedId || !allVehicles.find(v => v.id === selectedId)) {
    selectedId = allVehicles[0]?.id || null
    if (selectedId) setSelectedVehicleId(selectedId)
  }
  const vehicle = allVehicles.find(v => v.id === selectedId)

  // Render shell
  document.body.innerHTML = `
    ${renderSidebar('dashboard')}
    <div class="app-main">
      <div class="app-topbar">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="mobile-menu-btn" id="mobile-menu-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <span class="app-topbar-title">Dashboard</span>
        </div>
        <div class="app-topbar-right">
          ${allVehicles.length > 1 ? `
            <div class="vehicle-switcher" id="vehicle-switcher-btn" title="Switch vehicle">
              <div class="vehicle-switcher-dot"></div>
              <span id="switcher-label">${vehicle ? getVehicleDisplayName(vehicle) : 'No vehicle'}</span>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          ` : vehicle ? `
            <div class="vehicle-switcher" style="cursor:default;">
              <div class="vehicle-switcher-dot"></div>
              <span>${getVehicleDisplayName(vehicle)}</span>
            </div>
          ` : ''}
          <span style="font-size:0.875rem;color:#94a3b8;">${profile?.display_name || session.user.email}</span>
        </div>
      </div>
      <div class="app-content" id="main-content">
        <div class="loading-state"><div class="spinner"></div><span>Loading dashboard…</span></div>
      </div>
    </div>
  `

  initSidebar()

  // Vehicle switcher dropdown
  if (allVehicles.length > 1) {
    document.getElementById('vehicle-switcher-btn').addEventListener('click', () => {
      showVehiclePicker(allVehicles, selectedId, (newId) => {
        setSelectedVehicleId(newId)
        window.location.reload()
      })
    })
  }

  if (!vehicle) {
    document.getElementById('main-content').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🚗</div>
        <h3>No vehicles yet</h3>
        <p>Add your first vehicle in the AutoLog iPhone app to get started.</p>
      </div>
    `
    return
  }

  // Fetch data in parallel
  const now = new Date()
  const startOfYear = new Date(now.getFullYear(), 0, 1).toISOString().split('T')[0]
  const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0]

  const [{ data: costEntries }, { data: fuelEntries }, { data: maintenanceItems }, { data: serviceEntries }] = await Promise.all([
    supabase.from('cost_entries').select('*').eq('vehicle_id', selectedId).gte('date', startOfYear),
    supabase.from('fuel_entries').select('*').eq('vehicle_id', selectedId).order('date', { ascending: false }).limit(5),
    supabase.from('maintenance_items').select('*').eq('vehicle_id', selectedId),
    supabase.from('service_entries').select('*').eq('vehicle_id', selectedId).order('date', { ascending: false }).limit(3),
  ])

  const costs = costEntries || []
  const fuel = fuelEntries || []
  const items = maintenanceItems || []
  const services = serviceEntries || []

  const totalYear = costs.reduce((s, c) => s + Number(c.amount), 0)
  const totalMonth = costs.filter(c => c.date >= startOfMonth).reduce((s, c) => s + Number(c.amount), 0)

  const avgMpg = fuel.length ? fuel.filter(f => f.mpg).reduce((s, f) => s + Number(f.mpg), 0) / fuel.filter(f => f.mpg).length : null
  const overdueItems = items.filter(i => i.status === 'overdue')
  const dueSoonItems = items.filter(i => i.status === 'due_soon')

  const mot = getMotStatus(vehicle)
  const tax = getTaxStatus(vehicle)

  const statusColour = { green: '#34C759', amber: '#FF9500', red: '#FF3B30', grey: '#94a3b8' }

  document.getElementById('main-content').innerHTML = `
    <div class="page-header">
      <h1>${getVehicleDisplayName(vehicle)}</h1>
      ${vehicle.registration ? `<p class="font-mono" style="margin-top:4px;font-size:0.9rem;letter-spacing:0.05em;">${vehicle.registration.toUpperCase()}</p>` : ''}
    </div>

    <!-- Status cards -->
    <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr));margin-bottom:24px;">
      <div class="stat-card">
        <div class="stat-card-label">MOT Expiry</div>
        <div class="stat-card-value" style="font-size:1.125rem;color:${statusColour[mot.colour]};">${mot.label}</div>
        ${vehicle.mot_expiry ? `<div class="stat-card-sub">${new Date(vehicle.mot_expiry).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'})}</div>` : ''}
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Road Tax</div>
        <div class="stat-card-value" style="font-size:1.125rem;color:${statusColour[tax.colour]};">${tax.label}</div>
        ${vehicle.tax_expiry ? `<div class="stat-card-sub">${new Date(vehicle.tax_expiry).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'})}</div>` : ''}
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Mileage</div>
        <div class="stat-card-value" style="font-size:1.125rem;">${Number(vehicle.current_mileage || 0).toLocaleString('en-GB')}</div>
        <div class="stat-card-sub">miles</div>
      </div>
      ${avgMpg ? `
        <div class="stat-card">
          <div class="stat-card-label">Avg MPG</div>
          <div class="stat-card-value" style="font-size:1.125rem;">${avgMpg.toFixed(1)}</div>
          <div class="stat-card-sub">fuel economy</div>
        </div>
      ` : ''}
      <div class="stat-card">
        <div class="stat-card-label">This Month</div>
        <div class="stat-card-value" style="font-size:1.125rem;">£${totalMonth.toFixed(0)}</div>
        <div class="stat-card-sub">total costs</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">This Year</div>
        <div class="stat-card-value" style="font-size:1.125rem;">£${totalYear.toFixed(0)}</div>
        <div class="stat-card-sub">total costs</div>
      </div>
    </div>

    <!-- Maintenance alert -->
    ${(overdueItems.length > 0 || dueSoonItems.length > 0) ? `
      <div class="card" style="margin-bottom:20px;border-left:4px solid ${overdueItems.length > 0 ? '#FF3B30' : '#FF9500'};">
        <div class="card-title" style="color:${overdueItems.length > 0 ? '#FF3B30' : '#FF9500'};">
          ${overdueItems.length > 0 ? '⚠️ Maintenance Overdue' : '🔔 Maintenance Due Soon'}
        </div>
        ${overdueItems.map(i => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.05);">
            <span style="font-size:0.875rem;font-weight:600;color:#0f172a;">${i.name}</span>
            ${statusPill('Overdue', 'red')}
          </div>
        `).join('')}
        ${dueSoonItems.map(i => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.05);">
            <span style="font-size:0.875rem;font-weight:600;color:#0f172a;">${i.name}</span>
            ${statusPill('Due Soon', 'amber')}
          </div>
        `).join('')}
        <a href="/app/maintenance.html" style="display:inline-block;margin-top:12px;font-size:0.8125rem;font-weight:600;color:#1E7A8C;">View schedule →</a>
      </div>
    ` : ''}

    <!-- Two col: recent service + quick links -->
    <div class="grid-2" style="gap:20px;">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <div class="card-title" style="margin-bottom:0;">Recent Services</div>
          <a href="/app/service.html" style="font-size:0.8125rem;font-weight:600;color:#1E7A8C;">View all →</a>
        </div>
        ${services.length === 0 ? `
          <div class="empty-state" style="padding:24px 0;">
            <p>No service history recorded yet.</p>
          </div>
        ` : services.map(s => `
          <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.05);">
            <div>
              <div style="font-size:0.875rem;font-weight:600;color:#0f172a;">${s.garage_name || s.garage_type || 'Service'}</div>
              <div style="font-size:0.75rem;color:#94a3b8;margin-top:2px;">${formatDate(s.date)} ${s.mileage_at_service ? '· ' + formatMileage(s.mileage_at_service) : ''}</div>
            </div>
            ${s.total_cost ? `<span style="font-size:0.875rem;font-weight:700;color:#0f172a;">${formatCurrency(s.total_cost)}</span>` : ''}
          </div>
        `).join('')}
      </div>

      <div class="card">
        <div class="card-title">Quick Links</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          ${[
            { href: '/app/fuel.html', icon: '⛽', label: 'Fuel Log' },
            { href: '/app/service.html', icon: '🔧', label: 'Service History' },
            { href: '/app/maintenance.html', icon: '📅', label: 'Maintenance' },
            { href: '/app/documents.html', icon: '📄', label: 'Documents' },
            { href: '/app/trips.html', icon: '🗺️', label: 'Trips' },
            { href: '/app/settings.html', icon: '⚙️', label: 'Settings' },
          ].map(l => `
            <a href="${l.href}" style="display:flex;align-items:center;gap:10px;padding:12px;background:#f8fafc;border-radius:10px;font-size:0.875rem;font-weight:600;color:#0f172a;transition:background 0.15s;" onmouseover="this.style.background='#E8F4F6'" onmouseout="this.style.background='#f8fafc'">
              <span style="font-size:1.25rem;">${l.icon}</span>
              ${l.label}
            </a>
          `).join('')}
        </div>
      </div>
    </div>

    <!-- Vehicle details -->
    <div class="card" style="margin-top:20px;">
      <div class="card-title">Vehicle Details</div>
      <div class="grid-3" style="gap:16px 24px;">
        ${[
          ['Make', vehicle.make],
          ['Model', vehicle.model],
          ['Year', vehicle.year],
          ['Colour', vehicle.colour],
          ['Fuel Type', vehicle.fuel_type ? vehicle.fuel_type.charAt(0).toUpperCase() + vehicle.fuel_type.slice(1) : null],
          ['Engine', vehicle.engine_size_cc ? `${vehicle.engine_size_cc}cc` : null],
          ['Transmission', vehicle.transmission ? vehicle.transmission.charAt(0).toUpperCase() + vehicle.transmission.slice(1) : null],
          ['VIN', vehicle.vin],
        ].filter(([,v]) => v).map(([label, value]) => `
          <div>
            <div style="font-size:0.6875rem;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em;font-weight:600;margin-bottom:3px;">${label}</div>
            <div style="font-size:0.9375rem;font-weight:600;color:#0f172a;">${value}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `
}

function showVehiclePicker(vehicles, currentId, onSelect) {
  const backdrop = document.createElement('div')
  backdrop.className = 'modal-backdrop'
  backdrop.innerHTML = `
    <div class="modal" style="max-width:360px;">
      <div class="modal-header">
        <h2>Switch Vehicle</h2>
        <button class="modal-close" id="picker-close">✕</button>
      </div>
      <div class="modal-body" style="padding-top:12px;">
        ${vehicles.map(v => `
          <button onclick="window._selectVehicle('${v.id}')" style="
            width:100%;display:flex;align-items:center;justify-content:space-between;
            padding:12px 14px;border-radius:10px;border:2px solid ${v.id === currentId ? '#1E7A8C' : 'transparent'};
            background:${v.id === currentId ? '#E8F4F6' : '#f8fafc'};
            cursor:pointer;font-family:inherit;margin-bottom:8px;transition:all 0.15s;
          ">
            <div style="text-align:left;">
              <div style="font-size:0.9rem;font-weight:700;color:#0f172a;">${getVehicleDisplayName(v)}</div>
              ${v.registration ? `<div style="font-size:0.75rem;color:#94a3b8;font-family:monospace;margin-top:2px;">${v.registration.toUpperCase()}</div>` : ''}
            </div>
            ${v.id === currentId ? '<span style="color:#1E7A8C;font-weight:700;font-size:0.875rem;">Current</span>' : ''}
          </button>
        `).join('')}
      </div>
    </div>
  `
  document.body.appendChild(backdrop)
  window._selectVehicle = (id) => { backdrop.remove(); onSelect(id) }
  backdrop.getElementById?.('picker-close')?.addEventListener('click', () => backdrop.remove())
  backdrop.addEventListener('click', e => { if (e.target === backdrop) backdrop.remove() })
  backdrop.querySelector('#picker-close').addEventListener('click', () => backdrop.remove())
}

init()
</script>
</body>
</html>
