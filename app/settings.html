<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — AutoLog</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{font-family:'Inter',-apple-system,sans-serif;background:#f8fafc;color:#475569;-webkit-font-smoothing:antialiased;display:flex;min-height:100vh}
h1,h2,h3{color:#0f172a;font-weight:700;line-height:1.2}a{text-decoration:none;color:inherit}
.sb{width:64px;min-height:100vh;background:#0f172a;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:200;transition:width .22s cubic-bezier(.4,0,.2,1);overflow:hidden}.sb:hover{width:220px}
.sb-logo{display:flex;align-items:center;gap:12px;padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.07);min-height:65px;overflow:hidden}.sb-logo img{width:32px;height:32px;border-radius:8px;flex-shrink:0}
.sb-logo-t{font-size:.9375rem;font-weight:700;color:#fff;white-space:nowrap;opacity:0;transform:translateX(-6px);transition:opacity .18s .04s,transform .18s .04s}.sb:hover .sb-logo-t{opacity:1;transform:translateX(0)}
.sb-nav{flex:1;padding:10px 0;display:flex;flex-direction:column;overflow:hidden}
.sb-a{display:flex;align-items:center;gap:13px;padding:11px 18px;color:rgba(255,255,255,.5);font-size:.875rem;font-weight:500;white-space:nowrap;transition:color .15s,background .15s;position:relative;text-decoration:none;border:none;background:none;font-family:inherit;cursor:pointer;width:100%}
.sb-a:hover{color:#fff;background:rgba(255,255,255,.06)}.sb-a.on{color:#fff;background:rgba(30,122,140,.28)}.sb-a.on::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;background:#1E7A8C;border-radius:0 3px 3px 0}
.sb-ic{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center}.sb-ic svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.sb-lb{opacity:0;transform:translateX(-6px);transition:opacity .18s .04s,transform .18s .04s;pointer-events:none}.sb:hover .sb-lb{opacity:1;transform:translateX(0)}
.sb-foot{padding:10px 0;border-top:1px solid rgba(255,255,255,.07)}.sb-out:hover{color:#FF3B30!important;background:rgba(255,59,48,.08)!important}
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199}.sb-ov.on{display:block}
.main{flex:1;margin-left:64px;min-height:100vh;display:flex;flex-direction:column}
.topbar{height:64px;background:#fff;border-bottom:1px solid rgba(0,0,0,.06);display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:100;gap:16px}
.topbar-title{font-size:1rem;font-weight:700;color:#0f172a}
.content{flex:1;padding:28px;max-width:600px;width:100%}.ph{margin-bottom:22px}.ph h1{font-size:1.5rem;letter-spacing:-.02em}
.card{background:#fff;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.03);padding:20px 22px;margin-bottom:16px}.ct{font-size:.9375rem;font-weight:700;color:#0f172a;margin-bottom:14px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:10px;font-size:.875rem;font-weight:600;font-family:inherit;cursor:pointer;border:2px solid transparent;transition:all .18s}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-p{background:#1E7A8C;color:#fff;border-color:#1E7A8C}.btn-p:hover:not(:disabled){background:#155F6E}.btn-o{background:transparent;color:#1E7A8C;border-color:#1E7A8C}.btn-o:hover:not(:disabled){background:#E8F4F6}
.btn-danger{background:transparent;color:#FF3B30;border-color:#FF3B30}.btn-danger:hover:not(:disabled){background:rgba(255,59,48,.06)}.btn-sm{padding:7px 14px;font-size:.8125rem;border-radius:8px}
.fg{margin-bottom:16px}.fl{display:block;font-size:.8125rem;font-weight:600;color:#475569;margin-bottom:6px}
.fi{width:100%;padding:10px 14px;border:1.5px solid rgba(0,0,0,.1);border-radius:10px;font-size:.9375rem;font-family:inherit;color:#0f172a;background:#fff;outline:none;transition:border-color .15s,box-shadow .15s}.fi:focus{border-color:#1E7A8C;box-shadow:0 0 0 3px rgba(30,122,140,.1)}.fi:disabled{opacity:.6;cursor:not-allowed}
.lnk-row{display:flex;align-items:center;gap:10px;padding:10px;background:#f8fafc;border-radius:9px;font-size:.875rem;font-weight:500;color:#0f172a;transition:background .15s;margin-bottom:8px;text-decoration:none}.lnk-row:hover{background:#E8F4F6}
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:#0f172a;color:#fff;padding:12px 20px;border-radius:10px;font-size:.875rem;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.2);max-width:320px;display:none}
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:14px;color:#94a3b8;font-size:.875rem;width:100%}.spin{width:32px;height:32px;border:3px solid rgba(30,122,140,.15);border-top-color:#1E7A8C;border-radius:50%;animation:sp .7s linear infinite}
.mob-btn{display:none;width:36px;height:36px;background:#f1f5f9;border:none;border-radius:9px;cursor:pointer;align-items:center;justify-content:center;color:#0f172a}.mob-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:768px){.sb{transform:translateX(-100%);width:220px!important;transition:transform .25s cubic-bezier(.4,0,.2,1)}.sb.open{transform:translateX(0)}.sb .sb-lb,.sb .sb-logo-t{opacity:1!important;transform:none!important}.sb-ov.on{display:block}.main{margin-left:0}.mob-btn{display:flex}.content{padding:20px 16px 32px}}
</style>
</head>
<body>
<aside class="sb" id="sb"><div class="sb-logo"><img src="/assets/logo.png" alt=""><span class="sb-logo-t">AutoLog</span></div><nav class="sb-nav" id="sb-nav"></nav><div class="sb-foot"><button class="sb-a sb-out" onclick="doSignOut()"><span class="sb-ic"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg></span><span class="sb-lb">Sign Out</span></button></div></aside>
<div class="sb-ov" id="sb-ov"></div>
<div class="main">
  <div class="topbar"><button class="mob-btn" id="mob-btn" style="margin-right:4px"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><span class="topbar-title">Settings</span></div>
  <div class="content" id="content"><div class="ld"><div class="spin"></div></div></div>
</div>
<div id="toast"></div>
<script>
const SURL='https://dkpvxlxarsmiljnvnbck.supabase.co',SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrcHZ4bHhhcnNtaWxqbnZuYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzM4MzIsImV4cCI6MjA5MDAwOTgzMn0.WJTRE_xmudj--jWSoA3e4ggYVORrFpoarBUkeaQN1Bw'
const sb=supabase.createClient(SURL,SKEY)
const NAV=[{id:'dashboard',label:'Dashboard',href:'/app/dashboard.html',icon:'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>'},{id:'fuel',label:'Fuel Log',href:'/app/fuel.html',icon:'<svg viewBox="0 0 24 24"><path d="M3 22V8a2 2 0 012-2h8a2 2 0 012 2v14M3 22h14M7 22V12h4v10"/><path d="M19 8l2 2-2 2M19 10h-2V6a2 2 0 00-2-2"/></svg>'},{id:'service',label:'Service',href:'/app/service.html',icon:'<svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>'},{id:'maintenance',label:'Maintenance',href:'/app/maintenance.html',icon:'<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'},{id:'documents',label:'Documents',href:'/app/documents.html',icon:'<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>'},{id:'trips',label:'Trips',href:'/app/trips.html',icon:'<svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>'},{id:'settings',label:'Settings',href:'/app/settings.html',icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>'}]
document.getElementById('sb-nav').innerHTML=NAV.map(p=>`<a href="${p.href}" class="sb-a${p.id==='settings'?' on':''}"><span class="sb-ic">${p.icon}</span><span class="sb-lb">${p.label}</span></a>`).join('')
const sbEl=document.getElementById('sb'),sbOv=document.getElementById('sb-ov')
document.getElementById('mob-btn').onclick=()=>{sbEl.classList.toggle('open');sbOv.classList.toggle('on')}
sbOv.onclick=()=>{sbEl.classList.remove('open');sbOv.classList.remove('on')}
function doSignOut(){sb.auth.signOut().then(()=>location.href='/app/login.html')}
function toast(msg,err){const el=document.getElementById('toast');el.textContent=msg;el.style.borderLeft='3px solid '+(err?'#FF3B30':'#34C759');el.style.display='block';setTimeout(()=>el.style.display='none',3500)}
;(async()=>{
  const{data:{session}}=await sb.auth.getSession()
  if(!session){location.href='/app/login.html';return}
  const userId=session.user.id
  const{data:profile}=await sb.from('profiles').select('*').eq('id',userId).single()
  const email=session.user.email
  const initials=(profile?.display_name||email||'?')[0].toUpperCase()
  document.getElementById('content').innerHTML=`
    <div class="ph"><h1>Settings</h1></div>
    <div class="card">
      <div class="ct">Account</div>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
        <div style="width:48px;height:48px;border-radius:50%;background:#E8F4F6;display:flex;align-items:center;justify-content:center;font-size:1.25rem;font-weight:700;color:#1E7A8C;flex-shrink:0">${initials}</div>
        <div><div style="font-size:.9375rem;font-weight:700;color:#0f172a">${profile?.display_name||'User'}</div><div style="font-size:.8125rem;color:#94a3b8">${email}</div></div>
      </div>
      <div class="fg"><label class="fl">Display Name</label><input class="fi" type="text" id="name-input" value="${profile?.display_name||''}" placeholder="Your name"></div>
      <div class="fg"><label class="fl">Email</label><input class="fi" type="email" value="${email}" disabled></div>
      <button class="btn btn-p btn-sm" id="save-btn">Save Changes</button>
      <div id="name-status" style="font-size:.8125rem;color:#94a3b8;margin-top:10px"></div>
    </div>
    <div class="card">
      <div class="ct">Plan</div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:.9375rem;font-weight:700;color:#0f172a">${profile?.plan==='paid'?'AutoLog+':profile?.plan==='business'?'Business':'Free'}</div>
          <div style="font-size:.8125rem;color:#94a3b8;margin-top:3px">${profile?.plan==='free'?'1 vehicle · 110 AI actions/year':'Unlimited · Priority features'}</div>
        </div>
        ${profile?.plan==='free'?`<a href="/#pricing" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:#1E7A8C;color:#fff;border-radius:9px;font-size:.8125rem;font-weight:700;text-decoration:none;transition:background .15s" onmouseover="this.style.background='#155F6E'" onmouseout="this.style.background='#1E7A8C'">✨ Upgrade</a>`:`<span style="display:inline-block;padding:3px 10px;border-radius:100px;font-size:.75rem;font-weight:600;background:#E8F4F6;color:#1E7A8C">Active</span>`}
      </div>
    </div>
    <div class="card">
      <div class="ct">Security</div>
      <p style="font-size:.875rem;color:#64748b;margin-bottom:16px">Reset your password or sign in via magic link.</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-o btn-sm" id="reset-btn">Send Password Reset</button>
        <button class="btn btn-o btn-sm" id="magic-btn">Send Magic Link</button>
      </div>
      <div id="sec-status" style="font-size:.8125rem;color:#94a3b8;margin-top:10px"></div>
    </div>
    <div class="card">
      <div class="ct">About</div>
      ${[['🔒','Privacy Policy','/privacy.html'],['📄','Terms of Service','/terms.html'],['🌐','autologapp.co.uk','/'],['✉️','Contact us','mailto:hello@autologapp.co.uk']].map(([ic,lb,hr])=>`<a href="${hr}" class="lnk-row"><span>${ic}</span>${lb}</a>`).join('')}
    </div>
    <div class="card" style="border:1.5px solid rgba(255,59,48,.2)">
      <div class="ct" style="color:#FF3B30">Sign Out</div>
      <p style="font-size:.875rem;color:#64748b;margin-bottom:16px">Sign out of AutoLog on this device.</p>
      <button class="btn btn-danger btn-sm" onclick="doSignOut()">Sign Out</button>
    </div>
  `
  document.getElementById('save-btn').addEventListener('click',async()=>{
    const name=document.getElementById('name-input').value.trim()
    const btn=document.getElementById('save-btn');btn.disabled=true;btn.textContent='Saving…'
    const{error}=await sb.from('profiles').update({display_name:name}).eq('id',userId)
    btn.disabled=false;btn.textContent='Save Changes'
    const st=document.getElementById('name-status')
    if(error){st.textContent=error.message;st.style.color='#FF3B30'}else{st.textContent='✓ Saved';st.style.color='#34C759';toast('Name updated ✓')}
  })
  document.getElementById('reset-btn').addEventListener('click',async()=>{
    const st=document.getElementById('sec-status')
    const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:'https://autologapp.co.uk/app/login.html'})
    st.textContent=error?error.message:'✓ Reset email sent';st.style.color=error?'#FF3B30':'#34C759'
  })
  document.getElementById('magic-btn').addEventListener('click',async()=>{
    const st=document.getElementById('sec-status')
    const{error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:'https://autologapp.co.uk/app/splash.html'}})
    st.textContent=error?error.message:'✓ Magic link sent';st.style.color=error?'#FF3B30':'#34C759'
  })
})()
</script>
</body>
</html>
