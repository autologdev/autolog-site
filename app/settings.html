<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — AutoLog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<script type="module">
import { supabase, requireAuth, getProfile, signOut, showToast, renderSidebar, injectAppStyles, initSidebar } from './app.js'

injectAppStyles()

async function init() {
  const session = await requireAuth()
  if (!session) return

  const profile = await getProfile()

  document.body.innerHTML = `
    ${renderSidebar('settings')}
    <div class="app-main">
      <div class="app-topbar">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="mobile-menu-btn" id="mobile-menu-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <span class="app-topbar-title">Settings</span>
        </div>
      </div>
      <div class="app-content">
        <div class="page-header">
          <h1>Settings</h1>
        </div>

        <!-- Account -->
        <div class="card" style="margin-bottom:16px;max-width:560px;">
          <div class="card-title">Account</div>
          <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;">
            <div style="width:48px;height:48px;border-radius:50%;background:#E8F4F6;display:flex;align-items:center;justify-content:center;font-size:1.25rem;font-weight:700;color:#1E7A8C;">
              ${(profile?.display_name || session.user.email || '?')[0].toUpperCase()}
            </div>
            <div>
              <div style="font-size:0.9375rem;font-weight:700;color:#0f172a;">${profile?.display_name || 'User'}</div>
              <div style="font-size:0.8125rem;color:#94a3b8;">${session.user.email}</div>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Display Name</label>
            <input class="form-input" type="text" id="display-name" value="${profile?.display_name || ''}" placeholder="Your name">
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" value="${session.user.email}" disabled style="opacity:0.6;cursor:not-allowed;">
          </div>
          <button class="btn btn-primary btn-sm" id="save-name-btn">Save Changes</button>
          <div style="font-size:0.8125rem;color:#94a3b8;margin-top:10px;" id="name-status"></div>
        </div>

        <!-- Plan -->
        <div class="card" style="margin-bottom:16px;max-width:560px;">
          <div class="card-title">Plan</div>
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div>
              <div style="font-size:0.9375rem;font-weight:700;color:#0f172a;">${profile?.plan === 'paid' ? 'AutoLog+' : profile?.plan === 'business' ? 'Business' : 'Free'}</div>
              <div style="font-size:0.8125rem;color:#94a3b8;margin-top:3px;">${profile?.plan === 'free' ? '1 vehicle · 110 AI actions/year' : 'Unlimited vehicles · Priority features'}</div>
            </div>
            ${profile?.plan === 'free' ? `
              <a href="/#pricing" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:#1E7A8C;color:#fff;border-radius:9px;font-size:0.8125rem;font-weight:700;text-decoration:none;transition:background 0.15s;" onmouseover="this.style.background='#155F6E'" onmouseout="this.style.background='#1E7A8C'">
                ✨ Upgrade
              </a>
            ` : `<span class="badge badge-teal">Active</span>`}
          </div>
        </div>

        <!-- Password -->
        <div class="card" style="margin-bottom:16px;max-width:560px;">
          <div class="card-title">Security</div>
          <p style="font-size:0.875rem;color:#64748b;margin-bottom:16px;">Update your password or send a magic link to sign in without one.</p>
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <button class="btn btn-outline btn-sm" id="reset-pwd-btn">Send Password Reset</button>
            <button class="btn btn-outline btn-sm" id="magic-link-btn">Send Magic Link</button>
          </div>
          <div style="font-size:0.8125rem;color:#94a3b8;margin-top:10px;" id="security-status"></div>
        </div>

        <!-- Links -->
        <div class="card" style="margin-bottom:16px;max-width:560px;">
          <div class="card-title">About</div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            ${[
              ['Privacy Policy', '/privacy.html', '🔒'],
              ['Terms of Service', '/terms.html', '📄'],
              ['autologapp.co.uk', '/', '🌐'],
              ['Contact us', 'mailto:hello@autologapp.co.uk', '✉️'],
            ].map(([label, href, icon]) => `
              <a href="${href}" style="display:flex;align-items:center;gap:10px;padding:10px;background:#f8fafc;border-radius:9px;font-size:0.875rem;font-weight:500;color:#0f172a;transition:background 0.15s;" onmouseover="this.style.background='#E8F4F6'" onmouseout="this.style.background='#f8fafc'">
                <span>${icon}</span> ${label}
              </a>
            `).join('')}
          </div>
        </div>

        <!-- Sign out -->
        <div class="card" style="max-width:560px;border:1.5px solid rgba(255,59,48,0.2);">
          <div class="card-title" style="color:#FF3B30;">Danger Zone</div>
          <p style="font-size:0.875rem;color:#64748b;margin-bottom:16px;">Sign out of your AutoLog account on this device.</p>
          <button class="btn btn-danger btn-sm" id="signout-page-btn">Sign Out</button>
        </div>
      </div>
    </div>
  `
  initSidebar()

  document.getElementById('save-name-btn').addEventListener('click', async () => {
    const name = document.getElementById('display-name').value.trim()
    const btn = document.getElementById('save-name-btn')
    const status = document.getElementById('name-status')
    btn.disabled = true; btn.textContent = 'Saving…'
    const { error } = await supabase.from('profiles').update({ display_name: name }).eq('id', session.user.id)
    btn.disabled = false; btn.textContent = 'Save Changes'
    if (error) { status.textContent = error.message; status.style.color = '#FF3B30' }
    else { status.textContent = '✓ Saved'; status.style.color = '#34C759'; showToast('Name updated ✓') }
  })

  document.getElementById('reset-pwd-btn').addEventListener('click', async () => {
    const status = document.getElementById('security-status')
    const { error } = await supabase.auth.resetPasswordForEmail(session.user.email, {
      redirectTo: 'https://autologapp.co.uk/app/login.html'
    })
    status.textContent = error ? error.message : '✓ Password reset email sent'
    status.style.color = error ? '#FF3B30' : '#34C759'
  })

  document.getElementById('magic-link-btn').addEventListener('click', async () => {
    const status = document.getElementById('security-status')
    const { error } = await supabase.auth.signInWithOtp({
      email: session.user.email,
      options: { emailRedirectTo: 'https://autologapp.co.uk/app/index.html' }
    })
    status.textContent = error ? error.message : '✓ Magic link sent to your email'
    status.style.color = error ? '#FF3B30' : '#34C759'
  })

  document.getElementById('signout-page-btn').addEventListener('click', signOut)
}

init()
</script>
</body>
</html>
