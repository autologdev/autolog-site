<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — AutoLog</title>
<link rel="stylesheet" href="/app/app-theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<aside class="sb" id="sb">
  <div class="sb-logo"><img src="/assets/logo.png" alt="AutoLog"><span class="sb-logo-text">AutoLog</span></div>
  <nav class="sb-nav" id="sb-nav"></nav>
  <div class="sb-bottom"><button class="sb-link sb-signout" onclick="doSignOut()"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span><span class="sb-label">Sign Out</span></button></div>
</aside>
<div class="sb-overlay" id="sb-ov"></div>
<div class="main">
  <div class="topbar"><button class="mob-btn" id="mob-btn" style="margin-right:4px"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><span class="topbar-title">Settings</span></div>
  <div class="content" id="content"><div class="ld"><div class="spin"></div></div></div>
</div>
<div id="toast"></div>
<script>
const SURL='https://dkpvxlxarsmiljnvnbck.supabase.co',SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrcHZ4bHhhcnNtaWxqbnZuYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzM4MzIsImV4cCI6MjA5MDAwOTgzMn0.WJTRE_xmudj--jWSoA3e4ggYVORrFpoarBUkeaQN1Bw'
const sb=supabase.createClient(SURL,SKEY)
const NAV=[{id:'dashboard',label:'Dashboard',href:'/app/dashboard',icon:'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>'},{id:'fuel',label:'Fuel Log',href:'/app/fuel',icon:'<svg viewBox="0 0 24 24"><path d="M3 22V8a2 2 0 012-2h8a2 2 0 012 2v14M3 22h14M7 22V12h4v10"/><path d="M19 8l2 2-2 2M19 10h-2V6a2 2 0 00-2-2"/></svg>'},{id:'service',label:'Service',href:'/app/service',icon:'<svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>'},{id:'maintenance',label:'Maintenance',href:'/app/maintenance',icon:'<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'},{id:'documents',label:'Documents',href:'/app/documents',icon:'<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>'},{id:'trips',label:'Trips',href:'/app/trips',icon:'<svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>'},{id:'settings',label:'Settings',href:'/app/settings',icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>'}]
document.getElementById('sb-nav').innerHTML=NAV.map(p=>`<a href="${p.href}" class="sb-link${p.id==='settings'?' active':''}"><span class="sb-icon">${p.icon}</span><span class="sb-label">${p.label}</span></a>`).join('')
const sbEl=document.getElementById('sb'),sbOv=document.getElementById('sb-ov')
document.getElementById('mob-btn').onclick=()=>{sbEl.classList.toggle('open');sbOv.classList.toggle('on')}
sbOv.onclick=()=>{sbEl.classList.remove('open');sbOv.classList.remove('on')}
function doSignOut(){sb.auth.signOut().then(()=>location.href='/app/login')}
function toast(msg,err){const el=document.getElementById('toast');el.textContent=msg;el.style.borderLeft='3px solid '+(err?'#FF3B30':'#34C759');el.style.display='block';setTimeout(()=>el.style.display='none',3500)}
;(async()=>{
  const{data:{session}}=await sb.auth.getSession()
  if(!session){location.href='/app/login';return}
  const userId=session.user.id
  const{data:profile}=await sb.from('profiles').select('*').eq('id',userId).single()
  const email=session.user.email
  const _pname = profile?.display_name || email || ''
  const initials = _pname.length > 0 ? _pname[0].toUpperCase() : '?'
  document.getElementById('content').innerHTML=`
    <div class="ph"><h1>Settings</h1></div>
    <div class="card">
      <div class="ct">Account</div>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
        <div style="width:48px;height:48px;border-radius:50%;background:#E8F4F6;display:flex;align-items:center;justify-content:center;font-size:1.25rem;font-weight:700;color:#1E7A8C;flex-shrink:0">${initials}</div>
        <div><div style="font-size:.9375rem;font-weight:700;color:#0f172a">${profile?.display_name||'User'}</div><div style="font-size:.8125rem;color:#94a3b8">${email}</div></div>
      </div>
      <div class="fg"><label class="fl">Display Name</label><input class="fi" type="text" id="name-input" value="${profile?.display_name||''}" placeholder="Your name"></div>
      <div class="fg"><label class="fl">Email</label><input class="fi" type="email" value="${email}" disabled></div>
      <button class="btn btn-p btn-sm" id="save-btn">Save Changes</button>
      <div id="name-status" style="font-size:.8125rem;color:#94a3b8;margin-top:10px"></div>
    </div>
    <div class="card">
      <div class="ct">Plan</div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:.9375rem;font-weight:700;color:#0f172a">${profile?.plan==='paid'?'AutoLog+':profile?.plan==='business'?'Business':'Free'}</div>
          <div style="font-size:.8125rem;color:#94a3b8;margin-top:3px">${profile?.plan==='free'?'1 vehicle · 110 AI actions/year':'Unlimited · Priority features'}</div>
        </div>
        ${profile?.plan==='free'?`<a href="/#pricing" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:#1E7A8C;color:#fff;border-radius:9px;font-size:.8125rem;font-weight:700;text-decoration:none;transition:background .15s" onmouseover="this.style.background='#155F6E'" onmouseout="this.style.background='#1E7A8C'">✨ Upgrade</a>`:`<span style="display:inline-block;padding:3px 10px;border-radius:100px;font-size:.75rem;font-weight:600;background:#E8F4F6;color:#1E7A8C">Active</span>`}
      </div>
    </div>
    <div class="card">
      <div class="ct">Security</div>
      <p style="font-size:.875rem;color:#64748b;margin-bottom:16px">Reset your password or sign in via magic link.</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-o btn-sm" id="reset-btn">Send Password Reset</button>
        <button class="btn btn-o btn-sm" id="magic-btn">Send Magic Link</button>
      </div>
      <div id="sec-status" style="font-size:.8125rem;color:#94a3b8;margin-top:10px"></div>
    </div>
    <div class="card">
      <div class="ct">About</div>
      ${[['🔒','Privacy Policy','/privacy.html'],['📄','Terms of Service','/terms.html'],['🌐','autologapp.co.uk','/'],['📝','Send Feedback','/feedback'],['✉️','Contact us','mailto:hello@autologapp.co.uk']].map(([ic,lb,hr])=>`<a href="${hr}" class="lnk-row"><span>${ic}</span>${lb}</a>`).join('')}
    </div>
    <div class="card" style="border:1.5px solid rgba(255,59,48,.2)">
      <div class="ct" style="color:#FF3B30">Sign Out</div>
      <p style="font-size:.875rem;color:#64748b;margin-bottom:16px">Sign out of AutoLog on this device.</p>
      <button class="btn btn-danger btn-sm" onclick="doSignOut()">Sign Out</button>
    </div>
    <div class="card" style="border:1.5px solid rgba(255,59,48,.2)">
      <div class="ct" style="color:#FF3B30">Delete Account</div>
      <p style="font-size:.875rem;color:#64748b;margin-bottom:16px">Permanently delete your account and all associated data — vehicles, documents, service history, fuel logs and trips. This cannot be undone.</p>
      <button class="btn btn-danger btn-sm" id="delete-account-btn" onclick="confirmDeleteAccount()">Delete Account</button>
      <div id="delete-status" style="font-size:.8125rem;margin-top:10px"></div>
    </div>
  `
  document.getElementById('save-btn').addEventListener('click',async()=>{
    const name=document.getElementById('name-input').value.trim()
    const btn=document.getElementById('save-btn');btn.disabled=true;btn.textContent='Saving…'
    const{error}=await sb.from('profiles').update({display_name:name}).eq('id',userId)
    btn.disabled=false;btn.textContent='Save Changes'
    const st=document.getElementById('name-status')
    if(error){st.textContent=error.message;st.style.color='#FF3B30'}else{st.textContent='✓ Saved';st.style.color='#34C759';toast('Name updated ✓')}
  })
  document.getElementById('reset-btn').addEventListener('click',async()=>{
    const st=document.getElementById('sec-status')
    const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:'https://autologapp.co.uk/app/login'})
    st.textContent=error?error.message:'✓ Reset email sent';st.style.color=error?'#FF3B30':'#34C759'
  })
  document.getElementById('magic-btn').addEventListener('click',async()=>{
    const st=document.getElementById('sec-status')
    const{error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:'https://autologapp.co.uk/app/splash'}})
    st.textContent=error?error.message:'✓ Magic link sent';st.style.color=error?'#FF3B30':'#34C759'
  })
})()

async function confirmDeleteAccount() {
  const confirmed = confirm(
    'Are you absolutely sure?\n\nThis will permanently delete your account and ALL data — vehicles, documents, service history, fuel logs, trips and documents in storage.\n\nThis cannot be undone.'
  )
  if (!confirmed) return

  const btn = document.getElementById('delete-account-btn')
  const status = document.getElementById('delete-status')
  btn.disabled = true
  btn.textContent = 'Deleting…'
  status.style.color = '#94a3b8'
  status.textContent = 'Deleting your account and all data…'

  try {
    const { data: { session } } = await sb.auth.getSession()
    if (!session) { status.textContent = 'Not signed in.'; return }

    const res = await fetch('https://dkpvxlxarsmiljnvnbck.supabase.co/functions/v1/delete-account', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${session.access_token}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({}),
    })

    const data = await res.json()

    if (!res.ok || data.error) {
      status.style.color = '#dc2626'
      status.textContent = data.error || 'Something went wrong. Please email hello@autologapp.co.uk to request deletion.'
      btn.disabled = false
      btn.textContent = 'Delete Account'
      return
    }

    // Success — sign out locally and redirect
    await sb.auth.signOut()
    location.replace('/app/login?deleted=1')

  } catch (err) {
    status.style.color = '#dc2626'
    status.textContent = 'Error: ' + err.message
    btn.disabled = false
    btn.textContent = 'Delete Account'
  }
}
</script>
</body>
</html>
