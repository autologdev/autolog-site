;(async()=>{
  const{data:{session}}=await sb.auth.getSession()
  if(!session){location.href='/app/login';return}
  userId=session.user.id
  const{data:profile}=await sb.from('profiles').select('*').eq('id',userId).single()
  const email=session.user.email
  const _pname = profile?.display_name || email || ''
  const initials = _pname.length > 0 ? _pname[0].toUpperCase() : '?'
  const plan = profile?.plan || 'free'
  const isPro = plan === 'paid' || plan === 'business'
  const planLabel = plan === 'paid' ? 'AutoLog+' : plan === 'business' ? 'Business' : 'Free'

  // Fetch current usage from api_usage (shared with iOS APIUsageTracker)
  const year = new Date().getFullYear()
  const limit = isPro ? 120 : 80
  let used = 0
  try {
    const{data:usageRows}=await sb.from('api_usage').select('call_count').eq('user_id',userId).eq('service','ocr').eq('year',year).is('month',null)
    used = (usageRows||[]).reduce((s,r)=>s+(r.call_count||0),0)
  } catch(e) {}
  const remaining = Math.max(0, limit - used)
  const pct = limit > 0 ? Math.min(100, (used / limit) * 100) : 0
  const usageCls = pct >= 100 ? 'danger' : pct >= 80 ? 'warn' : ''

  // Count vehicles owned by user (for the vehicles card)
  const{data:vehs}=await sb.from('vehicles').select('id,nickname,make,model,year,registration,updated_at,created_at,owner_id').eq('owner_id',userId).eq('is_active',true).order('created_at',{ascending:true})
  const ownedVehicles=vehs||[]
  // Lock set (iOS DowngradeManager parity)
  let lockedIds=new Set()
  if(!isPro && ownedVehicles.length>1){
    const sorted=[...ownedVehicles].sort((a,b)=>{const au=new Date(a.updated_at||a.created_at||0).getTime(),bu=new Date(b.updated_at||b.created_at||0).getTime();return bu-au})
    lockedIds=new Set(sorted.slice(1).map(v=>v.id))
  }

  document.getElementById('content').innerHTML=`
    <div class="pg-head"><div class="pg-head-text"><h1>Settings</h1><p>Manage your account, plan and preferences</p></div></div>

    <!-- Account -->
    <div class="card">
      <div class="card-head"><span class="card-title">Account</span></div>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">

          <div style="font-size:.8125rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis">${email}</div>
        </div>
      </div>
      <div class="fg"><label class="fl">Display name</label><input class="fi" type="text" id="name-input" value="${(profile?.display_name||'').replace(/"/g,'&quot;')}" placeholder="Your name"></div>
      <div class="fg"><label class="fl">Email</label><input class="fi" type="email" value="${email}" disabled></div>
      <button class="btn btn-primary btn-sm" id="save-btn">Save changes</button>
      <div id="name-status" style="font-size:.8125rem;color:var(--text-muted);margin-top:10px"></div>
    </div>

    <!-- Plan & Usage -->
    <div class="card">
      <div class="card-head"><span class="card-title">Plan &amp; Usage</span></div>

      <div class="plan-row">
        <span class="plan-row-label">Current plan</span>
        <span style="display:flex;align-items:center;gap:8px">
          <span class="plan-row-val">${planLabel}</span>
          ${isPro?'<span class="chip chip-ok">Active</span>':''}
        </span>
      </div>

      <div class="plan-row" style="flex-direction:column;align-items:stretch;gap:4px">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <span class="plan-row-label">${isPro?'Document scans this year':'Uploads this year'}</span>
          <span class="plan-row-val" style="font-family:var(--font-mono)">${used} ${isPro?'used':'/ '+limit}</span>
        </div>
        ${isPro?'':`<div class="usage-bar"><div class="usage-bar-fill ${usageCls}" style="width:${pct}%"></div></div>`}
        <div class="usage-footer">${isPro?'120 scans per vehicle \u00b7 Resets 1 January':(remaining+' remaining \u00b7 Resets 1 January')}</div>
      </div>

      <div class="plan-row">
        <span class="plan-row-label">Vehicles</span>
        <span class="plan-row-val">${ownedVehicles.length}${lockedIds.size>0?' <span class="chip chip-locked" style="margin-left:6px">'+lockedIds.size+' locked</span>':''}</span>
      </div>

      ${!isPro?`
      <div class="plan-card-plus" style="margin-top:16px">
        <div class="plan-card-title">\u2728 Upgrade to AutoLog+</div>
        <div class="plan-card-sub">Unlimited vehicles \u00b7 120 uploads/vehicle/yr \u00b7 HMRC mileage \u00b7 PDF export \u00b7 CarPlay trips</div>
        <button class="btn btn-sm" style="width:100%;justify-content:center;display:flex" onclick="showUpgradeModal()">Upgrade in iOS app \u2192</button>

      <div style="margin-top:16px">
        <button class="btn btn-outline btn-sm" onclick="showManageModal()">Manage subscription</button>
      </div>`}
    </div>

    <!-- Vehicles -->
    ${ownedVehicles.length>0?`<div class="card">
      <div class="card-head"><span class="card-title">Your vehicles</span><span style="font-size:.75rem;color:var(--text-muted)">${ownedVehicles.length} owned</span></div>
      ${ownedVehicles.map(v=>{
        const isLocked=lockedIds.has(v.id)
        const nm=v.nickname||[v.year,v.make,v.model].filter(Boolean).join(' ')||v.registration||'Vehicle'

          <div class="svc-row-body">
            <div class="svc-row-title">${nm.replace(/</g,'&lt;')}${isLocked?' <span class="chip chip-locked">Locked</span>':''}</div>
            <div class="svc-row-meta">${v.registration?v.registration.toUpperCase():'No reg'}${v.updated_at?' \u00b7 last updated '+new Date(v.updated_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):''}</div>
          </div>
        </div>`
      }).join('')}
    </div>`:''}

    <!-- Preferences -->
    <div class="card">
      <div class="card-head"><span class="card-title">Preferences</span></div>
      <div class="plan-row"><span class="plan-row-label">Distance units</span><span class="plan-row-val">Miles</span></div>
      <div class="plan-row"><span class="plan-row-label">Currency</span><span class="plan-row-val">GBP (\u00a3)</span></div>
      <div class="plan-row"><span class="plan-row-label">Notifications</span><span class="plan-row-val" style="color:var(--text-muted);font-weight:500">Manage in iOS app</span></div>
      <div class="usage-footer" style="margin-top:10px">Preferences sync from your iPhone. Change them in the AutoLog app under <strong>Settings</strong>.</div>
    </div>

    <!-- Security -->
    <div class="card">
      <div class="card-head"><span class="card-title">Security</span></div>
      <p style="font-size:.875rem;color:var(--text-secondary);margin-bottom:16px">Reset your password or sign in via magic link.</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-outline btn-sm" id="reset-btn">Send password reset</button>
        <button class="btn btn-outline btn-sm" id="magic-btn">Send magic link</button>
      </div>
      <div id="sec-status" style="font-size:.8125rem;color:var(--text-muted);margin-top:10px"></div>
    </div>

    <!-- About -->
    <div class="card">

      ${[['\ud83d\udd12','Privacy Policy','/privacy.html'],['\ud83d\udcc4','Terms of Service','/terms.html'],['\ud83c\udf10','autologapp.co.uk','/'],['\ud83d\udcdd','Send feedback','/feedback'],['\u2709\ufe0f','Contact us','mailto:hello@autologapp.co.uk']].map(([ic,lb,hr])=>`<a href="${hr}" class="svc-row" style="text-decoration:none;color:inherit">

        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-faint)"><polyline points="9 18 15 12 9 6"/></svg>

    </div>

      <div class="card-head"><span class="card-title" style="color:var(--red)">Sign out</span></div>

      <button class="btn btn-danger btn-sm" onclick="doSignOut()">Sign out</button>
    </div>

    <!-- Delete Account -->

      ${isPro?'<p style="font-size:.8125rem;color:var(--amber);margin-bottom:16px;font-weight:600">If you have an active AutoLog+ subscription, please cancel it via Apple before deleting your account.</p>':''}
      <button class="btn btn-danger btn-sm" id="delete-account-btn" onclick="confirmDeleteAccount()">Delete account</button>
      <div id="delete-status" style="font-size:.8125rem;margin-top:10px"></div>
    </div>
  `

  document.getElementById('save-btn').addEventListener('click',async()=>{
    const name=document.getElementById('name-input').value.trim()
    const btn=document.getElementById('save-btn');btn.disabled=true;btn.textContent='Saving\u2026'
    const{error}=await sb.from('profiles').update({display_name:name}).eq('id',userId)
    btn.disabled=false;btn.textContent='Save changes'
    const st=document.getElementById('name-status')
    if(error){st.textContent=error.message;st.style.color='var(--red)'}else{st.textContent='\u2713 Saved';st.style.color='var(--green)';toast('Name updated \u2713')}
  })
  document.getElementById('reset-btn').addEventListener('click',async()=>{
    const st=document.getElementById('sec-status')
    const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:'https://autologapp.co.uk/app/login'})
    st.textContent=error?error.message:'\u2713 Reset email sent';st.style.color=error?'var(--red)':'var(--green)'
  })
  document.getElementById('magic-btn').addEventListener('click',async()=>{
    const st=document.getElementById('sec-status')
    const{error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:'https://autologapp.co.uk/app/splash'}})
    st.textContent=error?error.message:'\u2713 Magic link sent';st.style.color=error?'var(--red)':'var(--green)'
  })
})()

async function confirmDeleteAccount() {
  const confirmed = confirm(
    'Are you absolutely sure?\n\nThis will permanently delete your account and ALL data \u2014 vehicles, documents, service history, fuel logs, trips and documents in storage.\n\nThis cannot be undone.'
  )
  if (!confirmed) return

  const btn = document.getElementById('delete-account-btn')
  const status = document.getElementById('delete-status')
  btn.disabled = true
  btn.textContent = 'Deleting\u2026'
  status.style.color = 'var(--text-muted)'
  status.textContent = 'Deleting your account and all data\u2026'

  try {
    const { data: { session } } = await sb.auth.getSession()
    if (!session) { status.textContent = 'Not signed in.'; return }

    const res = await fetch('https://dkpvxlxarsmiljnvnbck.supabase.co/functions/v1/delete-account', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${session.access_token}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({}),
    })

    const data = await res.json()

    if (!res.ok || data.error) {
      status.style.color = 'var(--red)'
      status.textContent = data.error || 'Something went wrong. Please email hello@autologapp.co.uk to request deletion.'
      btn.disabled = false
      btn.textContent = 'Delete account'
      return
    }

    await sb.auth.signOut()
    location.replace('/app/login?deleted=1')

  } catch (err) {
    status.style.color = 'var(--red)'
    status.textContent = 'Error: ' + err.message
    btn.disabled = false
    btn.textContent = 'Delete account'
  }
}
