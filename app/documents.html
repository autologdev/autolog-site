<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Documents — AutoLog</title>
<link rel="stylesheet" href="/app/app-theme.css">
<!-- consent.js must load synchronously before any other script -->

<style>
.doc-type-icon{width:40px;height:40px;border-radius:10px;background:var(--teal-light);display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0}
.ai-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:100px;font-size:.6875rem;font-weight:700;background:rgba(139,92,246,.1);color:#7c3aed}
.ai-spinner{width:14px;height:14px;border:2px solid rgba(139,92,246,.2);border-top-color:#7c3aed;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:900;display:flex;align-items:center;justify-content:center;animation:fadein .15s ease}
.lightbox img{max-width:92vw;max-height:88vh;border-radius:12px;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.lightbox-close{position:absolute;top:20px;right:20px;width:40px;height:40px;background:rgba(255,255,255,.15);border:none;border-radius:50%;color:#fff;font-size:1.25rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.lightbox-close:hover{background:rgba(255,255,255,.25)}
.ai-suggestion{background:linear-gradient(135deg,rgba(139,92,246,.06),rgba(30,122,140,.06));border:1px solid rgba(139,92,246,.2);border-radius:12px;padding:14px 16px;margin-bottom:16px}
.ai-suggestion h4{font-size:.875rem;font-weight:700;color:#0D1B2A;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ai-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.ai-field{background:#fff;border-radius:8px;padding:8px 10px;border:1px solid var(--border)}
.ai-field-label{font-size:.6875rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.ai-field-val{font-size:.8125rem;font-weight:600;color:var(--text-primary)}
</style>
</head>
<body>
<aside class="sb" id="sb">
  <div class="sb-logo"><img src="/assets/logo.png" alt="AutoLog"><span class="sb-logo-text">AutoLog</span></div>
  <nav class="sb-nav">

    <a href="/app/documents" class="sb-link active"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span><span class="sb-label">Documents</span></a>
    <a href="/app/trips" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg></span><span class="sb-label">Trips</span></a>

  </nav>
  <div class="sb-bottom"><button class="sb-link sb-signout" onclick="doSignOut()"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span><span class="sb-label">Sign Out</span></button></div>
</aside>
<div class="sb-overlay" id="sb-ov"></div>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><button class="mob-menu" id="mob-menu-btn"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><span class="page-title">Documents</span></div>
    <div class="topbar-right">
      <a href="/app/dashboard" class="dash-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
      <div class="vsw" id="vsw"><button class="vsw-btn" id="vsw-btn" onclick="toggleVsw()"><div class="vsw-dot"></div><span class="vsw-name" id="vsw-name">…</span><span class="vsw-chevron"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></span></button></div>

  <div class="content" id="content"><div class="loading"><div class="spinner"></div><span>Loading…</span></div></div>
</div>
<div id="toast"></div>

<script>
const SURL='https://dkpvxlxarsmiljnvnbck.supabase.co',SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrcHZ4bHhhcnNtaWxqbnZuYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzM4MzIsImV4cCI6MjA5MDAwOTgzMn0.WJTRE_xmudj--jWSoA3e4ggYVORrFpoarBUkeaQN1Bw'
const sb=supabase.createClient(SURL,SKEY)
const $=id=>document.getElementById(id)
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
function vName(v){return v.nickname||[v.year,v.make,v.model].filter(Boolean).join(' ')||v.registration||'Vehicle'}
function toast(msg,ok=true){const el=$('toast');el.textContent=msg;el.style.borderLeft='3px solid '+(ok?'#22c55e':'#ef4444');el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',3500)}
function doSignOut(){sb.auth.signOut().then(()=>location.href='/app/login')}
const sbEl=$('sb'),sbOv=$('sb-ov')
$('mob-menu-btn').onclick=()=>{sbEl.classList.toggle('open');sbOv.classList.toggle('on')}
sbOv.onclick=()=>{sbEl.classList.remove('open');sbOv.classList.remove('on')}
let allVehicles=[],vehicle=null,userId=null,userPlan='free'

// ── Plan helpers ───────────────────────────────────────────
function isProPlan(){return userPlan==='paid'||userPlan==='business'}

// ── Analytics — CONSENT GATED ─────────────────────────────
async function logEvent(eventName,properties={}){
  if(!window.AutoLogConsent||!window.AutoLogConsent.hasAnalyticsConsent())return
  try{await sb.from('analytics_events').insert({user_id:userId,event_name:eventName,properties})}catch(e){}
}


const DTYPES={
  mot_certificate:{label:'MOT Certificate',icon:'✅'},
  service_invoice:{label:'Service Invoice',icon:'🔧'},
  fuel_receipt:{label:'Fuel Receipt',icon:'⛽'},
  insurance:{label:'Insurance',icon:'🛡️'},
  v5c:{label:'V5C Logbook',icon:'📋'},
  warranty:{label:'Warranty',icon:'🏅'},
  purchase_receipt:{label:'Purchase Receipt',icon:'🏷️'},
  recall_notice:{label:'Recall Notice',icon:'⚠️'},
  repair_invoice:{label:'Repair Invoice',icon:'🛠️'},
  tyre_receipt:{label:'Tyre Receipt',icon:'🔵'},
  other:{label:'Other',icon:'📄'}
}

function toggleVsw(){
  const d=$('vsw-drop');if(d){d.remove();$('vsw-btn').classList.remove('open');return}
  if(allVehicles.length<=1)return
  $('vsw-btn').classList.add('open')
  const drop=document.createElement('div');drop.id='vsw-drop';drop.className='vsw-drop'
  drop.innerHTML=allVehicles.map(v=>`<div class="vsw-item${v.id===vehicle?.id?' cur':''}" onclick="switchV('${v.id}')"><div style="width:7px;height:7px;border-radius:50%;background:${v.id===vehicle?.id?'#1E7A8C':'#94a3b8'};flex-shrink:0"></div><div><div>${vName(v)}</div>${v.registration?`<div class="vsw-item-reg">${v.registration.toUpperCase()}</div>`:''}</div></div>`).join('')
  $('vsw').appendChild(drop)
  setTimeout(()=>document.addEventListener('click',()=>{const d=$('vsw-drop');if(d){d.remove();$('vsw-btn').classList.remove('open')}},{once:true}),10)
}
function switchV(id){localStorage.setItem('al_vid',id);location.reload()}

;(async()=>{
  const{data:{session}}=await sb.auth.getSession()
  if(!session){location.replace('/app/login');return}
  userId=session.user.id
  const[{data:veh},{data:prof}]=await Promise.all([
    sb.from('vehicles').select('*').eq('owner_id',userId).eq('is_active',true).order('created_at',{ascending:true}),
    sb.from('profiles').select('display_name,plan').eq('id',userId).single()
  ])
  allVehicles=veh||[]
  userPlan=prof?.plan||'free'
  const _n=prof?.display_name||session.user.email||''
  $('user-avatar').textContent=_n.length?_n[0].toUpperCase():'?'
  let selId=localStorage.getItem('al_vid')
  if(!selId||!allVehicles.find(v=>v.id===selId)){selId=allVehicles[0]?.id||null;if(selId)localStorage.setItem('al_vid',selId)}
  vehicle=allVehicles.find(v=>v.id===selId)||null
  $('vsw-name').textContent=vehicle?vName(vehicle):'No vehicle'
  if(allVehicles.length<=1)$('vsw-btn').style.cursor='default'
  // Analytics: documents_viewed — CONSENT GATED, session-deduplicated
  if(window.AutoLogConsent&&window.AutoLogConsent.hasAnalyticsConsent()&&userId){
    if(!sessionStorage.getItem('al_evt_documents_viewed')){
      try{await sb.from('analytics_events').insert({user_id:userId,event_name:'documents_viewed',properties:{source:'web'}});sessionStorage.setItem('al_evt_documents_viewed','1')}catch(e){}
    }
  }
  await load()

  // Task 5: Realtime sync — subscribe to documents changes for this vehicle
  // Requires Supabase Realtime to be enabled on the documents table.
  // If not enabled, this subscription will silently fail without breaking anything.
  if(vehicle){
    const docsChannel = sb.channel('documents-' + vehicle.id)
      .on('postgres_changes', {
        event: '*',
        schema: 'public',
        table: 'documents',
        filter: 'vehicle_id=eq.' + vehicle.id
      }, async (payload) => {
        // Re-fetch and re-render on any insert, update or delete
        await load()
      })
      .subscribe()
  }
})()

async function load(){
  if(!vehicle){$('content').innerHTML=`<div class="empty"><div class="empty-icon">📄</div><h3>No vehicle selected</h3></div>`;return}
  const{data:docs}=await sb.from('documents').select('*').eq('vehicle_id',vehicle.id).order('created_at',{ascending:false})
  const all=docs||[]
  const groups={}
  all.forEach(d=>{const t=d.document_type||'other';if(!groups[t])groups[t]=[];groups[t].push(d)})

  // Per-type counts for stats-strip
  const totalDocs = all.length
  const typeCount = Object.keys(groups).length
  const oldest = all.length ? all[all.length-1] : null
  const newest = all.length ? all[0] : null
  // Total extracted amount for YTD cost visibility
  const year = new Date().getFullYear()
  const ytdDocs = all.filter(d => (d.document_date||d.created_at||'').slice(0,4) === String(year))
  const ytdAmount = ytdDocs.reduce((s,d) => s + Number(d.extracted_amount||0), 0)

  $('content').innerHTML=`
    <div class="pg-head">
      <div class="pg-head-text"><h1>Documents</h1><p>${vName(vehicle)}${vehicle.owner_id!==userId?' <span class="chip chip-shared">Shared</span>':''}</p></div>
    </div>
    ${totalDocs>0?`<div class="stats-strip">
      <div class="stat-mini">
        <div class="stat-mini-head"><span class="stat-mini-label">Documents</span></div>
        <div class="stat-mini-value">${totalDocs}</div>
        <div class="stat-mini-sub">${typeCount} categor${typeCount===1?'y':'ies'}</div>
      </div>
      ${ytdAmount>0?`<div class="stat-mini">
        <div class="stat-mini-head"><span class="stat-mini-label">Value this year</span></div>
        <div class="stat-mini-value">£${ytdAmount.toFixed(0)}</div>
        <div class="stat-mini-sub">${ytdDocs.length} document${ytdDocs.length===1?'':'s'}</div>
      </div>`:''}
      ${newest?`<div class="stat-mini">
        <div class="stat-mini-head"><span class="stat-mini-label">Latest</span></div>
        <div class="stat-mini-value" style="font-size:1.125rem">${fmtDate(newest.document_date||newest.created_at)}</div>
        <div class="stat-mini-sub">${(DTYPES[newest.document_type]||DTYPES.other).label}</div>
      </div>`:''}
      ${oldest&&oldest!==newest?`<div class="stat-mini">
        <div class="stat-mini-head"><span class="stat-mini-label">Earliest record</span></div>
        <div class="stat-mini-value" style="font-size:1.125rem">${fmtDate(oldest.document_date||oldest.created_at)}</div>
        <div class="stat-mini-sub">${(DTYPES[oldest.document_type]||DTYPES.other).label}</div>
      </div>`:''}
    </div>`:''}
    ${all.length===0?`
    <div class="empty-rich">
      <div class="empty-rich-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><circle cx="9" cy="10" r="1.5"/><path d="M4 16l4-4 4 4 4-4 4 4"/></svg>
      </div>
      <h2>Documents live with your iPhone</h2>
      <p>Scan MOT certificates, service receipts, insurance docs and more in the AutoLog app — they'll sync here automatically and you can view, download or delete them from any browser.</p>
      <a href="https://apps.apple.com/gb/app/autolog/id6746798513" target="_blank" rel="noopener" class="btn btn-primary btn-sm">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83zM13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Open App Store
      </a>
    </div>`
    :Object.entries(groups).map(([type,docs])=>{
      const ti=DTYPES[type]||DTYPES.other
      return`<div style="margin-bottom:28px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
          <span style="font-size:1.125rem">${ti.icon}</span>
          <span style="font-size:.9rem;font-weight:700;color:var(--text-primary)">${ti.label}</span>
          <span style="font-size:.75rem;color:var(--text-muted);background:var(--surface-2);padding:1px 7px;border-radius:100px">${docs.length}</span>
        </div>
        <div class="doc-grid">${docs.map(doc=>renderDocCard(doc,ti)).join('')}</div>
      </div>`
    }).join('')}
  `
}

function renderDocCard(doc,ti){
  const isImg=doc.file_type&&doc.file_type.startsWith('image/')
  // Task 4: use best available label in priority order
  const label = doc.notes || (DTYPES[doc.document_type]?.label) || doc.file_name || 'Document'
  return`<div class="doc-card" onclick="viewDoc('${doc.id}','${doc.storage_path}','${doc.file_type||''}')">
    <div style="display:flex;align-items:flex-start;gap:10px">
      <div class="doc-type-icon">${isImg?'🖼️':ti.icon}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:.875rem;font-weight:600;color:var(--text-primary);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${label}</div>
        <div style="font-size:.75rem;color:var(--text-muted)">${fmtDate(doc.document_date||doc.created_at)}</div>
        ${doc.extracted_amount?`<div style="font-size:.75rem;font-weight:700;color:var(--teal);margin-top:2px">£${Number(doc.extracted_amount).toFixed(2)}</div>`:''}
        ${doc.ocr_status==='processing'?`<div style="margin-top:4px"><span class="ai-badge"><span class="ai-spinner"></span> Processing…</span></div>`:''}
      </div>
      <button class="btn-icon danger" onclick="event.stopPropagation();delDoc('${doc.id}','${doc.storage_path}')">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
      </button>
    </div>
  </div>`
}

async function viewDoc(docId,path,fileType){
  const{data}=await sb.storage.from('vehicle-documents').createSignedUrl(path,300)
  if(!data?.signedUrl){toast('Could not open document',false);return}
  const lb=document.createElement('div');lb.className='lightbox'
  if(fileType&&fileType.startsWith('image/')){
    lb.innerHTML=`<button class="lightbox-close" type="button" onclick="this.closest('.lightbox').remove()">✕</button><img src="${data.signedUrl}" alt="Document">`
  } else if(fileType==='application/pdf'||path.toLowerCase().endsWith('.pdf')){
    lb.innerHTML=`<button class="lightbox-close" type="button" onclick="this.closest('.lightbox').remove()" style="z-index:10">✕</button><iframe src="${data.signedUrl}" style="width:90vw;height:88vh;border:none;border-radius:12px;background:#fff"></iframe>`
  } else {
    window.open(data.signedUrl,'_blank');return
  }
  lb.onclick=e=>{if(e.target===lb)lb.remove()}
  document.body.appendChild(lb)
  const escHandler=e=>{if(e.key==='Escape'){lb.remove();document.removeEventListener('keydown',escHandler)}}
  document.addEventListener('keydown',escHandler)
}

async function delDoc(id,path){
  if(!confirm('Delete this document permanently?'))return
  await sb.storage.from('vehicle-documents').remove([path])
  await sb.from('documents').delete().eq('id',id)
  toast('Deleted ✓');await load()
}




</script>
