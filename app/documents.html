<style>
.doc-type-icon{width:40px;height:40px;border-radius:10px;background:var(--teal-light);display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0}
.ai-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:100px;font-size:.6875rem;font-weight:700;background:rgba(139,92,246,.1);color:#7c3aed}
.ai-spinner{width:14px;height:14px;border:2px solid rgba(139,92,246,.2);border-top-color:#7c3aed;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:900;display:flex;align-items:center;justify-content:center;animation:fadein .15s ease}
.lightbox img{max-width:92vw;max-height:88vh;border-radius:12px;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.lightbox-close{position:absolute;top:20px;right:20px;width:40px;height:40px;background:rgba(255,255,255,.15);border:none;border-radius:50%;color:#fff;font-size:1.25rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.lightbox-close:hover{background:rgba(255,255,255,.25)}
.ai-suggestion{background:linear-gradient(135deg,rgba(139,92,246,.06),rgba(30,122,140,.06));border:1px solid rgba(139,92,246,.2);border-radius:12px;padding:14px 16px;margin-bottom:16px}
.ai-suggestion h4{font-size:.875rem;font-weight:700;color:#0D1B2A;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ai-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.ai-field{background:#fff;border-radius:8px;padding:8px 10px;border:1px solid var(--border)}
.ai-field-label{font-size:.6875rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.ai-field-val{font-size:.8125rem;font-weight:600;color:var(--text-primary)}
.upload-progress{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px;display:none}
.upload-progress-bar{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal-mid));border-radius:2px;transition:width .3s ease;width:0%}
.paywall-banner{background:linear-gradient(135deg,#1E7A8C,#155F6E);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.paywall-banner-text{flex:1;min-width:0;color:#fff}
.paywall-banner-text strong{display:block;font-size:.9375rem;font-weight:700;margin-bottom:3px}
.paywall-banner-text span{font-size:.8125rem;opacity:.85}
</style>

// ── Plan helpers ───────────────────────────────────────────
function isProPlan(){return userPlan==='paid'||userPlan==='business'}

// ── Analytics ─────────────────────────────────────────────
async function logEvent(eventName,properties={}){
  try{await sb.from('analytics_events').insert({user_id:userId,event_name:eventName,properties})}catch(e){}
}
async function checkFirstAction(actionType){
  try{
    const{data:p}=await sb.from('profiles').select('first_action_completed').eq('id',userId).single()
    if(p&&!p.first_action_completed){
      await logEvent('first_action_taken',{source:'web',action_type:actionType})
      await sb.from('profiles').update({first_action_completed:true}).eq('id',userId)
    }
  }catch(e){}
}

// ── OCR usage tracking (Task 2) ────────────────────────────
async function checkOCRUsage(){
  if(isProPlan())return true // pro: unlimited
  try{
    const today=new Date()
    const periodStart=new Date(today.getFullYear(),today.getMonth(),1).toISOString().split('T')[0]
    const{data}=await sb.from('api_usage').select('used_count').eq('user_id',userId).eq('service','ocr').eq('period_start',periodStart).single()
    return !data || data.used_count < 10
  }catch(e){return true}
}
async function incrementOCRUsage(){
  if(isProPlan())return
  try{
    const today=new Date()
    const periodStart=new Date(today.getFullYear(),today.getMonth(),1).toISOString().split('T')[0]
    await sb.from('api_usage').upsert({user_id:userId,service:'ocr',period_start:periodStart,used_count:1},{onConflict:'user_id,service,period_start',ignoreDuplicates:false})
    // increment via RPC or re-fetch and update
    const{data}=await sb.from('api_usage').select('id,used_count').eq('user_id',userId).eq('service','ocr').eq('period_start',periodStart).single()
    if(data)await sb.from('api_usage').update({used_count:data.used_count+1}).eq('id',data.id)
  }catch(e){}
}

const DTYPES={
  mot_certificate:{label:'MOT Certificate',icon:'✅'},
  service_invoice:{label:'Service Invoice',icon:'🔧'},
  fuel_receipt:{label:'Fuel Receipt',icon:'⛽'},
  insurance:{label:'Insurance',icon:'🛡️'},
  v5c:{label:'V5C Logbook',icon:'📋'},
  warranty:{label:'Warranty',icon:'🏅'},
  purchase_receipt:{label:'Purchase Receipt',icon:'🏷️'},
  recall_notice:{label:'Recall Notice',icon:'⚠️'},
  repair_invoice:{label:'Repair Invoice',icon:'🛠️'},
  tyre_receipt:{label:'Tyre Receipt',icon:'🔵'},
  other:{label:'Other',icon:'📄'}
}

function toggleVsw(){
  const d=$('vsw-drop');if(d){d.remove();$('vsw-btn').classList.remove('open');return}
  if(allVehicles.length<=1)return
  $('vsw-btn').classList.add('open')
  const drop=document.createElement('div');drop.id='vsw-drop';drop.className='vsw-drop'
  drop.innerHTML=allVehicles.map(v=>`<div class="vsw-item${v.id===vehicle?.id?' cur':''}" onclick="switchV('${v.id}')"><div style="width:7px;height:7px;border-radius:50%;background:${v.id===vehicle?.id?'#1E7A8C':'#94a3b8'};flex-shrink:0"></div><div><div>${vName(v)}</div>${v.registration?`<div class="vsw-item-reg">${v.registration.toUpperCase()}</div>`:''}</div></div>`).join('')
  $('vsw').appendChild(drop)
  setTimeout(()=>document.addEventListener('click',()=>{const d=$('vsw-drop');if(d){d.remove();$('vsw-btn').classList.remove('open')}},{once:true}),10)
}
function switchV(id){localStorage.setItem('al_vid',id);location.reload()}

;(async()=>{
  const{data:{session}}=await sb.auth.getSession()
  if(!session){location.replace('/app/login');return}
  userId=session.user.id
  const[{data:veh},{data:prof}]=await Promise.all([
    sb.from('vehicles').select('*').eq('owner_id',userId).eq('is_active',true).order('created_at',{ascending:true}),
    sb.from('profiles').select('display_name,plan').eq('id',userId).single()

  if(!selId||!allVehicles.find(v=>v.id===selId)){selId=allVehicles[0]?.id||null;if(selId)localStorage.setItem('al_vid',selId)}
  vehicle=allVehicles.find(v=>v.id===selId)||null
  $('vsw-name').textContent=vehicle?vName(vehicle):'No vehicle'
  if(allVehicles.length<=1)$('vsw-btn').style.cursor='default'
  $('upload-btn').onclick=showUpload
  await load()
})()

async function load(){
  if(!vehicle){$('content').innerHTML=`<div class="empty"><div class="empty-icon">📄</div><h3>No vehicle selected</h3></div>`;return}
  const{data:docs}=await sb.from('documents').select('*').eq('vehicle_id',vehicle.id).order('created_at',{ascending:false})
  const all=docs||[]
  const groups={}
  all.forEach(d=>{const t=d.document_type||'other';if(!groups[t])groups[t]=[];groups[t].push(d)})

  // ── Upload limit banner for free users (Task 3) ────────
  const FREE_DOC_LIMIT=10
  const overLimit=!isProPlan()&&all.length>=FREE_DOC_LIMIT

  $('content').innerHTML=`
    <div class="pg-head">
      <div class="pg-head-text"><h1>Documents</h1><p>${vName(vehicle)} · ${all.length} document${all.length!==1?'s':''}</p></div>
    </div>
    ${overLimit?`<div class="paywall-banner" id="paywall-banner">
      <div class="paywall-banner-text">
        <strong>🔒 Upload limit reached</strong>
        <span>Free plan includes ${FREE_DOC_LIMIT} documents per vehicle. Upgrade for unlimited uploads and enhanced AI scanning.</span>
      </div>
      <a href="/app/settings#upgrade" class="btn btn-sm" style="background:#fff;color:#1E7A8C;font-weight:700;flex-shrink:0" onclick="logEvent('paywall_viewed',{source:'web',trigger:'upload_limit'})">Upgrade →</a>
    </div>`:''}
    ${!isProPlan()&&!overLimit?`<div style="background:var(--teal-light);border-radius:9px;padding:9px 14px;font-size:.8125rem;color:var(--teal);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <span>📄 Basic Scan active — <a href="/app/settings#upgrade" style="color:var(--teal);font-weight:700" onclick="logEvent('paywall_viewed',{source:'web',trigger:'scan_upsell'})">Upgrade to Enhanced Scan ✨</a></span>
      <span style="font-size:.75rem;opacity:.7">${all.length}/${FREE_DOC_LIMIT} documents used</span>
    </div>`:''}
    ${isProPlan()?`<div style="background:var(--teal-light);border-radius:9px;padding:9px 14px;font-size:.8125rem;color:var(--teal);margin-bottom:16px;display:flex;align-items:center;gap:6px"><span>✨</span><strong>Enhanced Scan active</strong> — Google Vision + GPT-4o</div>`:''}
    ${all.length===0?`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:72px 24px;text-align:center;gap:20px">
      <div style="width:72px;height:72px;background:var(--teal-light);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:2rem">📄</div>
      <div>
        <h2 style="font-size:1.375rem;font-weight:800;letter-spacing:-.02em;color:var(--text-primary);margin-bottom:8px">No documents yet</h2>
        <p style="font-size:.9375rem;color:var(--text-muted);max-width:380px;line-height:1.6">Upload MOT certificates, invoices, insurance docs and more. AI will categorise and extract key details automatically.</p>
      </div>
      ${overLimit?'':`<button class="btn btn-primary" onclick="showUpload()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Upload First Document
      </button>`}
    </div>`
    :Object.entries(groups).map(([type,docs])=>{
      const ti=DTYPES[type]||DTYPES.other
      return`<div style="margin-bottom:28px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
          <span style="font-size:1.125rem">${ti.icon}</span>
          <span style="font-size:.9rem;font-weight:700;color:var(--text-primary)">${ti.label}</span>
          <span style="font-size:.75rem;color:var(--text-muted);background:var(--surface-2);padding:1px 7px;border-radius:100px">${docs.length}</span>
        </div>
        <div class="doc-grid">${docs.map(doc=>renderDocCard(doc,ti)).join('')}</div>
      </div>`
    }).join('')}
  `
}

function renderDocCard(doc,ti){
  const isImg=doc.file_type&&doc.file_type.startsWith('image/')
  return`<div class="doc-card" onclick="viewDoc('${doc.id}','${doc.storage_path}','${doc.file_type||''}')">
    <div style="display:flex;align-items:flex-start;gap:10px">
      <div class="doc-type-icon">${isImg?'🖼️':ti.icon}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:.875rem;font-weight:600;color:var(--text-primary);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${doc.file_name||ti.label}</div>
        <div style="font-size:.75rem;color:var(--text-muted)">${fmtDate(doc.document_date||doc.created_at)}</div>
        ${doc.extracted_amount?`<div style="font-size:.75rem;font-weight:700;color:var(--teal);margin-top:2px">£${Number(doc.extracted_amount).toFixed(2)}</div>`:''}
        ${doc.ocr_status==='processing'?`<div style="margin-top:4px"><span class="ai-badge"><span class="ai-spinner"></span> Processing…</span></div>`:''}
      </div>
      <button class="btn-icon danger" onclick="event.stopPropagation();delDoc('${doc.id}','${doc.storage_path}')">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
      </button>
    </div>
  </div>`
}

async function viewDoc(docId,path,fileType){
  const{data}=await sb.storage.from('vehicle-documents').createSignedUrl(path,300)
  if(!data?.signedUrl){toast('Could not open document',false);return}
  const lb=document.createElement('div');lb.className='lightbox'
  if(fileType&&fileType.startsWith('image/')){
    lb.innerHTML=`<button class="lightbox-close" type="button" onclick="this.closest('.lightbox').remove()">✕</button><img src="${data.signedUrl}" alt="Document">`
  } else if(fileType==='application/pdf'||path.toLowerCase().endsWith('.pdf')){
    lb.innerHTML=`<button class="lightbox-close" type="button" onclick="this.closest('.lightbox').remove()" style="z-index:10">✕</button><iframe src="${data.signedUrl}" style="width:90vw;height:88vh;border:none;border-radius:12px;background:#fff"></iframe>`
  } else {
    window.open(data.signedUrl,'_blank');return
  }
  lb.onclick=e=>{if(e.target===lb)lb.remove()}
  document.body.appendChild(lb)
  const escHandler=e=>{if(e.key==='Escape'){lb.remove();document.removeEventListener('keydown',escHandler)}}
  document.addEventListener('keydown',escHandler)
}

async function delDoc(id,path){
  if(!confirm('Delete this document permanently?'))return
  await sb.storage.from('vehicle-documents').remove([path])
  await sb.from('documents').delete().eq('id',id)
  toast('Deleted ✓');await load()
}

// ── AI Classification ──────────────────────────────────────
async function classifyWithAI(file){
  // Check OCR usage before proceeding (Task 2)
  const allowed=await checkOCRUsage()
  if(!allowed){
    await logEvent('paywall_viewed',{source:'web',trigger:'ocr_limit'})
    return null
  }
  return new Promise((resolve)=>{
    const reader=new FileReader()
    reader.onload=async(e)=>{
      try{
        const base64=e.target.result.split(',')[1]
        const mediaType=file.type||'image/jpeg'
        const isPDF=file.type==='application/pdf'

        const systemPrompt=`You are an automotive document classifier for a UK vehicle management app. 
Analyse the document image and return ONLY valid JSON (no markdown, no explanation) with this exact structure:
{
  "document_type": one of: "mot_certificate","service_invoice","fuel_receipt","insurance","v5c","warranty","purchase_receipt","recall_notice","repair_invoice","tyre_receipt","other",
  "confidence": number 0-1,
  "document_date": "YYYY-MM-DD" or null,
  "extracted_amount": number or null (total cost/amount in GBP, no currency symbol),
  "extracted_mileage": number or null,
  "garage_name": string or null,
  "description": string or null (brief summary, max 80 chars),
  "mot_expiry": "YYYY-MM-DD" or null (only for MOT certificates)
}`

        const payload={
          model:'gpt-4o-mini',
          max_tokens:300,
          messages:[{
            role:'user',
            content: isPDF ? [
              {type:'text',text:systemPrompt+'\n\nThis is a PDF document. Classify based on filename: '+file.name}
            ] : [
              {type:'image_url',image_url:{url:`data:${mediaType};base64,${base64}`,detail:'low'}},
              {type:'text',text:systemPrompt}
            ]
          }]
        }

        // Pro: enhanced endpoint (Google Vision + GPT-4o); Free: standard endpoint
        const endpoint=isProPlan()
          ?'https://mechanic.autologapp.co.uk/ai-classify-enhanced'
          :'https://mechanic.autologapp.co.uk/ai-classify'

        const res=await fetch(endpoint,{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify(payload)
        })
        if(!res.ok){resolve(null);return}
        const data=await res.json()
        const text=data.choices?.[0]?.message?.content||''
        const clean=text.replace(/```json|```/g,'').trim()
        await incrementOCRUsage()
        resolve(JSON.parse(clean))
      }catch(err){
        console.warn('AI classification failed:',err)
        resolve(null)
      }
    }
    reader.onerror=()=>resolve(null)
    if(file.type==='application/pdf'){
      resolve(null)
    } else {
      reader.readAsDataURL(file)
    }
  })
}

// ── Upload Modal ───────────────────────────────────────────
function showUpload(){
  // Gate: free users at limit
  if(!isProPlan()){
    sb.from('documents').select('id',{count:'exact',head:true}).eq('vehicle_id',vehicle.id).then(({count})=>{
      if(count>=10){
        logEvent('paywall_viewed',{source:'web',trigger:'upload_limit'})
        // Replace upload button with locked state
        const btn=$('upload-btn')
        if(btn){
          btn.innerHTML='🔒 Upgrade to upload more'
          btn.disabled=true
          btn.style.opacity='0.7'
        }
        // Show paywall banner inline
        let existing=document.getElementById('paywall-banner')
        if(!existing){
          const banner=document.createElement('div')
          banner.id='paywall-banner'
          banner.className='paywall-banner'
          banner.innerHTML=`<div class="paywall-banner-text"><strong>🔒 Upload limit reached</strong><span>Free plan includes 10 documents per vehicle. Upgrade for unlimited uploads and enhanced AI scanning. £2.99/mo</span></div><a href="/app/settings#upgrade" class="btn btn-sm" style="background:#fff;color:#1E7A8C;font-weight:700;flex-shrink:0">Upgrade →</a>`
          $('content').prepend(banner)
        }
        return
      }
      _showUploadModal()
    })
  } else {
    _showUploadModal()
  }
}

function _showUploadModal(){
  const bg=document.createElement('div');bg.className='mbg'
  bg.innerHTML=`<div class="mo" style="max-width:560px"><div class="mh"><h2>Upload Document${isProPlan()?' <span style="font-size:.75rem;font-weight:600;color:#7c3aed;background:rgba(139,92,246,.1);padding:2px 8px;border-radius:100px;margin-left:6px">Enhanced Scan ✨</span>':' <span style="font-size:.75rem;font-weight:600;color:var(--teal);background:var(--teal-light);padding:2px 8px;border-radius:100px;margin-left:6px">Basic Scan</span>'}</h2><button class="mc" onclick="this.closest('.mbg').remove()">✕</button></div><div class="mb">
    <div class="merr" id="merr"></div>
    <div id="ai-suggestion-zone"></div>
    <div class="fg"><label class="fl">Document Type</label><select class="fi" id="u-t">${Object.entries(DTYPES).map(([v,{label}])=>`<option value="${v}">${label}</option>`).join('')}</select></div>
    <div class="fr">
      <div class="fg"><label class="fl">Date (optional)</label><input class="fi" type="date" id="u-d"></div>
      <div class="fg"><label class="fl">Amount £ (optional)</label><input class="fi" type="number" step="0.01" id="u-amount" placeholder="e.g. 125.00"></div>
    </div>
    <div class="fg"><label class="fl">Files</label>
      <div class="drop-zone" id="dz" onclick="document.getElementById('u-f').click()" ondragover="event.preventDefault();this.classList.add('over')" ondragleave="this.classList.remove('over')" ondrop="handleDrop(event)">
        <div style="font-size:2rem;margin-bottom:8px">📎</div>
        <div style="font-size:.875rem;font-weight:600;color:var(--text-secondary)">Click to choose or drag & drop</div>
        <div style="font-size:.75rem;color:var(--text-muted);margin-top:4px">Images (JPG, PNG) or PDF · Multiple files supported</div>
      </div>
      <input type="file" id="u-f" accept="image/*,application/pdf" multiple style="display:none">
      <div id="u-file-list" style="margin-top:10px;display:flex;flex-direction:column;gap:6px"></div>
      <div class="upload-progress" id="u-progress"><div class="upload-progress-bar" id="u-progress-bar"></div></div>
    </div>
    <div class="mfooter"><button class="btn btn-ghost btn-sm" onclick="this.closest('.mbg').remove()">Cancel</button><button class="btn btn-primary btn-sm" id="u-sv" disabled>Upload</button></div>
  </div></div>`
  document.body.appendChild(bg)
  bg.addEventListener('click',e=>{if(e.target===bg)bg.remove()})

  let files=[]
  let aiResult=null

  const updateFileList=()=>{
    const el=bg.querySelector('#u-file-list')
    el.innerHTML=files.map((f,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface-2);border-radius:8px;font-size:.8125rem">
      <span>${f.type.includes('pdf')?'📋':'🖼️'}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</span>
      <span style="color:var(--text-muted)">${(f.size/1024).toFixed(0)}KB</span>
      <button onclick="removeFile(${i})" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;padding:0;line-height:1">×</button>
    </div>`).join('')
    bg.querySelector('#u-sv').disabled=files.length===0
    if(files.length===1&&files[0].type.startsWith('image/')){
      runAIClassification(files[0])
    }
  }

  window.removeFile=i=>{files.splice(i,1);updateFileList()}

  const setFiles=newFiles=>{
    files=[...files,...Array.from(newFiles)]
    updateFileList()
  }

  bg.querySelector('#u-f').onchange=e=>{if(e.target.files.length)setFiles(e.target.files)}
  window.handleDrop=e=>{e.preventDefault();bg.querySelector('#dz').classList.remove('over');if(e.dataTransfer.files.length)setFiles(e.dataTransfer.files)}

  const runAIClassification=async(file)=>{
    const zone=bg.querySelector('#ai-suggestion-zone')
    const scanLabel=isProPlan()?'Enhanced Scan ✨':'Basic Scan'
    zone.innerHTML=`<div class="ai-suggestion"><h4>✨ AI Analysis <span class="ai-badge"><span class="ai-spinner"></span> Analysing…</span></h4></div>`
    const result=await classifyWithAI(file)
    aiResult=result
    if(!result){zone.innerHTML='';return}

    if(result.document_type)bg.querySelector('#u-t').value=result.document_type
    if(result.document_date)bg.querySelector('#u-d').value=result.document_date
    if(result.extracted_amount)bg.querySelector('#u-amount').value=result.extracted_amount

    const conf=Math.round((result.confidence||0)*100)
    zone.innerHTML=`<div class="ai-suggestion">
      <h4>✨ AI Classification <span class="ai-badge">${conf}% confident · ${scanLabel}</span></h4>
      <div style="font-size:.8125rem;color:var(--text-secondary);margin-bottom:10px">Detected: <strong>${DTYPES[result.document_type]?.label||result.document_type}</strong>${result.description?` — ${result.description}`:''}</div>
      ${result.garage_name||result.extracted_amount||result.extracted_mileage?`
      <div class="ai-fields">
        ${result.garage_name?`<div class="ai-field"><div class="ai-field-label">Garage</div><div class="ai-field-val">${result.garage_name}</div></div>`:''}
        ${result.extracted_amount?`<div class="ai-field"><div class="ai-field-label">Amount</div><div class="ai-field-val">£${Number(result.extracted_amount).toFixed(2)}</div></div>`:''}
        ${result.extracted_mileage?`<div class="ai-field"><div class="ai-field-label">Mileage</div><div class="ai-field-val">${Number(result.extracted_mileage).toLocaleString('en-GB')} mi</div></div>`:''}
        ${result.mot_expiry?`<div class="ai-field"><div class="ai-field-label">MOT Expiry</div><div class="ai-field-val">${fmtDate(result.mot_expiry)}</div></div>`:''}
      </div>`:''}
      <p style="font-size:.75rem;color:var(--text-muted);margin-top:8px">AI suggestions applied above — edit if incorrect.</p>
    </div>`
  }

  bg.querySelector('#u-sv').onclick=async()=>{
    if(!files.length)return
    const btn=bg.querySelector('#u-sv');btn.disabled=true;btn.textContent='Uploading…'
    const prog=bg.querySelector('#u-progress');prog.style.display='block'
    const bar=bg.querySelector('#u-progress-bar')
    const docType=bg.querySelector('#u-t').value
    const docDate=bg.querySelector('#u-d').value||null
    const docAmount=parseFloat(bg.querySelector('#u-amount').value)||null

    let uploaded=0
    for(const file of files){
      const ext=file.name.split('.').pop().toLowerCase()
      const path=`${userId}/${vehicle.id}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`
      const{error:ue}=await sb.storage.from('vehicle-documents').upload(path,file,{contentType:file.type})
      if(ue){const e=bg.querySelector('#merr');e.textContent=ue.message;e.classList.add('on');btn.disabled=false;btn.textContent='Upload';return}

      const docRecord={
        vehicle_id:vehicle.id,
        user_id:userId,
        storage_path:path,
        file_name:file.name,
        file_type:file.type,
        file_size_bytes:file.size,
        document_type:docType,
        document_date:docDate,
        ocr_status:'complete',
        extracted_amount:docAmount||(aiResult?.extracted_amount||null),
        extracted_mileage:aiResult?.extracted_mileage||null
      }
      await sb.from('documents').insert(docRecord)

      // Analytics: document_uploaded (Task 4)
      await logEvent('document_uploaded',{source:'web',document_type:docType,vehicle_id:vehicle.id})
      await checkFirstAction('document')

      if(aiResult&&(docType==='service_invoice'||docType==='mot_certificate'||docType==='repair_invoice'||docType==='fuel_receipt')){
        await createLinkedRecord(docType, aiResult, path)
      }

      uploaded++
      bar.style.width=`${(uploaded/files.length)*100}%`
    }
    bg.remove();toast(`${uploaded} document${uploaded>1?'s':''} uploaded ✓`);await load()
  }
}

async function createLinkedRecord(docType, ai, docPath){
  try{
    if((docType==='service_invoice'||docType==='repair_invoice')&&(ai.extracted_amount||ai.garage_name)){
      await sb.from('service_entries').insert({
        vehicle_id:vehicle.id,
        user_id:userId,
        date:ai.document_date||new Date().toISOString().split('T')[0],
        mileage_at_service:ai.extracted_mileage||null,
        garage_name:ai.garage_name||null,
        garage_type:'specialist',
        description:ai.description||null,
        total_cost:ai.extracted_amount||null,
        source:'document_ai'
      })
      toast('Service record auto-created from document ✓')
    } else if(docType==='fuel_receipt'&&ai.extracted_amount){
      await sb.from('fuel_entries').insert({
        vehicle_id:vehicle.id,
        user_id:userId,
        date:ai.document_date||new Date().toISOString().split('T')[0],
        mileage_at_fill:ai.extracted_mileage||null,
        total_cost:ai.extracted_amount||null,
        station_name:ai.garage_name||null,
        source:'document_ai'
      })
      toast('Fuel entry auto-created from receipt ✓')
    }
  }catch(e){console.warn('Linked record creation failed:',e)}
}
</script>
