<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoLog Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg: #080d14;
    --surface: #0f172a;
    --surface2: #111827;
    --surface3: #1a2236;
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.12);
    --teal: #1E7A8C;
    --teal-bright: #2dd4ef;
    --teal-glow: rgba(30,122,140,0.2);
    --ios-color: #a78bfa;
    --ios-bg: rgba(139,92,246,0.12);
    --web-color: #2dd4ef;
    --web-bg: rgba(45,212,239,0.1);
    --text: #e2e8f0;
    --muted: #64748b;
    --faint: #1e293b;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --mono: 'DM Mono', monospace;
    --sans: 'Sora', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0;
    background-image: linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
    background-size: 48px 48px; pointer-events: none;
  }
  .wrapper { position: relative; z-index: 1; max-width: 1360px; margin: 0 auto; padding: 28px 24px 80px; }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal-bright); box-shadow: 0 0 14px var(--teal-bright); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.5)} }
  .logo-name { font-size: 1rem; font-weight: 700; letter-spacing: -.02em; }
  .logo-name span { color: var(--teal-bright); }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .header-meta { font-size: .6875rem; color: var(--muted); font-family: var(--mono); }

  .tabs { display: flex; gap: 4px; }
  .tab { padding: 6px 12px; border-radius: 7px; font-size: .75rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-family: var(--mono); transition: all .14s; }
  .tab.active-all { border-color: var(--teal); color: var(--teal-bright); background: rgba(45,212,239,0.08); }
  .tab:hover:not([class*="active"]) { border-color: rgba(255,255,255,.15); color: var(--text); }
  .refresh-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 7px; font-family: var(--mono); font-size: .75rem; cursor: pointer; transition: all .15s; }
  .refresh-btn:hover { border-color: var(--teal); color: var(--teal-bright); }

  .section-label { font-size: .6875rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin: 36px 0 14px; display: flex; align-items: center; gap: 10px; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 18px; position: relative; overflow: hidden; transition: border-color .2s; }
  .kpi:hover { border-color: rgba(45,212,239,0.2); }
  .kpi-glow { position: absolute; top: -20px; right: -20px; width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, var(--teal-glow) 0%, transparent 70%); pointer-events: none; }
  .kpi-label { font-size: .6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 8px; }
  .kpi-value { font-size: 2.25rem; font-weight: 800; letter-spacing: -.04em; line-height: 1; }
  .kpi-sub { font-size: .6875rem; color: var(--muted); margin-top: 6px; }
  .good { color: var(--green); } .warn { color: var(--amber); } .bad { color: var(--red); } .neutral { color: var(--muted); }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
  @media (max-width: 1000px) { .three-col { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 700px) { .two-col, .three-col { grid-template-columns: 1fr; } }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; }
  .card-title { font-size: .8125rem; font-weight: 700; margin-bottom: 6px; letter-spacing: -.01em; display: flex; align-items: center; gap: 8px; }
  .card-sub { font-size: .6875rem; color: var(--muted); font-weight: 400; margin-bottom: 16px; }

  .mfunnel { display: flex; flex-direction: column; gap: 0; }
  .mfunnel-row { display: grid; grid-template-columns: 200px 1fr 80px 70px; align-items: center; gap: 14px; padding: 10px 0; }
  .mfunnel-label { font-size: .8125rem; color: var(--text); font-weight: 500; }
  .mfunnel-sub { font-size: .6875rem; color: var(--muted); margin-top: 2px; }
  .mfunnel-bar-wrap { height: 10px; background: var(--faint); border-radius: 100px; overflow: hidden; }
  .mfunnel-bar { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--teal), var(--teal-bright)); transition: width 1.2s cubic-bezier(.16,1,.3,1); }
  .mfunnel-n { font-family: var(--mono); font-size: 1rem; font-weight: 700; text-align: right; }
  .mfunnel-pct { font-family: var(--mono); font-size: .75rem; color: var(--muted); text-align: right; }
  .mfunnel-drop { grid-column: 1/-1; text-align: right; padding: 0 80px 4px 0; font-size: .625rem; color: var(--red); font-family: var(--mono); opacity: .65; }
  @media (max-width: 700px) { .mfunnel-row { grid-template-columns: 1fr 60px 50px; } .mfunnel-bar-wrap { display: none; } }

  .event-list { display: flex; flex-direction: column; gap: 5px; }
  .event-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--surface2); border-radius: 7px; border: 1px solid transparent; transition: border-color .14s; }
  .event-row:hover { border-color: var(--border); }
  .event-name { font-family: var(--mono); font-size: .75rem; color: var(--teal-bright); }
  .event-right { display: flex; align-items: center; gap: 10px; }
  .event-bar-wrap { width: 80px; height: 3px; background: var(--faint); border-radius: 100px; overflow: hidden; }
  .event-bar { height: 100%; border-radius: 100px; background: var(--teal); }
  .event-count { font-family: var(--mono); font-size: .8125rem; font-weight: 500; min-width: 30px; text-align: right; }

  .timeline { display: flex; flex-direction: column; }
  .tl-row { display: flex; align-items: flex-start; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .tl-row:last-child { border-bottom: none; }
  .tl-time { font-family: var(--mono); font-size: .6875rem; color: var(--muted); white-space: nowrap; padding-top: 2px; min-width: 80px; }
  .tl-body { flex: 1; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .ev-badge { padding: 2px 8px; border-radius: 5px; font-family: var(--mono); font-size: .6875rem; font-weight: 600; }
  .ev-signup { background: rgba(34,197,94,.1); color: var(--green); }
  .ev-vehicle { background: rgba(45,212,239,.1); color: var(--teal-bright); }
  .ev-paywall { background: rgba(245,158,11,.1); color: var(--amber); }
  .ev-action { background: rgba(139,92,246,.1); color: #a78bfa; }
  .ev-other { background: rgba(255,255,255,.05); color: var(--muted); }
  .ev-tour { background: rgba(45,212,239,.12); color: var(--teal-bright); }

  .tfunnel-row { display: grid; grid-template-columns: 230px 1fr 60px 60px; align-items: center; gap: 12px; padding: 8px 0; }
  .tfunnel-label { font-size: .75rem; color: var(--text); font-weight: 500; }
  .tfunnel-sub { font-size: .625rem; color: var(--muted); margin-top: 2px; font-family: var(--mono); }
  .tfunnel-bar-wrap { height: 8px; background: var(--faint); border-radius: 100px; overflow: hidden; }
  .tfunnel-bar { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--teal), var(--teal-bright)); transition: width 1s cubic-bezier(.16,1,.3,1); }
  .tfunnel-n { font-family: var(--mono); font-size: .875rem; font-weight: 700; text-align: right; }
  .tfunnel-pct { font-family: var(--mono); font-size: .6875rem; color: var(--muted); text-align: right; }
  @media (max-width: 700px) { .tfunnel-row { grid-template-columns: 1fr 50px 50px; } .tfunnel-bar-wrap { display: none; } }

  .tstep-table { width: 100%; border-collapse: collapse; font-size: .8125rem; }
  .tstep-table th { text-align: left; padding: 8px 10px; font-size: .6rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); }
  .tstep-table th.num { text-align: right; }
  .tstep-table td { padding: 9px 10px; border-bottom: 1px solid rgba(255,255,255,.03); }
  .tstep-table td.num { text-align: right; font-family: var(--mono); }
  .tstep-table tr:last-child td { border-bottom: none; }
  .tl-props { font-size: .6875rem; color: var(--muted); font-family: var(--mono); }

  .cohort-table { width: 100%; border-collapse: collapse; font-size: .8125rem; }
  .cohort-table th { text-align: left; padding: 8px 10px; font-size: .6rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .cohort-table td { padding: 10px 10px; border-bottom: 1px solid rgba(255,255,255,.03); vertical-align: middle; }
  .cohort-table tr:last-child td { border-bottom: none; }
  .ret-cell { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 26px; border-radius: 5px; font-family: var(--mono); font-size: .75rem; font-weight: 600; }
  .ret-active { background: rgba(34,197,94,.15); color: var(--green); }
  .ret-cold   { background: rgba(239,68,68,.1);   color: var(--red); }
  .ret-none   { background: rgba(255,255,255,.03); color: var(--muted); }

  .heatmap-wrap { overflow-x: auto; }
  .heatmap-table { border-collapse: collapse; font-size: .75rem; min-width: 100%; }
  .heatmap-table th { padding: 6px 8px; font-size: .5625rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 600; text-align: center; white-space: nowrap; border-bottom: 1px solid var(--border); }
  .heatmap-table th.user-col { text-align: left; min-width: 120px; }
  .heatmap-table td { padding: 5px 8px; border-bottom: 1px solid rgba(255,255,255,.025); text-align: center; }
  .hm-cell { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 22px; border-radius: 4px; font-size: .625rem; font-family: var(--mono); font-weight: 600; }
  .hm-done  { background: rgba(34,197,94,.18); color: var(--green); }
  .hm-never { background: rgba(255,255,255,.03); color: rgba(255,255,255,.12); }
  .hm-user  { font-size: .8125rem; color: var(--text); text-align: left; font-weight: 500; }
  .hm-last  { font-size: .625rem; color: var(--muted); font-family: var(--mono); text-align: left; }
  .hm-total-row td { background: rgba(45,212,239,.04); border-top: 1px solid var(--border); border-bottom: none; }
  .hm-total-row .hm-user { color: var(--muted); font-size: .6875rem; }

  .user-row-clickable { cursor: pointer; transition: background .12s; }
  .user-row-clickable:hover td { background: rgba(255,255,255,.025); }
  .user-detail-row { display: none; }
  .user-detail-row.open { display: table-row; }
  .user-event-feed { display: flex; flex-direction: column; max-height: 280px; overflow-y: auto; }
  .user-event-feed::-webkit-scrollbar { width: 4px; }
  .user-event-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .insight { background: rgba(30,122,140,0.07); border: 1px solid rgba(45,212,239,0.13); border-radius: 10px; padding: 14px 18px; margin-top: 10px; font-size: .75rem; color: var(--muted); line-height: 1.6; }
  .insight strong { color: var(--text); }

  #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; gap: 14px; }
  .spinner { width: 26px; height: 26px; border: 2.5px solid rgba(45,212,239,.15); border-top-color: var(--teal-bright); border-radius: 50%; animation: spin .65s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: var(--mono); font-size: .75rem; color: var(--muted); }
  .empty-msg { font-size: .8125rem; color: var(--muted); padding: 12px 0; text-align: center; }

  .spark-wrap { display: flex; align-items: flex-end; gap: 3px; height: 48px; margin-top: 4px; }
  .spark-bar { flex: 1; background: var(--teal); border-radius: 2px 2px 0 0; min-height: 2px; opacity: .85; transition: opacity .14s; cursor: default; }
  .spark-bar:hover { opacity: 1; }
  .spark-bar.empty { background: var(--faint); opacity: .4; }
  .spark-labels { display: flex; justify-content: space-between; margin-top: 6px; font-family: var(--mono); font-size: .5625rem; color: var(--muted); }

  .plat { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 5px; font-family: var(--mono); font-size: .6875rem; font-weight: 600; }
  .plat-ios { background: var(--ios-bg); color: var(--ios-color); }
  .plat-web { background: var(--web-bg); color: var(--web-color); }
  .plat-legacy { background: rgba(245,158,11,.1); color: var(--amber); }

  /* Broadcast */
  .broadcast-btn { background: rgba(168,85,247,0.10); border: 1px solid rgba(168,85,247,0.3); color: #c084fc; padding: 6px 12px; border-radius: 7px; font-family: var(--mono); font-size: .75rem; cursor: pointer; transition: all .15s; font-weight: 600; }
  .broadcast-btn:hover, .broadcast-btn.active { background: rgba(168,85,247,0.18); border-color: #c084fc; }
  #broadcast-panel { display: none; background: var(--surface); border: 1px solid rgba(168,85,247,0.2); border-radius: 14px; padding: 22px 24px; margin-bottom: 28px; }
  #broadcast-panel.open { display: block; }
  .bc-label { font-size: .6875rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .bc-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 9px; background: var(--surface2); color: var(--text); font-family: var(--mono); font-size: .875rem; outline: none; transition: border-color .14s; }
  .bc-input:focus { border-color: rgba(168,85,247,0.5); }
  .bc-toolbar { display: flex; flex-wrap: wrap; gap: 4px; background: var(--surface2); border: 1px solid var(--border); border-bottom: none; border-radius: 9px 9px 0 0; padding: 6px 8px; }
  .bc-toolbar button { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 5px; padding: 3px 10px; font-size: .8rem; cursor: pointer; font-family: var(--sans); transition: background .15s; }
  .bc-toolbar button:hover { background: rgba(168,85,247,0.18); border-color: #c084fc; }
  .bc-toolbar-sep { width: 1px; background: var(--border); margin: 2px 4px; align-self: stretch; }
  .bc-richbody { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-top: none; border-radius: 0 0 9px 9px; color: var(--text); font-family: var(--sans); font-size: .875rem; padding: 10px 12px; min-height: 110px; box-sizing: border-box; outline: none; line-height: 1.6; }
  .bc-richbody:focus { border-color: rgba(168,85,247,0.5); }
  .bc-richbody:empty:before { content: attr(data-placeholder); color: #666; pointer-events: none; }
  .bc-richbody ul, .bc-richbody ol { padding-left: 1.4em; margin: 4px 0; }
  .bc-richbody li { margin: 2px 0; }
  .bc-richbody h3 { font-size: 1rem; font-weight: 700; margin: 6px 0 2px; }
  .bc-mock-body ul, .bc-mock-body ol { padding-left: 1.2em; margin: 3px 0; }
  .bc-mock-body li { margin: 1px 0; }
  .bc-mock-body h3 { font-size: .85rem; font-weight: 700; margin: 4px 0 1px; }
  .bc-emoji-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .bc-emoji { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); font-size: 1.1rem; cursor: pointer; transition: all .14s; user-select: none; }
  .bc-emoji:hover { border-color: rgba(168,85,247,0.4); }
  .bc-emoji.selected { border-color: #c084fc; background: rgba(168,85,247,0.15); }
  .bc-send-btn { background: #7c3aed; border: none; color: #fff; padding: 10px 22px; border-radius: 9px; font-family: var(--sans); font-size: .875rem; font-weight: 700; cursor: pointer; transition: background .14s; }
  .bc-send-btn:hover { background: #6d28d9; }
  .bc-send-btn:disabled { opacity: .5; cursor: not-allowed; }
  .bc-msg { font-size: .8125rem; padding: 10px 14px; border-radius: 8px; margin-top: 10px; display: none; }
  .bc-msg.success { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.2); color: var(--green); }
  .bc-msg.error   { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2);  color: #fca5a5; }
  .bc-preview-phone { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 260px; }
  .bc-mock-backdrop { background: rgba(0,0,0,0.38); border-radius: 10px; padding: 18px; width: 100%; max-width: 300px; display: flex; align-items: center; justify-content: center; }
  .bc-mock-card { background: #ffffff; border-radius: 20px; padding: 22px 20px 18px; width: 100%; box-shadow: 0 12px 40px rgba(0,0,0,0.35); }
  .bc-mock-icon { font-size: 36px; text-align: center; margin-bottom: 10px; }
  .bc-mock-title { font-size: 15px; font-weight: 700; color: #111; text-align: center; margin-bottom: 8px; font-family: var(--sans); line-height: 1.3; }
  .bc-mock-body { font-size: 12px; color: #555; line-height: 1.5; margin-bottom: 14px; font-family: var(--sans); }
  .bc-mock-cta { background: #007AFF; color: #fff; border-radius: 10px; padding: 9px 14px; font-size: 13px; font-weight: 600; text-align: center; margin-bottom: 8px; font-family: var(--sans); }
  .bc-mock-dismiss { background: rgba(0,122,255,0.08); color: #007AFF; border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 600; text-align: center; font-family: var(--sans); border: 1px solid rgba(0,122,255,0.18); }
  @media (max-width: 800px) { #broadcast-panel > div { grid-template-columns: 1fr !important; } }

  /* Notes panel */
  .notes-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; margin-bottom: 28px; }
  .notes-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 10px; flex-wrap: wrap; }
  .notes-title { font-size: .9375rem; font-weight: 700; letter-spacing: -.01em; }
  .notes-sub { font-size: .6875rem; color: var(--muted); font-family: var(--mono); }
  .notes-compose { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 14px; }
  .notes-ta { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; color: var(--text); font-family: var(--sans); font-size: .8125rem; resize: vertical; min-height: 60px; line-height: 1.45; }
  .notes-ta:focus { outline: none; border-color: var(--border-strong); }
  .notes-tag-sel { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; color: var(--text); font-family: var(--mono); font-size: .75rem; min-width: 120px; }
  .notes-save-btn { background: var(--teal, #0ea5b5); color: #fff; border: none; border-radius: 10px; padding: 10px 16px; font-family: var(--mono); font-size: .75rem; font-weight: 700; cursor: pointer; transition: opacity .14s; }
  .notes-save-btn:hover { opacity: .88; }
  .notes-save-btn:disabled { opacity: .4; cursor: not-allowed; }
  .notes-filter { display: flex; gap: 6px; margin-bottom: 10px; }
  .notes-filter-btn { padding: 5px 10px; border-radius: 7px; font-size: .6875rem; font-family: var(--mono); background: var(--surface2); color: var(--muted); border: 1px solid var(--border); cursor: pointer; transition: all .14s; }
  .notes-filter-btn.active { color: var(--text); border-color: var(--border-strong); }
  .notes-list { display: flex; flex-direction: column; gap: 8px; }
  .note-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; gap: 12px; align-items: flex-start; }
  .note-item.resolved { opacity: .55; }
  .note-main { flex: 1; min-width: 0; }
  .note-body { font-size: .8125rem; color: var(--text); line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
  .note-meta { display: flex; align-items: center; gap: 10px; margin-top: 6px; font-size: .625rem; color: var(--muted); font-family: var(--mono); flex-wrap: wrap; }

  .note-resolved-note { margin-top: 8px; padding: 8px 10px; background: rgba(16,185,129,.05); border-left: 2px solid rgba(16,185,129,.4); border-radius: 0 6px 6px 0; font-size: .75rem; color: var(--muted); font-style: italic; }
  .note-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .note-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 5px 9px; border-radius: 6px; font-size: .6875rem; font-family: var(--mono); cursor: pointer; transition: all .14s; }
  .note-btn:hover { color: var(--text); border-color: var(--border-strong); }
  .note-btn.resolve:hover { color: #10b981; border-color: rgba(16,185,129,.3); }
  .note-btn.delete:hover { color: #ef4444; border-color: rgba(239,68,68,.3); }
  .notes-empty { font-size: .75rem; color: var(--muted); font-style: italic; padding: 8px 0; }
  @media (max-width: 700px) { .notes-compose { flex-wrap: wrap; } .notes-ta { width: 100%; flex-basis: 100%; } .notes-tag-sel, .notes-save-btn { flex: 1; } }

  /* Daily activity bar chart */
  .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 80px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; height: 100%; justify-content: flex-end; }
  .bar-fill { width: 100%; border-radius: 3px 3px 0 0; background: var(--teal); opacity: .85; min-height: 2px; transition: opacity .14s; }
  .bar-fill:hover { opacity: 1; }
  .bar-fill.empty { background: var(--faint); opacity: .35; }
  .bar-label { font-family: var(--mono); font-size: .5rem; color: var(--muted); white-space: nowrap; }

<body>
<div class="wrapper">
<div id="loading"><div class="spinner"></div><div class="loading-text">Loading analytics\u2026</div></div>

<div id="auth-gate" style="display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:20px">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 40px;max-width:400px;width:100%;text-align:center">
    <div style="font-size:1.5rem;margin-bottom:12px">&#128274;</div>
    <div style="font-size:1rem;font-weight:700;color:var(--text);margin-bottom:8px">Sign in to view analytics</div>
    <div style="font-size:.8125rem;color:var(--muted);margin-bottom:24px;line-height:1.6">Owner account only.</div>
    <div id="auth-err" style="display:none;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 14px;font-size:.8125rem;color:#fca5a5;margin-bottom:16px"></div>
    <input type="email" id="auth-email" placeholder="your@email.com" style="width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--text);font-family:var(--mono);font-size:.875rem;outline:none;margin-bottom:10px" onkeydown="if(event.key==='Enter')doSignIn()">
    <input type="password" id="auth-pass" placeholder="Password" style="width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--text);font-family:var(--mono);font-size:.875rem;outline:none;margin-bottom:16px" onkeydown="if(event.key==='Enter')doSignIn()">
    <button onclick="doSignIn()" id="auth-btn" style="width:100%;padding:12px;border-radius:10px;border:none;background:var(--teal);color:#fff;font-family:var(--sans);font-size:.9375rem;font-weight:700;cursor:pointer">Sign In</button>
  </div>
</div>

<div id="main" style="display:none"></div>
</div>

<script>
const SURL = 'https://dkpvxlxarsmiljnvnbck.supabase.co'
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrcHZ4bHhhcnNtaWxqbnZuYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzM4MzIsImV4cCI6MjA5MDAwOTgzMn0.WJTRE_xmudj--jWSoA3e4ggYVORrFpoarBUkeaQN1Bw'
const sb = supabase.createClient(SURL, SKEY, { auth: { persistSession: true } })
const OWNER_ID = '5501db10-cfff-4b9e-959c-54eb023ddd36'
const ADMIN_ID = '37febbe6-5335-48b1-be24-f199209d3f88' // Apple review account — grouped with owner
const EXCLUDED_IDS = [OWNER_ID, ADMIN_ID]

// ── State ───────────────────────────────────────────────────────────────────
let summaryRows = []       // analytics_daily_summary rows for current range
let liveToday = null       // live today snapshot built fresh on every page load
let allProfiles = []       // all profiles (small table, always full fetch)
let allUserEvents = {}     // per-user events loaded on drill-down click
let allNotes = []          // analytics_notes rows (newest first)
let allFeedback = []       // feedback table rows
let allDeletionRequests = [] // deletion_requests rows
let allApiUsage = []       // api_usage rows
let allShares = []         // vehicle_shares rows
let notesFilter = 'active' // 'active' | 'resolved' | 'all'
let tourViewMode = 'users' // 'users' | 'all' — first-run only vs all runs
let currentRange = '30d'
let feedLimit = 40
let excludeAdmin = true    // exclude OWNER_ID from all metrics (toggle in header)
let postLaunchMode = false  // when true: zeros pre-launch grants, shows clean post-launch numbers

// Feature heatmap definitions
const FEATURES = [
  { key: 'onboarding',  label: 'Onboarded',     match: (e,p) => e.event_name === 'onboarding_completed' || e.event_name === 'onboarding_complete' || p?.onboarding_completed === true },
  { key: 'vehicle',     label: 'Added vehicle',  match: e => e.event_name === 'vehicle_added' },
  { key: 'action',      label: 'First action',   match: (e,p) => e.event_name === 'first_action_taken' || p?.first_action_completed === true },
  { key: 'fuel',        label: 'Fuel entry',     match: e => e.event_name === 'fuel_entry_added' || e.event_name === 'fuel_added' },
  { key: 'service',     label: 'Service log',    match: e => e.event_name === 'service_entry_added' || e.event_name === 'service_added' },
  { key: 'document',    label: 'Doc upload',     match: e => e.event_name === 'document_upload_completed' || e.event_name === 'document_uploaded' || e.event_name === 'document_added' },
  { key: 'trip',        label: 'Trip logged',    match: e => e.event_name === 'trip_started' },
  { key: 'costs',       label: 'Costs viewed',   match: e => e.event_name === 'costs_viewed' },
  { key: 'paywall',     label: 'Saw paywall',    match: e => e.event_name === 'paywall_viewed' },
  { key: 'subscribe',   label: 'Subscribed',     match: (e,p) => e.event_name === 'subscription_started' || (( p?.plan === 'paid') && !p?.pre_launch_grant) },
  { key: 'dashboard',   label: 'Dashboard',      match: e => e.event_name === 'dashboard_viewed' },
  { key: 'docs_view',   label: 'Docs opened',    match: e => e.event_name === 'documents_viewed' },
  { key: 'tour_saw',    label: 'Saw tour',       match: e => e.event_name === 'feature_tour_started' },
  { key: 'tour_done',   label: 'Done tour',      match: e => e.event_name === 'feature_tour_completed' },
]

// ── Helpers ──────────────────────────────────────────────────────────────────
// Safari requires strict ISO 8601 with T separator — Supabase returns space-separated
function safeParse(d) { return new Date(String(d).replace(' ', 'T').replace(/([+-]\d{2})$/, '$1:00')) }
function fmtDate(d) {
  if (!d) return '\u2014'
  const dt = safeParse(d)
  return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) + ' ' + dt.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
}
function fmtDateShort(d) {
  if (!d) return '\u2014'
  return safeParse(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })
}
function daysSince(d) {
  if (!d) return Infinity
  // Safari strict ISO 8601: replace space separator with T
  return Math.floor((Date.now() - new Date(String(d).replace(' ', 'T').replace(/([+-]\d{2})$/, '$1:00'))) / 86400000)
}
function sum(rows, key) { return rows.reduce((a,r) => a + (r[key]||0), 0) }
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
}
function getPlatform(e) {
  if (e.platform && e.platform !== 'legacy') return e.platform
  const p = e.properties || {}
  if (p.platform === 'ios') return 'ios'
  if (p.platform === 'web' || p.source === 'web') return 'web'
  if (['onboarding_completed','onboarding_complete','subscription_started'].includes(e.event_name)) return 'ios'
  return 'unknown'
}
function platBadge(platform) {
  if (platform === 'ios') return `<span class="plat plat-ios">iOS</span>`
  if (platform === 'web') return `<span class="plat plat-web">Web</span>`
  return `<span class="plat plat-legacy">legacy</span>`
}
function evBadgeClass(name) {
  if (name.includes('signup') || name.includes('onboarding')) return 'ev-signup'
  if (name.includes('vehicle')) return 'ev-vehicle'
  if (name.includes('paywall') || name.includes('subscription')) return 'ev-paywall'
  if (name.includes('feature_tour')) return 'ev-tour'
  if (name.includes('action') || name.includes('document') || name.includes('fuel') || name.includes('service') || name.includes('feedback')) return 'ev-action'
  return 'ev-other'
}
function rangeStartISO() {
  if (currentRange === 'all') return null
  const ms = currentRange === '7d' ? 7 : currentRange === '30d' ? 30 : 90
  const d = new Date(); d.setDate(d.getDate() - ms)
  return d.toISOString().split('T')[0]
}
function setRange(r) { currentRange = r; loadData() }
function toggleExcludeAdmin() { excludeAdmin = !excludeAdmin; render() }
function togglePostLaunch() { postLaunchMode = !postLaunchMode; render() }

// ── Notes ──────────────────────────────────────────────────────────────────
function setNotesFilter(f) { notesFilter = f; render() }
function setTourViewMode(m) { tourViewMode = m; render() }

async function refreshNotes() {
  const { data, error } = await sb.from('analytics_notes').select('*').order('created_at', { ascending: false })
  if (!error) { allNotes = data || []; render() }
}

async function saveNote() {
  const ta = document.getElementById('note-body')
  const sel = document.getElementById('note-tag')
  const btn = document.getElementById('note-save-btn')
  const body = (ta?.value || '').trim()
  if (!body) { ta?.focus(); return }
  const section_tag = sel?.value || null
  btn.disabled = true; btn.textContent = 'Saving\u2026'
  try {
    const { error } = await sb.from('analytics_notes').insert({ body, section_tag: section_tag || null })
    if (error) throw error
    ta.value = ''
    if (sel) sel.value = ''
    notesFilter = 'active'
    await refreshNotes()
  } catch (err) {
    alert('Could not save note: ' + (err.message || err))
  } finally {
    btn.disabled = false; btn.textContent = 'Save'
  }
}

async function resolveNote(id) {
  const resolution = prompt('How did you resolve this? (optional \u2014 leave blank if you just want to close it out)')
  if (resolution === null) return // cancelled
  try {
    const { error } = await sb.from('analytics_notes')
      .update({ resolved_at: new Date().toISOString(), resolved_note: resolution.trim() || null })
      .eq('id', id)
    if (error) throw error
    await refreshNotes()
  } catch (err) {
    alert('Could not resolve note: ' + (err.message || err))
  }
}

async function reopenNote(id) {
  try {
    const { error } = await sb.from('analytics_notes')
      .update({ resolved_at: null, resolved_note: null })
      .eq('id', id)
    if (error) throw error
    await refreshNotes()
  } catch (err) {
    alert('Could not reopen note: ' + (err.message || err))
  }
}

async function deleteNote(id) {
  if (!confirm('Delete this note permanently?')) return
  try {
    const { error } = await sb.from('analytics_notes').delete().eq('id', id)
    if (error) throw error
    await refreshNotes()
  } catch (err) {
    alert('Could not delete note: ' + (err.message || err))
  }
}

// ── Data loading ─────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('loading').style.display = 'flex'
  document.getElementById('main').style.display = 'none'

  // Summary rows for current range (at most 90 rows, usually 7–30)
  let summaryQuery = sb.from('analytics_daily_summary').select('*').order('day', { ascending: true })
  const start = rangeStartISO()
  if (start) summaryQuery = summaryQuery.gte('day', start)

  // Profiles always fully fetched (one row per user, stays small for a long time)
  // All-time events fetched once for retention cohort, heatmap, and tour analytics
  // These sections MUST use all-time data regardless of the selected range filter
  // Wrap each query with a timeout so a hanging fetch can't freeze the page
  function withTimeout(promise, ms=8000) {
    return Promise.race([promise, new Promise(r => setTimeout(() => r({ data: [], error: { message: 'timeout' } }), ms))])
  }

  const [summaryRes, profilesRes, allEventsRes, webEventsRes, ocrStatsRes, notesRes, feedbackRes, deletionRes, sharesRes] = await Promise.all([
    summaryQuery,
    sb.from('profiles').select('id, plan, onboarding_completed, first_action_completed, created_at, display_name, utm_source, trips_enabled, pre_launch_grant').order('created_at', { ascending: false }),
    withTimeout(sb.from('analytics_events')
      .select('event_name, properties, created_at, platform, user_id')
      .not('user_id', 'is', null)
      .order('created_at', { ascending: true })
      .limit(10000)),
    // Fetch today's anonymous web events separately (no user_id so missed by per-user query)
    withTimeout(sb.from('analytics_events')
      .select('event_name, properties, created_at, platform, user_id')
      .is('user_id', null)
      .eq('platform', 'web')
      .gte('created_at', new Date().toISOString().split('T')[0])
      .limit(2000)),
    // OCR stats via security-definer function (bypasses RLS so all users visible)
    withTimeout(sb.rpc('get_ocr_stats')),
    sb.from('analytics_notes').select('*').order('created_at', { ascending: false }),
    withTimeout(sb.from('feedback').select('id, type, description, context, app_version, created_at, user_id').order('created_at', { ascending: false }).limit(50)),
    withTimeout(sb.from('deletion_requests').select('id, user_id, created_at').order('created_at', { ascending: false })),
    withTimeout(sb.from('vehicle_shares').select('id, created_at'))
  ])

  if (summaryRes.error) throw new Error(summaryRes.error.message)
  if (profilesRes.error) throw new Error(profilesRes.error.message)

  summaryRows = summaryRes.data || []
  allProfiles = profilesRes.data || []
  allNotes = (notesRes && !notesRes.error) ? (notesRes.data || []) : []
  allFeedback = (feedbackRes && !feedbackRes.error) ? (feedbackRes.data || []) : []
  allDeletionRequests = (deletionRes && !deletionRes.error) ? (deletionRes.data || []) : []
  allShares = (sharesRes && !sharesRes.error) ? (sharesRes.data || []) : []

  // OCR stats from security-definer RPC (bypasses RLS — returns all users)
  allApiUsage = (ocrStatsRes && !ocrStatsRes.error) ? (ocrStatsRes.data || []).map(r => ({ service: 'ocr', call_count: Number(r.total_calls), user_id: r.user_id })) : []

  ;[['feedback', feedbackRes], ['deletion_requests', deletionRes], ['vehicle_shares', sharesRes], ['analytics_notes', notesRes], ['web_events', webEventsRes], ['ocr_stats', ocrStatsRes]]
    .forEach(([name, res]) => { if (res?.error) console.warn('[Analytics] ' + name + ' fetch error:', res.error.message) })

  // Reset allUserEvents on every load so stale data from previous range
  // switches doesn't accumulate and cause duplicate/wrong retention results.
  allUserEvents = {}

  // Pre-populate allUserEvents with all-time data so retention/heatmap/tour
  // work correctly without requiring the user to click-expand every row first.
  if (allEventsRes.error) {
    console.warn('[Analytics] bulk events fetch failed:', allEventsRes.error.message)
  } else {
    const allEventsData = allEventsRes.data || []
    allEventsData.forEach(e => {
      if (!e.user_id) return
      if (!allUserEvents[e.user_id]) allUserEvents[e.user_id] = []
      allUserEvents[e.user_id].push(e)
    })

    // Build a live today snapshot from raw events — used exclusively for KPI display.
    // summaryRows is left untouched so sparklines/trends use stable cron-aggregated data.
    const todayKey = new Date().toISOString().split('T')[0]
    const todayEvents = allEventsData.filter(e => (e.created_at || '').startsWith(todayKey))
    // Also include anonymous web events fetched separately (no user_id, missed by main query)
    const anonWebToday = (webEventsRes && !webEventsRes.error) ? (webEventsRes.data || []) : []
    const allTodayEvents = [...todayEvents, ...anonWebToday]
    const dauSet = new Set(allTodayEvents.map(e => e.user_id).filter(Boolean))
    liveToday = {
      total_events: allTodayEvents.length,
      ios_events: allTodayEvents.filter(e => getPlatform(e) === 'ios').length,
      web_events: allTodayEvents.filter(e => getPlatform(e) === 'web').length,
      app_opens: allTodayEvents.filter(e => e.event_name === 'app_opened').length,
      onboardings: allTodayEvents.filter(e => e.event_name === 'onboarding_completed').length,
      subscriptions_started: allTodayEvents.filter(e => e.event_name === 'subscription_started').length,
      paywall_views: allTodayEvents.filter(e => e.event_name === 'paywall_viewed').length,
      fuel_entries: allTodayEvents.filter(e => e.event_name === 'fuel_entry_added').length,
      service_entries: allTodayEvents.filter(e => e.event_name === 'service_entry_added').length,
      doc_uploads: allTodayEvents.filter(e => e.event_name === 'document_uploaded').length,
      trips_started: allTodayEvents.filter(e => e.event_name === 'trip_started').length,
      dau: dauSet.size
    }
  }

  render()
}

// Lazy-load events for a single user when they expand the drill-down row
async function loadUserEvents(userId) {
  if (allUserEvents[userId]) return allUserEvents[userId]
  const { data } = await sb.from('analytics_events')
    .select('event_name, properties, created_at, platform')
    .eq('user_id', userId)
    .order('created_at', { ascending: false })
    .limit(100)
  allUserEvents[userId] = data || []
  return allUserEvents[userId]
}

async function toggleUserDetail(uid) {
  const row = document.getElementById('detail-' + uid)
  if (!row) return
  const isOpen = row.classList.contains('open')
  document.querySelectorAll('.user-detail-row.open').forEach(r => r.classList.remove('open'))
  if (!isOpen) {
    row.classList.add('open')
    const feed = document.getElementById('feed-' + uid)
    if (feed && feed.dataset.loaded !== 'true') {
      feed.innerHTML = '<div style="color:var(--muted);font-size:.75rem;padding:8px 0">Loading\u2026</div>'
      const events = await loadUserEvents(uid)
      feed.dataset.loaded = 'true'
      if (events.length === 0) {
        feed.innerHTML = '<div style="color:var(--muted);font-size:.8125rem;padding:8px 0">No events.</div>'
        return
      }
      feed.innerHTML = events.slice().sort((a,b) => safeParse(b.created_at) - safeParse(a.created_at)).map(e => {
        const pl = getPlatform(e)
        const props = e.properties || {}
        const propStr = Object.entries(props).filter(([k]) => !['platform','source','device_type','viewport_w','viewport_h'].includes(k)).map(([k,v]) => `${k}: ${String(v).slice(0,40)}`).join(' \u00B7 ')
        return `<div class="tl-row" style="padding:7px 0">
          <div class="tl-time" style="min-width:80px;font-size:.625rem">${fmtDate(e.created_at)}</div>
          <div class="tl-body">
            ${platBadge(pl)}
            <span class="ev-badge ${evBadgeClass(e.event_name)}">${e.event_name}</span>
            ${propStr ? `<span class="tl-props" style="font-size:.625rem">${propStr}</span>` : ''}
          </div>
        </div>`
      }).join('')
    }
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const rangeLabel = currentRange === 'all' ? 'all time' : currentRange

  // Apply admin exclusion filter
  const profiles = excludeAdmin ? allProfiles.filter(p => !EXCLUDED_IDS.includes(p.id)) : allProfiles
  const loadedEvents = excludeAdmin
    ? Object.fromEntries(Object.entries(allUserEvents).filter(([uid]) => !EXCLUDED_IDS.includes(uid)))
    : allUserEvents
  const allLoadedEvents = Object.values(loadedEvents).flat()

  // Aggregate summary metrics from rows (stable cron data, used for trends/sparklines)
  const totalEvents    = sum(summaryRows, 'total_events')
  const iosEvents      = sum(summaryRows, 'ios_events')
  const webEvents      = sum(summaryRows, 'web_events')
  const totalAppOpens  = sum(summaryRows, 'app_opens')
  const totalFuel      = sum(summaryRows, 'fuel_entries')
  const totalService   = sum(summaryRows, 'service_entries')
  const totalDocs      = sum(summaryRows, 'doc_uploads')
  const totalTrips     = sum(summaryRows, 'trips_started')
  // postLaunchMode = true → zero paywall/subs for clean launch view
  const totalPaywalls  = postLaunchMode ? 0 : sum(summaryRows, 'paywall_views')
  const totalOnboard   = sum(summaryRows, 'onboardings')
  const totalSubs      = postLaunchMode ? 0 : sum(summaryRows, 'subscriptions_started')

  // Live today snapshot — overlays the KPI cards with real-time counts on every refresh.
  // summaryRows is untouched; liveToday is a separate object built from raw events.
  const live = liveToday || {}
  const liveTotal     = live.total_events      ?? totalEvents
  const liveIos       = live.ios_events        ?? iosEvents
  const liveWeb       = live.web_events        ?? webEvents
  const liveAppOpens  = live.app_opens         ?? totalAppOpens
  const liveDau       = live.dau               ?? 0
  const liveSubs      = postLaunchMode ? 0 : (live.subscriptions_started ?? totalSubs)
  const liveOnboard   = live.onboardings       ?? totalOnboard

  // Profile-based stats (always all-time — profiles don't have range filter)
  const totalUsers         = profiles.length
  const completedOnboarding = profiles.filter(p => p.onboarding_completed).length
  const tookFirstAction    = profiles.filter(p => p.first_action_completed).length
  // postLaunchMode = true → only count real purchases (no pre_launch_grant); false → show all
  const paidUsers          = postLaunchMode
    ? profiles.filter(p => (p.plan === 'paid' || p.plan === 'business') && !p.pre_launch_grant).length
    : profiles.filter(p => p.plan === 'paid' || p.plan === 'business').length
  const isSmallBase        = totalUsers < 20

  // DAU — use liveToday if available, fall back to summary row
  const todayKey = new Date().toISOString().split('T')[0]
  const todayRow = summaryRows.find(r => r.day === todayKey)
  const dau = liveDau || todayRow?.dau || 0

  // Sparkline: last 14 days from summaryRows
  const spark14 = []
  for (let i = 13; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i)
    const key = d.toISOString().split('T')[0]
    const row = summaryRows.find(r => r.day === key)
    spark14.push({ key, count: row?.total_events || 0, label: d.toLocaleDateString('en-GB', { day:'numeric', month:'short' }) })
  }
  const sparkMax = Math.max(...spark14.map(b => b.count), 1)

  // Feature activity bar chart (using summary metrics for current range)
  const activityMetrics = [
    { label: 'Fuel', value: totalFuel, color: 'var(--teal)' },
    { label: 'Service', value: totalService, color: 'var(--teal)' },
    { label: 'Docs', value: totalDocs, color: 'var(--teal)' },
    { label: 'Trips', value: totalTrips, color: 'var(--teal)' },
    { label: 'Paywall', value: totalPaywalls, color: 'var(--amber)' },
    { label: 'Subs', value: totalSubs, color: 'var(--green)' },
  ]
  const actMax = Math.max(...activityMetrics.map(m => m.value), 1)

  // Retention cohort — needs per-user event data from the heatmap
  // We use profiles only for the cohort table (last seen from allUserEvents if loaded, else show join date)
  const retentionRows = profiles.map(p => {
    const ue = allUserEvents[p.id] || []
    const realEvents = ue.filter(e => !e.properties?.synthetic)
    const lastSeen = realEvents.length ? realEvents.reduce((a, e) => (e.created_at > a ? e.created_at : a), realEvents[0].created_at) : null
    const daysOld = daysSince(p.created_at)
    const daysAgo = lastSeen ? daysSince(lastSeen) : null
    const activeDays = new Set(realEvents.map(e => (e.created_at||'').split(' ')[0].split('T')[0])).size
    const firstDate = safeParse(p.created_at)
    const d1  = ue.some(e => { const diff = safeParse(e.created_at) - firstDate; return diff >= 0 && diff <= 864e5 })
    const d7  = ue.some(e => { const diff = safeParse(e.created_at) - firstDate; return diff >= 0 && diff <= 7*864e5 })
    const d30 = ue.some(e => { const diff = safeParse(e.created_at) - firstDate; return diff >= 0 && diff <= 30*864e5 })
    return { profile: p, lastSeen, daysOld, daysAgo, activeDays, d1, d7, d30, totalEvents: ue.length }
  }).sort((a,b) => safeParse(b.profile.created_at) - safeParse(a.profile.created_at))

  // Heatmap — requires per-user events; show skeleton if not loaded
  const heatmapRows = profiles.map(p => {
    const ue = allUserEvents[p.id] || []
    const realEvents = ue.filter(e => !e.properties?.synthetic)
    const lastSeen = realEvents.length ? realEvents.reduce((a, e) => (e.created_at > a ? e.created_at : a), realEvents[0].created_at) : null
    const featureMap = {}
    FEATURES.forEach(f => { featureMap[f.key] = ue.some(e => f.match(e, p)) || f.match({event_name:''}, p) })
    const score = Object.values(featureMap).filter(Boolean).length
    return { profile: p, featureMap, score, lastSeen, totalEvents: ue.length }
  }).sort((a,b) => b.score - a.score)
  const featureAdoption = {}
  FEATURES.forEach(f => { featureAdoption[f.key] = heatmapRows.filter(r => r.featureMap[f.key]).length })

  // ── Tour analytics ───────────────────────────────────────────────────────
  const TOUR_STEPS = [
    { id: 'garage',                  stop: 1, label: 'Stop 1 · Garage' },
    { id: 'dashboard_top',           stop: 2, label: 'Stop 2a · Dashboard top' },
    { id: 'dashboard_costs',         stop: 2, label: 'Stop 2b · Dashboard costs' },
    { id: 'dashboard_quick_actions', stop: 2, label: 'Stop 2c · Quick actions' },
    { id: 'fuel',                    stop: 3, label: 'Stop 3 · Fuel log' },
    { id: 'documents',               stop: 4, label: 'Stop 4 · Documents' },
    { id: 'trips_auto_detect',       stop: 5, label: 'Stop 5a · Auto-detect' },
    { id: 'trips_list',              stop: 5, label: 'Stop 5b · Trips list' },
    { id: 'service_add',             stop: 6, label: 'Stop 6a · Service add' },
    { id: 'service_history',         stop: 6, label: 'Stop 6b · Service history' },
    { id: 'costs',                   stop: 7, label: 'Stop 7 · Costs detail' },
  ]
  const allTourEvents = allLoadedEvents.filter(e => e.event_name?.startsWith('feature_tour_'))
  const allTourStarted = allTourEvents.filter(e => e.event_name === 'feature_tour_started')
  const allTourCompleted = allTourEvents.filter(e => e.event_name === 'feature_tour_completed')
  const allTourSkipped = allTourEvents.filter(e => e.event_name === 'feature_tour_skipped')
  const allTourReplayed = allTourEvents.filter(e => e.event_name === 'feature_tour_replayed')

  // Users who replayed — used to filter to first-run only
  const replayedUserIds = new Set(allTourReplayed.map(e => e.user_id).filter(Boolean))
  const completedUserIds = new Set(allTourCompleted.map(e => e.user_id).filter(Boolean))

  // In "users" mode: deduplicate by user (unique users, first run only context)
  // In "all" mode: count every event occurrence (includes replays)
  const tourEvents = tourViewMode === 'users'
    ? allTourEvents.filter(e => !replayedUserIds.has(e.user_id))
    : allTourEvents

  const tourStarted = tourEvents.filter(e => e.event_name === 'feature_tour_started')
  const tourCompleted = tourEvents.filter(e => e.event_name === 'feature_tour_completed')
  const tourSkipped = tourEvents.filter(e => e.event_name === 'feature_tour_skipped')
  const tourSkippedImmediate = tourSkipped.filter(e => e.properties?.skip_type === 'immediate')
  const tourSkippedMidway = tourSkipped.filter(e => e.properties?.skip_type === 'midway')
  const tourReplayed = allTourReplayed

  // Unique user counts (always unique regardless of view mode)
  const startedUserIds = new Set(allTourStarted.map(e => e.user_id).filter(Boolean))
  const startedCount = startedUserIds.size
  const startedTotalRuns = allTourStarted.length
  const replayCount = allTourReplayed.length

  const completedCount = completedUserIds.size
  const skippedUserCount = new Set(allTourSkipped.map(e => e.user_id).filter(id => id && !completedUserIds.has(id))).size
  const completionRate = startedCount > 0 ? Math.round(completedCount / startedCount * 100) : 0
  const skipRate = startedCount > 0 ? Math.round(skippedUserCount / startedCount * 100) : 0
  const replayRate = completedCount > 0 ? Math.round(replayCount / completedCount * 100) : 0

  const durations = allTourCompleted.map(e => e.properties?.total_duration_ms).filter(n => typeof n === 'number').sort((a,b) => a-b)
  const medianDurationMs = durations.length ? durations[Math.floor(durations.length/2)] : 0

  // Step stats — in users mode use unique user counts, in all mode use event counts
  const stepStats = TOUR_STEPS.map(s => {
    const stepViewEvs = tourEvents.filter(e => e.event_name === 'feature_tour_step_viewed' && e.properties?.step_name === s.id)
    const stepViewUsers = new Set(stepViewEvs.map(e => e.user_id).filter(Boolean)).size
    const viewed = tourViewMode === 'users' ? stepViewUsers : stepViewEvs.length
    const viewedUnique = stepViewUsers

    const completedEvs = tourEvents.filter(e => e.event_name === 'feature_tour_step_completed' && e.properties?.step_name === s.id)
    const completed = completedEvs.length
    const times = completedEvs.map(e => e.properties?.time_on_step_ms).filter(n => typeof n === 'number').sort((a,b) => a-b)
    const medianTimeMs = times.length ? times[Math.floor(times.length/2)] : 0
    const stepCompletionPct = viewed > 0 ? Math.round(completed / viewed * 100) : 0

    // For drop-off: split into first-timers vs replayers
    const allViewEvs = allTourEvents.filter(e => e.event_name === 'feature_tour_step_viewed' && e.properties?.step_name === s.id)
    const firstTimerViews = allViewEvs.filter(e => !replayedUserIds.has(e.user_id)).length
    const replayerViews = allViewEvs.filter(e => replayedUserIds.has(e.user_id)).length

    return { ...s, viewed, viewedUnique, completed, medianTimeMs, stepCompletionPct, firstTimerViews, replayerViews }
  })
  const tourBaseline = tourViewMode === 'users' ? startedCount : startedTotalRuns
  const tourMaxStepViews = Math.max(tourBaseline, ...stepStats.map(s => s.viewed), 1)
  function fmtMs(ms) {
    if (!ms) return '—'
    if (ms < 1000) return ms + 'ms'
    if (ms < 60000) return (ms/1000).toFixed(1) + 's'
    return Math.floor(ms/60000) + 'm ' + Math.round((ms%60000)/1000) + 's'
  }
  function stepTimeColor(ms) {
    if (!ms) return 'var(--muted)'
    if (ms < 800) return 'var(--red)'
    if (ms > 8000) return 'var(--amber)'
    return 'var(--text)'
  }

  // ── Extra metrics ─────────────────────────────────────────────────────────
  // Events per user (using all loaded events)
  const eventsPerUserData = profiles.map(p => ({
    name: p.display_name || '(no name)',
    count: (allUserEvents[p.id] || []).length
  })).filter(u => u.count > 0).sort((a,b) => b.count - a.count)
  const totalLoadedEvents = eventsPerUserData.reduce((s,u) => s + u.count, 0)
  const avgEventsPerUser = eventsPerUserData.length > 0 ? Math.round(totalLoadedEvents / eventsPerUserData.length) : 0
  const maxUserEvents = eventsPerUserData.length > 0 ? eventsPerUserData[0].count : 1

  // Paywall → conversion: postLaunchMode zeros everything for clean launch view
  const paywallUserIds = postLaunchMode
    ? new Set()
    : new Set(allLoadedEvents.filter(e => e.event_name === 'paywall_viewed').map(e => e.user_id).filter(Boolean))
  const paywallCount = paywallUserIds.size
  const convertedFromPaywall = postLaunchMode
    ? 0
    : profiles.filter(p => paywallUserIds.has(p.id) && (p.plan === 'paid' || p.plan === 'business') && !p.pre_launch_grant).length
  const paywallConvRate = paywallCount > 0 ? Math.round(convertedFromPaywall / paywallCount * 100) : 0

  // Share/invite
  const totalShares = allShares.length
  const acceptedInvites = allLoadedEvents.filter(e => e.event_name === 'share_invite_accepted').length

  // Trips
  const tripsEnabledCount = profiles.filter(p => p.trips_enabled).length
  const tripsActiveCount = new Set(allLoadedEvents.filter(e => e.event_name === 'trip_started').map(e => e.user_id).filter(Boolean)).size

  // OCR / API usage
  const totalOcrCalls = allApiUsage.filter(r => r.service === 'ocr').reduce((s,r) => s + (r.call_count || 0), 0)
  const ocrUserCount = new Set(allApiUsage.filter(r => r.service === 'ocr').map(r => r.user_id).filter(Boolean)).size
  const estimatedOcrCost = (totalOcrCalls * 0.0015).toFixed(2) // rough GPT-4o mini estimate

  // Feedback
  const feedbackCount = allFeedback.length
  const feedbackTypes = {}
  allFeedback.forEach(f => { feedbackTypes[f.type || 'general'] = (feedbackTypes[f.type || 'general'] || 0) + 1 })

  // Deletion requests
  const deletionCount = allDeletionRequests.length
  const deletionUniqueUsers = new Set(allDeletionRequests.map(r => r.user_id).filter(Boolean)).size

  const summaryUpdated = summaryRows.length ? fmtDate(summaryRows[summaryRows.length-1].updated_at) : 'n/a'

  // Notes
  const activeNotesCount = allNotes.filter(n => !n.resolved_at).length
  const resolvedNotesCount = allNotes.filter(n => !!n.resolved_at).length
  const notesToShow = notesFilter === 'active'   ? allNotes.filter(n => !n.resolved_at)
                     : notesFilter === 'resolved' ? allNotes.filter(n => !!n.resolved_at)
                     : allNotes

  document.getElementById('loading').style.display = 'none'
  const mainEl = document.getElementById('main')
  mainEl.style.display = 'block'

      <label title="Exclude your admin account from all metrics" style="display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:.6875rem;color:${excludeAdmin?'var(--teal-bright)':'var(--muted)'};cursor:pointer;padding:5px 10px;border-radius:7px;border:1px solid ${excludeAdmin?'var(--teal)':'var(--border)'};background:${excludeAdmin?'rgba(45,212,239,.07)':'var(--surface2)'};transition:all .15s">
        <input type="checkbox" ${excludeAdmin?'checked':''} onchange="toggleExcludeAdmin()" style="accent-color:var(--teal-bright);width:12px;height:12px;cursor:pointer" />
        Excl. admin

      <label title="Switch to post-launch view: zeros pre-launch grants, shows clean numbers" style="display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:.6875rem;color:${postLaunchMode?'var(--amber)':'var(--muted)'};cursor:pointer;padding:5px 10px;border-radius:7px;border:1px solid ${postLaunchMode?'rgba(245,158,11,.4)':'var(--border)'};background:${postLaunchMode?'rgba(245,158,11,.07)':'var(--surface2)'};transition:all .15s">
        <input type="checkbox" ${postLaunchMode?'checked':''} onchange="togglePostLaunch()" style="accent-color:var(--amber);width:12px;height:12px;cursor:pointer" />
        Post-launch
      </label>
      <div class="tabs">
        <div class="tab ${currentRange==='7d'?'active-all':''}"  onclick="setRange('7d')">7d</div>
        <div class="tab ${currentRange==='30d'?'active-all':''}" onclick="setRange('30d')">30d</div>
        <div class="tab ${currentRange==='90d'?'active-all':''}" onclick="setRange('90d')">90d</div>
        <div class="tab ${currentRange==='all'?'active-all':''}" onclick="setRange('all')">All</div>
      </div>
      <button class="refresh-btn" onclick="loadData()">\u21BB Refresh</button>
      <button class="broadcast-btn" id="broadcast-toggle-btn" onclick="toggleBroadcastPanel()">&#128226; Broadcast</button>
    </div>
  </div>

  <!-- BROADCAST PANEL -->
  <div id="broadcast-panel">
    <div style="display:grid;grid-template-columns:1fr 300px;gap:28px;align-items:start">
      <div>
        <div style="font-size:.9375rem;font-weight:700;color:var(--text);margin-bottom:18px;letter-spacing:-.01em">&#128226; Send Broadcast</div>
        <div style="display:flex;flex-direction:column;gap:14px">
          <div>
            <div class="bc-label">Icon (optional)</div>
            <div class="bc-emoji-row" id="bc-emoji-row">
              <div class="bc-emoji" data-emoji="&#128276;" onclick="selectEmoji(this)">&#128276;</div>

              <div class="bc-emoji" data-emoji="&#9888;&#65039;" onclick="selectEmoji(this)">&#9888;&#65039;</div>
              <div class="bc-emoji" data-emoji="&#127881;" onclick="selectEmoji(this)">&#127881;</div>
              <div class="bc-emoji" data-emoji="&#128663;" onclick="selectEmoji(this)">&#128663;</div>

            <button onclick="toggleBroadcastPanel()" style="background:none;border:1px solid var(--border);color:var(--muted);padding:9px 16px;border-radius:9px;font-family:var(--mono);font-size:.75rem;cursor:pointer">Cancel</button>

          <div class="bc-mock-backdrop">

              <div class="bc-mock-icon" id="prev-icon" style="display:none"></div>
              <div class="bc-mock-title" id="prev-title" style="color:#888;font-weight:400">Your title appears here</div>
              <div class="bc-mock-body" id="prev-body" style="color:#aaa">Your message appears here&hellip;</div>
              <div class="bc-mock-cta" id="prev-cta" style="display:none"></div>
              <div class="bc-mock-dismiss">Got it</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- NOTES PANEL -->
  <div class="notes-card">
    <div class="notes-head">
      <div>
        <div class="notes-title">&#128221; Notes</div>
        <div class="notes-sub">${activeNotesCount} active &middot; ${resolvedNotesCount} resolved</div>
      </div>
    </div>
    <div class="notes-compose">
      <textarea id="note-body" class="notes-ta" placeholder="What did you notice? (e.g. 'Alex signed up but only logged services, never trips \u2014 check if BT permission onboarding is clear')" maxlength="2000"></textarea>
      <select id="note-tag" class="notes-tag-sel">
        <option value="">No tag</option>
        <option value="general">General</option>
        <option value="funnel">Activation</option>
        <option value="retention">Retention</option>
        <option value="features">Features</option>
        <option value="users">Users</option>
        <option value="bugs">Bugs</option>
        <option value="ideas">Ideas</option>
      </select>
      <button id="note-save-btn" class="notes-save-btn" onclick="saveNote()">Save</button>
    </div>
    <div class="notes-filter">
      <div class="notes-filter-btn ${notesFilter==='active'?'active':''}"   onclick="setNotesFilter('active')">Active (${activeNotesCount})</div>
      <div class="notes-filter-btn ${notesFilter==='resolved'?'active':''}" onclick="setNotesFilter('resolved')">Resolved (${resolvedNotesCount})</div>
      <div class="notes-filter-btn ${notesFilter==='all'?'active':''}"      onclick="setNotesFilter('all')">All (${allNotes.length})</div>
    </div>
    <div class="notes-list">
      ${notesToShow.length === 0
        ? `<div class="notes-empty">${notesFilter==='active' ? 'No active notes. Jot something down when you spot a pattern or want to remind yourself to check on a user.' : notesFilter==='resolved' ? 'No resolved notes yet.' : 'No notes yet.'}</div>`
        : notesToShow.map(n => {
            const isResolved = !!n.resolved_at
            const tagBadge = n.section_tag ? `<span class="note-tag">${escapeHtml(n.section_tag)}</span>` : ''
            const resolvedBlock = isResolved && n.resolved_note ? `<div class="note-resolved-note">&#10003; ${escapeHtml(n.resolved_note)}</div>` : ''
            const resolvedMeta = isResolved ? `<span>resolved ${fmtDateShort(n.resolved_at)}</span>` : ''
            const actions = isResolved
              ? `<button class="note-btn" onclick="reopenNote('${n.id}')" title="Mark unresolved">\u21BA reopen</button>
                 <button class="note-btn delete" onclick="deleteNote('${n.id}')" title="Delete">&#10005;</button>`
              : `<button class="note-btn resolve" onclick="resolveNote('${n.id}')" title="Mark resolved">&#10003; resolve</button>
                 <button class="note-btn delete" onclick="deleteNote('${n.id}')" title="Delete">&#10005;</button>`
            return `<div class="note-item ${isResolved?'resolved':''}">

  ${postLaunchMode ? `<div style="background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:10px 16px;margin-bottom:12px;font-size:.75rem;color:var(--amber);line-height:1.6"><strong>Launch mode</strong> — paid users and conversion metrics show post-launch numbers only. Manual grants and sandbox purchases are excluded. Toggle "Post-launch" off to see testing-phase data.</div>` : ''}
  <div class="kpi-grid">

  <!-- KPIs — live today snapshot (resets at midnight, updates every page refresh) -->
  <div class="section-label" style="margin-top:24px">Today \u00B7 live <span style="font-size:.6rem;color:var(--teal-bright);margin-left:4px;font-family:var(--mono);font-weight:700;">\u25CF</span></div>
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-glow"></div>
      <div class="kpi-label">Events today</div>
      <div class="kpi-value">${liveTotal.toLocaleString()}</div>

    <div class="kpi"><div class="kpi-glow"></div>

  <div class="card">
    <div style="display:flex;flex-wrap:wrap;gap:10px">

  </div>`}

  <!-- ALL ACCOUNTS DRILL-DOWN -->
  <div class="section-label">All accounts \u2014 click a row to load full event history</div>

    <table style="width:100%;border-collapse:collapse;font-size:.8125rem">

        </tr>

// ─── Broadcast Admin ────────────────────────────────────────────────────────
let selectedBroadcastEmoji = null

function toggleBroadcastPanel() {
  const panel = document.getElementById('broadcast-panel')
  const btn = document.getElementById('broadcast-toggle-btn')
  const isOpen = panel.classList.contains('open')
  panel.classList.toggle('open', !isOpen)
  btn.classList.toggle('active', !isOpen)
  if (!isOpen) { updateBroadcastPreview() }
}

function selectEmoji(el) {
  const emoji = el.dataset.emoji
  if (selectedBroadcastEmoji === emoji) {
    selectedBroadcastEmoji = null; el.classList.remove('selected')
  } else {
    document.querySelectorAll('.bc-emoji').forEach(e => e.classList.remove('selected'))
    selectedBroadcastEmoji = emoji; el.classList.add('selected')
  }
  updateBroadcastPreview()
}

function updateBroadcastPreview() {
  const title    = document.getElementById('bc-title')?.value?.trim()     || ''
  const body     = document.getElementById('bc-body')?.innerHTML?.trim()   || ''
  const ctaLabel = document.getElementById('bc-cta-label')?.value?.trim() || ''
  const iconEl   = document.getElementById('prev-icon')
  const titleEl  = document.getElementById('prev-title')
  const bodyEl   = document.getElementById('prev-body')
  const ctaEl    = document.getElementById('prev-cta')
  if (!iconEl) return
  if (selectedBroadcastEmoji) { iconEl.textContent = selectedBroadcastEmoji; iconEl.style.display = 'block' }
  else { iconEl.style.display = 'none' }
  if (title) { titleEl.textContent = title; titleEl.style.color = '#111'; titleEl.style.fontWeight = '700' }
  else { titleEl.textContent = 'Your title appears here'; titleEl.style.color = '#888'; titleEl.style.fontWeight = '400' }
  if (body) { bodyEl.innerHTML = body; bodyEl.style.color = '#555' }
  else { bodyEl.innerHTML = 'Your message appears here\u2026'; bodyEl.style.color = '#aaa' }
  if (ctaLabel) { ctaEl.textContent = ctaLabel; ctaEl.style.display = 'block' }
  else { ctaEl.style.display = 'none' }
}

function bcFormat(cmd) {
  document.getElementById('bc-body').focus()
  document.execCommand(cmd, false, null)
  updateBroadcastPreview()
}
function bcFormatBlock(tag) {
  document.getElementById('bc-body').focus()
  document.execCommand('formatBlock', false, tag)
  updateBroadcastPreview()
}

async function sendBroadcast() {
  const title    = document.getElementById('bc-title')?.value?.trim()     || ''
  const body     = document.getElementById('bc-body')?.innerHTML?.trim()  || ''
  const ctaLabel = document.getElementById('bc-cta-label')?.value?.trim() || ''
  const ctaUrl   = document.getElementById('bc-cta-url')?.value?.trim()   || ''
  const msgEl    = document.getElementById('bc-msg')
  const btnEl    = document.getElementById('bc-send-btn')
  msgEl.style.display = 'none'; msgEl.className = 'bc-msg'
  if (!title || !body) {
    msgEl.textContent = 'Title and message are required.'; msgEl.className = 'bc-msg error'; msgEl.style.display = 'block'; return
  }
  btnEl.disabled = true; btnEl.textContent = 'Sending\u2026'
  const testMode = document.getElementById('bc-test-mode')?.checked
  const payload = { title, body,
    ...(selectedBroadcastEmoji ? { icon: selectedBroadcastEmoji } : {}),
    ...(ctaLabel ? { cta_label: ctaLabel } : {}),
    ...(ctaUrl   ? { cta_url: ctaUrl }     : {}),
    ...(testMode ? { target_user_id: OWNER_ID } : {})
  }
  try {
    const { data: { session } } = await sb.auth.getSession()
    if (!session) throw new Error('Not authenticated \u2014 please refresh and log in again')
    const res = await fetch(SURL + '/functions/v1/send-broadcast', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
      body: JSON.stringify(payload)
    })
    if (!res.ok) { const t = await res.text(); throw new Error(t || ('HTTP ' + res.status)) }
    msgEl.textContent = 'Broadcast sent \u2713'; msgEl.className = 'bc-msg success'; msgEl.style.display = 'block'
    document.getElementById('bc-title').value = ''
    document.getElementById('bc-body').innerHTML = ''
    document.getElementById('bc-cta-label').value = ''
    document.getElementById('bc-cta-url').value = ''
    selectedBroadcastEmoji = null
    document.querySelectorAll('.bc-emoji').forEach(e => e.classList.remove('selected'))
    updateBroadcastPreview()
    setTimeout(() => {
      document.getElementById('broadcast-panel').classList.remove('open')
      document.getElementById('broadcast-toggle-btn').classList.remove('active')
      msgEl.style.display = 'none'
    }, 2200)
  } catch (err) {
    msgEl.textContent = 'Error: ' + err.message; msgEl.className = 'bc-msg error'; msgEl.style.display = 'block'
  } finally { btnEl.disabled = false; btnEl.textContent = 'Send Broadcast \u2192' }
}

async function doSignIn() {
  const email = document.getElementById('auth-email').value.trim()
  const pass = document.getElementById('auth-pass').value
  const btn = document.getElementById('auth-btn')
  const err = document.getElementById('auth-err')
  err.style.display = 'none'
  btn.textContent = 'Signing in\u2026'
  btn.disabled = true
  const { error } = await sb.auth.signInWithPassword({ email, password: pass })
  if (error) {
    err.textContent = error.message; err.style.display = 'block'
    btn.textContent = 'Sign In'; btn.disabled = false
    return
  }
  document.getElementById('auth-gate').style.display = 'none'
  document.getElementById('loading').style.display = 'flex'
  loadData()
}

loadData().catch(err => {
  document.getElementById('loading').innerHTML = `<div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:16px 20px;color:#fca5a5;font-size:.875rem;max-width:500px">Failed to load: ${err.message}</div>`
})
</script>
