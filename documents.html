<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documents — AutoLog</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{font-family:'Inter',-apple-system,sans-serif;background:#f1f5f9;color:#475569;-webkit-font-smoothing:antialiased;display:flex;min-height:100vh}
h1,h2,h3{color:#0f172a;font-weight:700;line-height:1.25}a{text-decoration:none;color:inherit}button,select{font-family:inherit}
.sb{width:68px;min-height:100vh;background:#0f172a;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:300;transition:width .24s cubic-bezier(.4,0,.2,1);overflow:hidden;box-shadow:2px 0 12px rgba(0,0,0,.15)}.sb:hover,.sb.open{width:228px}
.sb-logo{display:flex;align-items:center;gap:11px;padding:0 16px;height:64px;border-bottom:1px solid rgba(255,255,255,.07);overflow:hidden;flex-shrink:0}.sb-logo img{width:34px;height:34px;border-radius:9px;flex-shrink:0}
.sb-logo-text{font-size:.9375rem;font-weight:700;color:#fff;white-space:nowrap;opacity:0;transform:translateX(-8px);transition:opacity .2s .06s,transform .2s .06s}.sb:hover .sb-logo-text,.sb.open .sb-logo-text{opacity:1;transform:translateX(0)}
.sb-nav{flex:1;padding:8px 0;display:flex;flex-direction:column;overflow:hidden}
.sb-link{display:flex;align-items:center;gap:14px;padding:10px 18px 10px 22px;color:rgba(255,255,255,.45);font-size:.875rem;font-weight:500;white-space:nowrap;transition:color .15s,background .15s;position:relative;text-decoration:none;cursor:pointer;width:100%;border:none;background:none}
.sb-link:hover{color:rgba(255,255,255,.9);background:rgba(255,255,255,.06)}.sb-link.active{color:#fff;background:rgba(30,122,140,.3)}.sb-link.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;background:#1E7A8C;border-radius:0 3px 3px 0}
.sb-icon{width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center}.sb-icon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sb-label{opacity:0;transform:translateX(-8px);transition:opacity .2s .06s,transform .2s .06s;pointer-events:none}.sb:hover .sb-label,.sb.open .sb-label{opacity:1;transform:translateX(0)}
.sb-divider{margin:4px 0;border-top:1px solid rgba(255,255,255,.06)}.sb-bottom{padding:8px 0;border-top:1px solid rgba(255,255,255,.07)}.sb-signout:hover{color:#f87171!important;background:rgba(248,113,113,.08)!important}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:299;backdrop-filter:blur(2px)}.sb-overlay.on{display:block}
.main{flex:1;margin-left:68px;min-height:100vh;display:flex;flex-direction:column}
.topbar{height:64px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:200;gap:12px}
.topbar-left{display:flex;align-items:center;gap:12px}.mob-menu{display:none;width:36px;height:36px;background:#f8fafc;border:none;border-radius:9px;cursor:pointer;align-items:center;justify-content:center;color:#475569;flex-shrink:0}.mob-menu:hover{background:#e2e8f0}.mob-menu svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5}
.page-title{font-size:.9375rem;font-weight:700;color:#0f172a}.topbar-right{display:flex;align-items:center;gap:10px}
.vsw{position:relative}.vsw-btn{display:flex;align-items:center;gap:8px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:6px 10px 6px 8px;cursor:pointer;font-size:.8125rem;font-weight:600;color:#0f172a;transition:all .15s;max-width:200px}.vsw-btn:hover{background:#E8F4F6;border-color:#1E7A8C}
.vsw-dot{width:8px;height:8px;border-radius:50%;background:#1E7A8C;flex-shrink:0}.vsw-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}.vsw-chevron{width:14px;height:14px;flex-shrink:0;color:#94a3b8}.vsw-chevron svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}.vsw-btn.open .vsw-chevron{transform:rotate(180deg)}
.vsw-drop{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.12);min-width:200px;z-index:400;overflow:hidden;animation:dropIn .15s ease}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.vsw-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;font-size:.875rem;font-weight:500;color:#334155;transition:background .1s}.vsw-item:hover{background:#f8fafc}.vsw-item.cur{background:#E8F4F6;color:#1E7A8C;font-weight:600}.vsw-item-reg{font-size:.7rem;color:#94a3b8;font-family:monospace;letter-spacing:.04em;margin-top:1px}
.user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#1E7A8C,#4DB8CC);display:flex;align-items:center;justify-content:center;font-size:.6875rem;font-weight:700;color:#fff}
.content{flex:1;padding:28px 28px 48px;width:100%;max-width:1240px}
.pg-head{margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}.pg-head-text h1{font-size:1.375rem;font-weight:800;letter-spacing:-.02em}.pg-head-text p{font-size:.875rem;color:#94a3b8;margin-top:2px}
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.doc-card{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 1px 2px rgba(0,0,0,.04);border:1px solid #f1f5f9;cursor:pointer;transition:box-shadow .15s,border-color .15s}.doc-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);border-color:#e2e8f0}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 18px;border-radius:9px;font-size:.8125rem;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid transparent;transition:all .15s;white-space:nowrap;line-height:1}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#1E7A8C;color:#fff;border-color:#1E7A8C}.btn-primary:hover:not(:disabled){background:#155F6E}.btn-ghost{background:#f8fafc;color:#475569;border-color:#e2e8f0}.btn-ghost:hover:not(:disabled){background:#e2e8f0}.btn-sm{padding:7px 14px;font-size:.8125rem;border-radius:8px}
.btn-icon{width:30px;height:30px;padding:0;border-radius:7px;background:#f8fafc;color:#64748b;border:1px solid #e2e8f0;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}.btn-icon:hover{background:#fef2f2;color:#dc2626;border-color:#fca5a5}.btn-icon svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.fg{margin-bottom:14px}.fl{display:block;font-size:.8125rem;font-weight:600;color:#475569;margin-bottom:5px}.fi{width:100%;padding:9px 13px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:.875rem;font-family:inherit;color:#0f172a;background:#fff;outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none}.fi:focus{border-color:#1E7A8C;box-shadow:0 0 0 3px rgba(30,122,140,.1)}
.mbg{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadein .15s ease;backdrop-filter:blur(4px)}.mo{background:#fff;border-radius:20px;width:100%;max-width:480px;box-shadow:0 24px 80px rgba(0,0,0,.2);animation:slideup .2s ease;max-height:90vh;overflow-y:auto}.mh{display:flex;align-items:center;justify-content:space-between;padding:22px 24px 0}.mh h2{font-size:1.0625rem;font-weight:700}.mc{width:30px;height:30px;border:none;background:#f1f5f9;border-radius:7px;cursor:pointer;color:#64748b;display:flex;align-items:center;justify-content:center;font-size:.875rem;transition:all .15s}.mc:hover{background:#E8F4F6;color:#1E7A8C}.mb{padding:18px 24px 24px}.merr{background:rgba(220,38,38,.08);color:#dc2626;border:1px solid rgba(220,38,38,.2);padding:10px 13px;border-radius:9px;font-size:.8125rem;margin-bottom:14px;display:none}.merr.on{display:block}.mfooter{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.drop-zone{border:2px dashed rgba(30,122,140,.25);border-radius:12px;padding:28px;text-align:center;cursor:pointer;background:#f8fafc;transition:all .15s}.drop-zone:hover,.drop-zone.over{border-color:#1E7A8C;background:#E8F4F6}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px;gap:14px;color:#94a3b8;font-size:.875rem;width:100%}.spinner{width:32px;height:32px;border:3px solid rgba(30,122,140,.15);border-top-color:#1E7A8C;border-radius:50%;animation:spin .7s linear infinite}
.empty{text-align:center;padding:48px 24px;color:#94a3b8}.empty-icon{font-size:2.5rem;margin-bottom:12px;opacity:.35}.empty h3{font-size:.9375rem;color:#475569;font-weight:600;margin-bottom:6px}.empty p{font-size:.8125rem}
#toast{position:fixed;bottom:24px;right:24px;z-index:999;background:#0f172a;color:#fff;padding:12px 18px;border-radius:11px;font-size:.875rem;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.25);max-width:300px;display:none}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes fadein{from{opacity:0}to{opacity:1}}@keyframes slideup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){.sb{transform:translateX(-100%);width:240px!important;transition:transform .25s cubic-bezier(.4,0,.2,1)}.sb.open{transform:translateX(0)}.sb .sb-label,.sb .sb-logo-text{opacity:1!important;transform:none!important}.sb-overlay.on{display:block}.main{margin-left:0}.mob-menu{display:flex}.content{padding:20px 16px 40px}.page-title{display:none}}
</style>
</head>
<body>
<aside class="sb" id="sb">
  <div class="sb-logo"><img src="/assets/logo.png" alt=""><span class="sb-logo-text">AutoLog</span></div>
  <nav class="sb-nav">

    <a href="/app/fuel.html" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M3 22V8a2 2 0 012-2h8a2 2 0 012 2v14M3 22h14M7 22V12h4v10"/><path d="M19 8l2 2-2 2M19 10h-2V6a2 2 0 00-2-2"/></svg></span><span class="sb-label">Fuel Log</span></a>
    <a href="/app/service.html" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg></span><span class="sb-label">Service History</span></a>
    <a href="/app/maintenance.html" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span><span class="sb-label">Maintenance</span></a>
    <a href="/app/documents.html" class="sb-link active"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span><span class="sb-label">Documents</span></a>
    <a href="/app/trips.html" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg></span><span class="sb-label">Trips</span></a>
    <div class="sb-divider"></div>
    <a href="/app/settings.html" class="sb-link"><span class="sb-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span><span class="sb-label">Settings</span></a>
  </nav>
  <div class="sb-bottom"><button class="sb-link sb-signout" onclick="doSignOut()"><span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span><span class="sb-label">Sign Out</span></button></div>
</aside>
<div class="sb-overlay" id="sb-ov"></div>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><button class="mob-menu" id="mob-menu-btn"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><span class="page-title">Documents</span></div>
    <div class="topbar-right">
      <div class="vsw" id="vsw"><button class="vsw-btn" id="vsw-btn" onclick="toggleVsw()"><div class="vsw-dot"></div><span class="vsw-name" id="vsw-name">…</span><span class="vsw-chevron"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></span></button></div>
      <button class="btn btn-primary btn-sm" id="upload-btn">+ Upload</button>

    </div>
  </div>
  <div class="content" id="content"><div class="loading"><div class="spinner"></div><span>Loading…</span></div></div>
</div>

<script>
const SURL='https://dkpvxlxarsmiljnvnbck.supabase.co',SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrcHZ4bHhhcnNtaWxqbnZuYmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzM4MzIsImV4cCI6MjA5MDAwOTgzMn0.WJTRE_xmudj--jWSoA3e4ggYVORrFpoarBUkeaQN1Bw'
const sb=supabase.createClient(SURL,SKEY)
const $=id=>document.getElementById(id)
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
function vName(v){return v.nickname||[v.year,v.make,v.model].filter(Boolean).join(' ')||v.registration||'Vehicle'}
function toast(msg,ok=true){const el=$('toast');el.textContent=msg;el.style.borderLeft='3px solid '+(ok?'#22c55e':'#ef4444');el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',3500)}
function doSignOut(){sb.auth.signOut().then(()=>location.href='/app/login.html')}
const sbEl=$('sb'),sbOv=$('sb-ov')
$('mob-menu-btn').onclick=()=>{sbEl.classList.toggle('open');sbOv.classList.toggle('on')}
sbOv.onclick=()=>{sbEl.classList.remove('open');sbOv.classList.remove('on')}
let allVehicles=[],vehicle=null,userId=null
function toggleVsw(){const d=$('vsw-drop');if(d){d.remove();$('vsw-btn').classList.remove('open');return}if(allVehicles.length<=1)return;$('vsw-btn').classList.add('open');const drop=document.createElement('div');drop.id='vsw-drop';drop.className='vsw-drop';drop.innerHTML=allVehicles.map(v=>`<div class="vsw-item${v.id===vehicle?.id?' cur':''}" onclick="switchV('${v.id}')"><div style="width:7px;height:7px;border-radius:50%;background:${v.id===vehicle?.id?'#1E7A8C':'#94a3b8'};flex-shrink:0"></div><div><div>${vName(v)}</div>${v.registration?`<div class="vsw-item-reg">${v.registration.toUpperCase()}</div>`:''}</div></div>`).join('');$('vsw').appendChild(drop);setTimeout(()=>document.addEventListener('click',()=>{const d=$('vsw-drop');if(d){d.remove();$('vsw-btn').classList.remove('open')}},{once:true}),10)}
function switchV(id){localStorage.setItem('al_vid',id);location.reload()}
const DTYPES={mot_certificate:{label:'MOT Certificate',icon:'✅'},service_invoice:{label:'Service Invoice',icon:'🔧'},fuel_receipt:{label:'Fuel Receipt',icon:'⛽'},insurance:{label:'Insurance',icon:'🛡️'},v5c:{label:'V5C Logbook',icon:'📋'},warranty:{label:'Warranty',icon:'🏅'},purchase_receipt:{label:'Purchase Receipt',icon:'🏷️'},recall_notice:{label:'Recall Notice',icon:'⚠️'},repair_invoice:{label:'Repair Invoice',icon:'🛠️'},tyre_receipt:{label:'Tyre Receipt',icon:'🔵'},other:{label:'Other',icon:'📄'}}
;(async()=>{
  const{data:{session}}=await sb.auth.getSession()
  if(!session){location.replace('/app/login.html');return}
  userId=session.user.id
  const[{data:veh},{data:prof}]=await Promise.all([sb.from('vehicles').select('*').eq('owner_id',userId).eq('is_active',true).order('created_at',{ascending:true}),sb.from('profiles').select('display_name').eq('id',userId).single()])
  allVehicles=veh||[]
  $('user-avatar').textContent=(prof?.display_name||session.user.email||'?')[0].toUpperCase()
  let selId=localStorage.getItem('al_vid')
  if(!selId||!allVehicles.find(v=>v.id===selId)){selId=allVehicles[0]?.id||null;if(selId)localStorage.setItem('al_vid',selId)}
  vehicle=allVehicles.find(v=>v.id===selId)||null
  $('vsw-name').textContent=vehicle?vName(vehicle):'No vehicle'
  if(allVehicles.length<=1)$('vsw-btn').style.cursor='default'
  $('upload-btn').onclick=showUpload
  await load()
})()
async function load(){
  if(!vehicle){$('content').innerHTML=`<div class="empty"><div class="empty-icon">📄</div><h3>No vehicle selected</h3></div>`;return}
  const{data:docs}=await sb.from('documents').select('*').eq('vehicle_id',vehicle.id).order('created_at',{ascending:false})
  const all=docs||[]
  const groups={}
  all.forEach(d=>{const t=d.document_type||'other';if(!groups[t])groups[t]=[];groups[t].push(d)})
  $('content').innerHTML=`
    <div class="pg-head"><div class="pg-head-text"><h1>Documents</h1><p>${vName(vehicle)} · ${all.length} document${all.length!==1?'s':''}</p></div></div>
    ${all.length===0?`<div class="empty"><div class="empty-icon">📄</div><h3>No documents yet</h3><p>Upload MOT certificates, invoices, insurance and more.</p><button class="btn btn-primary" style="margin-top:14px" onclick="showUpload()">Upload Document</button></div>`
    :Object.entries(groups).map(([type,docs])=>{const ti=DTYPES[type]||DTYPES.other;return`
      <div style="margin-bottom:24px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:1.125rem">${ti.icon}</span><span style="font-size:.875rem;font-weight:700;color:#0f172a">${ti.label}</span><span style="font-size:.75rem;color:#94a3b8">${docs.length}</span></div>
        <div class="doc-grid">${docs.map(doc=>`<div class="doc-card" onclick="viewDoc('${doc.storage_path}')">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
            <div style="flex:1;min-width:0">
              <div style="font-size:.875rem;font-weight:600;color:#0f172a;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${doc.file_name||ti.label}</div>
              <div style="font-size:.75rem;color:#94a3b8">${fmtDate(doc.document_date||doc.created_at)}</div>
              ${doc.page_count>1?`<div style="font-size:.6875rem;color:#1E7A8C;margin-top:2px">${doc.page_count} pages</div>`:''}
            </div>
            <button class="btn-icon" onclick="event.stopPropagation();delDoc('${doc.id}','${doc.storage_path}')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button>
          </div>
        </div>`).join('')}</div>
      </div>`}).join('')}
  `
}
async function viewDoc(path){const{data}=await sb.storage.from('vehicle-documents').createSignedUrl(path,60);if(data?.signedUrl)window.open(data.signedUrl,'_blank');else toast('Could not open document',false)}
async function delDoc(id,path){if(!confirm('Delete this document permanently?'))return;await sb.storage.from('vehicle-documents').remove([path]);await sb.from('documents').delete().eq('id',id);toast('Deleted',false);await load()}
function showUpload(){
  const bg=document.createElement('div');bg.className='mbg'
  bg.innerHTML=`<div class="mo"><div class="mh"><h2>Upload Document</h2><button class="mc" onclick="this.closest('.mbg').remove()">✕</button></div><div class="mb">
    <div class="merr" id="merr"></div>
    <div class="fg"><label class="fl">Document Type</label><select class="fi" id="u-t">${Object.entries(DTYPES).map(([v,{label}])=>`<option value="${v}">${label}</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">Date (optional)</label><input class="fi" type="date" id="u-d"></div>
    <div class="fg"><label class="fl">File</label>
      <div class="drop-zone" id="dz" onclick="document.getElementById('u-f').click()" ondragover="event.preventDefault();this.classList.add('over')" ondragleave="this.classList.remove('over')" ondrop="handleDrop(event)">
        <div style="font-size:2rem;margin-bottom:8px">📎</div>
        <div style="font-size:.875rem;font-weight:600;color:#475569">Click to choose or drag & drop</div>
        <div style="font-size:.75rem;color:#94a3b8;margin-top:4px">Images (JPG, PNG) or PDF</div>
      </div>
      <input type="file" id="u-f" accept="image/*,application/pdf" style="display:none">
      <div id="u-prev" style="display:none;margin-top:10px;font-size:.875rem;color:#0f172a;font-weight:500;display:flex;align-items:center;gap:8px"></div>
    </div>
    <div class="mfooter"><button class="btn btn-ghost btn-sm" onclick="this.closest('.mbg').remove()">Cancel</button><button class="btn btn-primary btn-sm" id="u-sv" disabled>Upload</button></div>
  </div></div>`
  document.body.appendChild(bg)
  bg.addEventListener('click',e=>{if(e.target===bg)bg.remove()})
  let file=null
  const setFile=f=>{file=f;const p=bg.querySelector('#u-prev');p.style.display='flex';p.innerHTML=`<span>${f.type.includes('pdf')?'📋':'🖼️'}</span><span>${f.name} (${(f.size/1024).toFixed(0)}KB)</span>`;bg.querySelector('#u-sv').disabled=false}
  bg.querySelector('#u-f').onchange=e=>{if(e.target.files[0])setFile(e.target.files[0])}
  window.handleDrop=e=>{e.preventDefault();bg.querySelector('#dz').classList.remove('over');if(e.dataTransfer.files[0])setFile(e.dataTransfer.files[0])}
  bg.querySelector('#u-sv').onclick=async()=>{
    if(!file)return
    const btn=bg.querySelector('#u-sv');btn.disabled=true;btn.textContent='Uploading…'
    const ext=file.name.split('.').pop(),path=`${userId}/${vehicle.id}/${Date.now()}.${ext}`
    const{error:ue}=await sb.storage.from('vehicle-documents').upload(path,file,{contentType:file.type})
    if(ue){const e=bg.querySelector('#merr');e.textContent=ue.message;e.classList.add('on');btn.disabled=false;btn.textContent='Upload';return}
    await sb.from('documents').insert({vehicle_id:vehicle.id,user_id:userId,storage_path:path,file_name:file.name,file_type:file.type,file_size_bytes:file.size,document_type:bg.querySelector('#u-t').value,document_date:bg.querySelector('#u-d').value||null,ocr_status:'pending'})
    bg.remove();toast('Uploaded ✓');await load()
  }
}
</script>
</body>
</html>
